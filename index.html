        {label:'Contractor, untrusted network', ctx:{group:'Contractors',trusted:false,managed:false}, want:'DENY'},
        {label:'Employee, untrusted network', ctx:{group:'Employees',trusted:false,managed:true}, want:'MFA'},
        {label:'Employee, trusted office network', ctx:{group:'Employees',trusted:true,managed:true}, want:'ALLOW'},
        {label:'Visitor on trusted network', ctx:{group:'Guest',trusted:true,managed:false}, want:'ALLOW'}
      ]},
    quiz:[
      {q:'Okta sign-on policy rules are evaluated:',
       o:['All at once, combined','Top-down, first match wins','Bottom-up','Randomly'],a:1,
       e:'Evaluation stops at the first matching rule. This makes rule ORDER decisive — unlike additive permission systems.'},
      {q:'Putting a broad "allow anyone" rule at the TOP of a policy:',
       o:['Improves security','Can silently shadow the restrictive rules below it','Has no effect','Speeds up login only'],a:1,
       e:'Because first match wins, a permissive top rule prevents lower security rules from ever being evaluated — a common, dangerous misconfiguration.'},
      {q:'"Step-up MFA" means:',
       o:['Disabling MFA','Requiring an additional factor when risk is higher (off-network, unmanaged device)','Logging in twice with passwords','Using a longer password'],a:1,
       e:'Step-up applies MFA conditionally based on context, balancing security and friction — the core value of sign-on policies.'},
      {q:'A network zone is:',
       o:['A physical room','A named set of IP ranges used in policy conditions','A type of cable','A user group'],a:1,
       e:'Zones (e.g., "Corporate" office IPs) let policies treat trusted vs untrusted locations differently — commonly requiring MFA when off-network.'}
    ]},
  { id:'05.3', num:'05.3', title:'App integrations & provisioning', minutes:8,
    dek:'Connecting apps to Okta is the daily work. SAML or OIDC for login, SCIM for provisioning — and the config details that make or break it.',
    concept:`<p>An Okta org is only useful once apps are <b>integrated</b>. This is core IAM-engineer work: wiring each application for single sign-on and, ideally, automated provisioning.</p>
    <h3>Two connections per app</h3>
    <ul><li><b>SSO (login):</b> via <b>SAML</b> or <b>OIDC</b> (Modules 02). The user authenticates at Okta and is logged into the app. This is the minimum integration.</li>
    <li><b>Provisioning (account lifecycle):</b> via <b>SCIM</b>. Okta creates/updates/deactivates the user's account in the app automatically as group membership changes. This is what makes JML work end-to-end.</li></ul>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">OIN — Okta Integration Network</div>A catalog of thousands of pre-built app integrations. For common SaaS, you pick the app from the OIN and fill in a few values rather than configuring SAML/SCIM from scratch.</div>
    <h3>The config values that matter (and break)</h3>
    <p>For <b>SAML</b>: the <b>SSO URL</b>, the <b>Audience/Entity ID</b> (must match exactly — recall Module 02's #1 failure), and the <b>signing certificate</b>. For <b>OIDC</b>: the <b>redirect URI</b> (must be registered exactly), the <b>client ID/secret</b>, and <b>scopes</b>. For <b>SCIM</b>: the app's <b>SCIM base URL</b> and an <b>API token</b>, plus <b>attribute mappings</b> (which Okta profile field maps to which app field).</p>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>Provisioning ≠ SSO.</b> A very common confusion: an app is set up for SSO so people can log in, but SCIM provisioning was never configured. New users can't log in until someone <i>manually</i> creates their account in the app, and leavers stay active because no deprovision event is sent. Always confirm <i>both</i> connections where the app supports it.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> "Onboard this new SaaS app to Okta" is a ticket you'll get constantly. The workflow: find it in the OIN (or set up custom SAML/OIDC), configure SSO, test a login, configure SCIM provisioning, map attributes, assign to the right group, and verify a test user provisions and deprovisions cleanly.</div></div>`,
    example:`<p>Two integrations, side by side: one that's SSO-only (and its hidden problem) and one done fully with provisioning.</p>
    <div class="example-wrap"><div class="example-label">Worked example · SSO-only vs SSO + SCIM</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">app-integration</div><div class="chip">OKTA</div></div>
    <div class="console-body"><div class="mono-out">APP "LegacyTimesheets"  — SAML SSO only
  login works ✓   provisioning ✗
  → new hire can't log in until admin MANUALLY creates the account
  → <span style="color:#f87171">leaver stays active — no deprovision event ever sent</span>

APP "Salesforce"  — SAML SSO + SCIM provisioning
  login works ✓   provisioning ✓
  → user added to "Sales" group → SCIM auto-creates SF account
  → user offboarded → SCIM auto-disables SF account
  → <span style="color:#34d399">full lifecycle automated, nothing lingers</span></div></div></div>
    <p>The difference is the SCIM connection. SSO alone logs people in; SCIM is what actually creates and removes their accounts. A complete integration does both wherever the app supports it.</p></div>`,
    lab:{ kind:'classify', id:'05.3', mode:'oktaconn',
      title:'SSO or SCIM?',
      objective:'For each integration task, decide whether it\'s configured through the <b>SSO (login)</b> connection or the <b>SCIM (provisioning)</b> connection. Telling them apart prevents the classic "they can log in but their account was never created" gap.',
      intro:'Tag each task with the connection it belongs to. All correct to pass.',
      threeway:['SSO (login)','SCIM (provisioning)'],
      twoway:true,
      items:[
        {t:'Set the Audience / Entity ID so the SAML assertion is accepted.',layer:'SSO (login)'},
        {t:'Configure the base URL and API token so Okta can create accounts in the app.',layer:'SCIM (provisioning)'},
        {t:'Map the Okta "department" attribute to the app\'s "team" field on user creation.',layer:'SCIM (provisioning)'},
        {t:'Register the exact redirect URI for the OIDC login flow.',layer:'SSO (login)'},
        {t:'Ensure a leaver\'s account is automatically deactivated in the app.',layer:'SCIM (provisioning)'}
      ]},
    quiz:[
      {q:'The two connections you configure when integrating an app with Okta are:',
       o:['Email and chat','SSO (login) and SCIM (provisioning)','DNS and DHCP','HTTP and FTP'],a:1,
       e:'SSO handles authentication/login (SAML or OIDC); SCIM handles account provisioning and deprovisioning. Complete integrations use both.'},
      {q:'An app is set up for SSO but not SCIM. What breaks?',
       o:['Nothing','New users can\'t be auto-created and leavers aren\'t auto-deactivated','The whole org goes down','Passwords stop working'],a:1,
       e:'Without SCIM, account lifecycle is manual: admins must create accounts by hand and leaver accounts linger because no deprovision event is sent.'},
      {q:'The Okta Integration Network (OIN) is:',
       o:['A social network','A catalog of pre-built app integrations','A VPN service','A password vault'],a:1,
       e:'The OIN provides thousands of ready-made integrations so you configure a few values instead of building SAML/SCIM from scratch.'},
      {q:'Recalling Module 02, the most common SAML integration failure is a mismatch in the:',
       o:['Font size','Audience / Entity ID','Username length','Time zone label'],a:1,
       e:'The assertion\'s Audience must exactly match the app\'s Entity ID. Even a trailing slash causes rejection — the classic SAML break.'}
    ]},
  { id:'05.4', num:'05.4', title:'Okta Workflows: no-code automation', minutes:9,
    dek:'Where Okta becomes programmable. Workflows is a visual, no-code automation engine for the lifecycle logic that doesn\'t fit standard settings.',
    concept:`<p>Standard Okta settings handle common cases. But real orgs have quirky requirements: "when a contractor is created, set their account to expire in 90 days and notify their sponsor." That custom logic is what <b>Okta Workflows</b> is for.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Okta Workflows</div>A visual, no-code automation builder. You chain together <b>triggers</b> (an event happens) and <b>actions</b> (do something) into <b>flows</b> that run automatically — without writing or deploying code.</div>
    <h3>The anatomy of a flow</h3>
    <ul><li><b>Trigger / event:</b> what starts the flow — "user added to group," "user deactivated," a scheduled time, an inbound webhook.</li>
    <li><b>Cards / actions:</b> the steps — read a user attribute, call an app's API, send a Slack message, branch on a condition, loop over a list.</li>
    <li><b>Connectors:</b> pre-built integrations to apps (Slack, Google, ServiceNow, AWS) so a flow can act across systems.</li></ul>
    <div class="analogy"><div class="al">Think of it like</div>Visual building blocks (think Scratch or Zapier, but for identity). You drag a "when a user joins the Contractors group" trigger, connect it to a "set expiration date" action, then a "send Slack message to sponsor" action. No code — just connected blocks that run on every matching event.</div>
    <h3>Why this is a hot skill</h3>
    <p>Workflows turns an IAM engineer from someone who clicks settings into someone who <b>automates the business's identity logic</b>. Custom onboarding, just-in-time access grants, scheduled access reviews, auto-remediation of policy violations — all built visually. "Okta Workflows experience" appears on senior IAM job postings for exactly this reason.</p>
    <div class="callout tip"><span class="ic">💡</span><div><b>Design principle:</b> a good flow is event-driven and idempotent, handles the error branch (what if the API call fails?), and logs what it did. The same fail-safe thinking from the JML pipeline applies — automation must be observable and recoverable.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> a classic first Workflow: "when a user is offboarded, look up everything they own (groups, apps, delegated mailboxes), reassign or remove it, and post a summary to the security channel." It closes exactly the leaver gaps you studied in Module 04.</div></div>`,
    example:`<p>Here's a real contractor-onboarding flow, block by block — a trigger and a chain of actions, no code.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a Workflows flow</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">flow · contractor-onboarding</div><div class="chip">WORKFLOWS</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#22d3ee">TRIGGER</span>  User added to group "Contractors"
   │
   ▼ <span style="color:#34d399">ACTION</span>  Read user profile (get manager, start date)
   │
   ▼ <span style="color:#34d399">ACTION</span>  Set account expiration = start date + 90 days
   │
   ▼ <span style="color:#fbbf24">BRANCH</span>  manager email present?
   │     ├─ yes ▼ <span style="color:#34d399">ACTION</span> Slack DM sponsor: "Contractor X expires in 90d"
   │     └─ no  ▼ <span style="color:#34d399">ACTION</span> Email IT: "contractor has no sponsor — review"
   ▼
  done — logged. No code written, runs on every matching event.</div></div></div>
    <p>Every block is a pre-built card you configure, not code you write. The branch handles the messy real-world case (missing sponsor) instead of failing silently. This is the automation mindset that makes the rest of IAM scale — and it's your practice in the checkpoint.</p></div>`,
    lab:{ kind:'quizonly', id:'05.4',

  { id:'05.5', num:'05.5', title:'SSO troubleshooting console', minutes:10,
    dek:'The single most common Okta task on the job: a user can\u2019t get into an app. You\u2019ll triage five real failures in a console and pick each root cause.',
    concept:`<p>You\u2019ve learned the protocols (Module 02) and the Okta org (earlier in this module). Now the daily reality: SSO breaks, a ticket lands, and you have minutes to find the cause. Almost every Okta SSO failure is one of a handful of recurring patterns — learn them and you\u2019ll resolve most tickets fast.</p>
    <div class="keyterm"><div class="kt-label">First move, always</div><div class="kt-term">AuthN or AuthZ?</div>From Module 01: could the user authenticate at all? If they logged in but the app rejects them, it\u2019s assignment/authorization or SAML/OIDC config. If they couldn\u2019t log in, it\u2019s authentication (MFA, password, account state). This split instantly narrows the search.</div>
    <h3>The recurring Okta SSO failures</h3>
    <ul>
      <li><b>User not assigned to the app</b> — they authenticate fine, but Okta never granted them this app. The most common "I can\u2019t access X" ticket. Fix: assign the user or their group to the app.</li>
      <li><b>SAML audience / Entity ID mismatch</b> — the SP rejects the assertion; classic login loop. Fix: make the Audience exactly match the SP Entity ID.</li>
      <li><b>OIDC redirect_uri mismatch</b> — "redirect URI not registered." Fix: add the exact callback URL to the app config.</li>
      <li><b>Clock skew</b> — assertions are time-boxed; a drifted clock fails the validity window for everyone. Fix: sync NTP.</li>
      <li><b>Broken SCIM deprovisioning</b> — a leaver still has an active downstream account. Fix: repair the connector and reconcile.</li>
      <li><b>MFA prompt loop</b> — an over-aggressive sign-on/session policy re-challenges constantly. Fix: relax session frequency; don\u2019t remove MFA.</li>
    </ul>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>Read the logs, don\u2019t guess:</b> Okta\u2019s System Log records every sign-in and the policy/assignment evaluated. Like Entra\u2019s sign-in logs, it usually names the failure directly. Triage is reading evidence, not guessing — the console below trains exactly that reflex.</div></div>`,
    example:`<p>One ticket, worked the right way — classify the layer, read the signal, name the cause, apply the fix.</p>
    <div class="example-wrap"><div class="example-label">Worked example · triaging one ticket</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">okta · system log · INC-7782</div></div>
    <div class="console-body"><div class="mono-out">ticket: "I log into Okta fine but the Concur tile gives 'app not assigned'."

step 1  AuthN or AuthZ? → they logged in → <span style="color:#22d3ee">authorization/assignment</span>
step 2  read log → SSO_ATTEMPT for Concur → <span style="color:#f87171">user not in any assigned group</span>
step 3  cause → user (or their group) isn't assigned to the Concur app
step 4  fix → assign the user's group to Concur; re-test
        <span style="color:#5c6b80"># NOT a password reset — authentication already worked</span></div></div></div>
    <p>The wrong move (resetting their password) would change nothing, because login already worked. Correctly classifying the layer pointed straight at assignment. The lab gives you five tickets to run this way.</p></div>`,
    lab:{ kind:'ssotriage', id:'05.5',
      title:'Triage five SSO tickets',
      objective:'For each ticket, pick the correct root cause. The console reveals the real diagnosis and fix for each. Get all five right to pass — this is the core Okta support skill.',
      intro:'',
      tickets:[
        {id:'INC-7782', symptom:'"I log into Okta fine, but the Concur tile says the app isn\u2019t assigned to me."', cause:'userNotAssigned'},
        {id:'INC-7790', symptom:'"SSO into Workday loops back to the login page; logs show the SP rejected the assertion audience."', cause:'audienceMismatch'},
        {id:'INC-7803', symptom:'"The new internal app returns redirect_uri mismatch right after the Okta prompt."', cause:'redirectMismatch'},
        {id:'INC-7811', symptom:'"Since the server time drifted, everyone gets assertion-expired errors into the SAML app."', cause:'clockSkew'},
        {id:'INC-7820', symptom:'"A terminated employee still has an active account in the downstream HR app a week later."', cause:'scimDeprovFailed'}
      ]},
    quiz:[
      {q:'A user authenticates into Okta but one app tile says "not assigned." The fix is:',
       o:['Reset their password','Assign the user or their group to that app','Disable MFA','Reboot their laptop'],a:1,
       e:'Authentication worked, so it\u2019s an assignment/authorization gap — assign the user (or a group they\u2019re in) to the app integration.'},
      {q:'A SAML login loop where the SP rejects the assertion most often means:',
       o:['Audience / Entity ID mismatch','The user is offline','A slow CPU','Wrong keyboard layout'],a:0,
       e:'Audience/Entity ID mismatch causes the SP to reject the assertion and bounce the user back to login — the classic loop.'},
      {q:'Constant MFA re-prompts all day are best fixed by:',
       o:['Removing MFA entirely','Relaxing the sign-on/session frequency policy','Resetting the password','Deleting the app'],a:1,
       e:'The cause is an over-aggressive session/sign-on frequency. Tune the session policy; never solve it by removing MFA.'},
      {q:'The right first step on any SSO ticket is to:',
       o:['Guess','Classify it as authentication vs authorization, then read the system log','Reinstall Okta','Email everyone'],a:1,
       e:'The AuthN/AuthZ split plus the system log narrow the cause immediately — triage is reading evidence, not guessing.'}
    ]},
  { id:'05.6', num:'05.6', title:'Advanced sign-on policy scenarios', minutes:9,
    dek:'Go beyond a single rule. Layer zone, group, and device conditions into an ordered policy that does the right thing across many sign-in situations at once.',
    concept:`<p>Earlier you ordered a basic sign-on policy. Real Okta policies layer several conditions and must behave correctly across <i>many</i> sign-in situations simultaneously — employees vs. contractors, office vs. remote, managed vs. personal device.</p>
    <div class="keyterm"><div class="kt-label">Recall</div><div class="kt-term">First match wins</div>Okta evaluates app sign-on rules <b>top-down and stops at the first match</b>. Unlike additive permission systems, <b>order is everything</b>: a broad rule placed above a specific one silently prevents the specific rule from ever firing.</div>
    <h3>Designing layered rules</h3>
    <p>The reliable pattern is <b>most-specific and most-restrictive first, broadest last</b>:</p>
    <ul>
      <li><b>Hard denies first</b> — e.g. block contractors from untrusted networks. If this isn\u2019t at the top, a later allow could let them in before the deny is reached.</li>
      <li><b>Step-up (MFA) rules next</b> — e.g. require MFA whenever off the trusted network. Must sit above any plain "allow employees," or employees off-network would be allowed without the step-up.</li>
      <li><b>Plain allows</b> — e.g. allow employees on trusted devices.</li>
      <li><b>Catch-all last</b> — a final allow or deny that defines the default.</li>
    </ul>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The ordering bug that bites everyone:</b> put "Allow employees" above "Require MFA off-network" and employees working remotely sail in <i>without</i> MFA — the MFA rule is never reached for them. The policy looks correct line by line; only the <i>order</i> is wrong. This is why you test a policy against many scenarios, not one.</div></div>
    <h3>How you verify</h3>
    <p>You never trust a layered policy by eye. You run a battery of representative sign-ins — each persona × network × device combination — and confirm every one resolves as intended. That\u2019s exactly the lab.</p>`,
    example:`<p>The same four rules in two orders. One is correct; one silently lets remote employees skip MFA. Spot the difference.</p>
    <div class="example-wrap"><div class="example-label">Worked example · order changes everything</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">okta · sign-on order</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#f87171">WRONG ORDER</span>
  1 Allow employees                → employee, remote: <span style="color:#f87171">ALLOWED (no MFA!) ✗</span>
  2 Require MFA off-network         (never reached for employees)
  3 Block untrusted contractors
  4 Catch-all allow

<span style="color:#34d399">RIGHT ORDER</span>
  1 Block untrusted contractors    → contractor, remote: <span style="color:#34d399">DENY ✓</span>
  2 Require MFA off-network         → employee, remote: <span style="color:#34d399">MFA ✓</span>
  3 Allow employees                → employee, office: <span style="color:#34d399">ALLOW ✓</span>
  4 Catch-all allow                → guest, office: <span style="color:#34d399">ALLOW ✓</span></div></div></div>
    <p>Every line is identical between the two — only the sequence differs, and that sequence is the entire security posture. In the lab you\u2019ll reorder a layered policy until all sign-in scenarios pass.</p></div>`,
    lab:{ kind:'okta', id:'05.6',
      title:'Order a layered sign-on policy',
      objective:'Reorder the rules so every sign-in test resolves correctly: untrusted contractors blocked, anyone off the trusted network stepped up to MFA, employees on-network allowed, and a guest on-network allowed by the catch-all. Remember: first match wins.',
      intro:'',
      rules:[
        {name:'Allow employees', ifGroup:'Employees', action:'ALLOW'},
        {name:'Block untrusted contractors', ifGroup:'Contractors', ifZone:'untrusted', action:'DENY'},
        {name:'Require MFA off-network', ifZone:'untrusted', action:'MFA'},
        {name:'Catch-all allow', action:'ALLOW'}
      ],
      tests:[
        {label:'Contractor · untrusted network', ctx:{group:'Contractors',trusted:false,managed:false}, want:'DENY'},
        {label:'Employee · untrusted (remote)', ctx:{group:'Employees',trusted:false,managed:true}, want:'MFA'},
        {label:'Employee · trusted office', ctx:{group:'Employees',trusted:true,managed:true}, want:'ALLOW'},
        {label:'Guest · trusted office', ctx:{group:'Guest',trusted:true,managed:false}, want:'ALLOW'}
      ]},
    quiz:[
      {q:'Okta evaluates app sign-on rules:',
       o:['All at once, additively','Top-down, first match wins','Bottom-up','Randomly'],a:1,
       e:'First match wins means order is decisive — the first rule whose conditions match determines the outcome and evaluation stops.'},
      {q:'Putting "Allow employees" above "Require MFA off-network" causes:',
       o:['Nothing','Remote employees to be allowed without the MFA step-up','Faster logins for all','Contractors to be blocked'],a:1,
       e:'The allow matches first for employees, so the MFA rule is never reached — remote employees skip the step-up. A classic ordering bug.'},
      {q:'The safe ordering pattern for layered sign-on rules is:',
       o:['Broadest first','Most-specific/most-restrictive first, catch-all last','Alphabetical','Newest first'],a:1,
       e:'Denies and step-ups go on top so they\u2019re reached before broad allows; the catch-all sits last as the default.'},
      {q:'You verify a layered policy by:',
       o:['Reading it once','Running many representative sign-in scenarios and checking each outcome','Asking a colleague','Trusting it'],a:1,
       e:'Because order interactions are subtle, you test the full matrix of personas/networks/devices rather than eyeballing the rules.'}
    ]}
  ]},
/* ===================== MODULE 06 — Access Governance & Certifications ===================== */
{ id:'M06', num:'06', title:'Access Governance & Certifications', sub:'4 lessons · IGA · SoD · reviews',
  blurb:'The governance layer that catches what automation misses. Why access drifts, how Separation of Duties stops fraud, how certification campaigns produce audit evidence, and how the whole thing maps to risk.',
  lessons:[
  /* ---------------- 06.1 ---------------- */
  { id:'06.1', num:'06.1', title:'What governance is and why it exists', minutes:8,
    dek:'Provisioning grants access. Governance answers the harder question nobody likes: should this access still exist at all?',
    concept:`<p>You can automate joiners, movers, and leavers perfectly and <i>still</i> end up with a dangerous mess. Why? Because automation enforces the rules you wrote, but it never asks whether the access it granted is <b>still appropriate</b> months later. That question is the entire job of governance.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Identity Governance &amp; Administration (IGA)</div>The discipline (and tooling — SailPoint, Saviynt, Entra ID Governance) that gives an organization visibility into <b>who has access to what</b>, <b>why</b>, and the controls to review, certify, and remediate that access over time.</div>
    <h3>The problem governance solves: drift</h3>
    <p>Access is granted at a moment in time for a reason. But reasons expire and nobody tells the access:</p>
    <ul>
      <li>A project ends, but the project's shared-drive access lingers.</li>
      <li>Someone covers a colleague's leave, gets temporary access, and keeps it for three years.</li>
      <li>A contractor's engagement ends but their accounts aren't fully cleaned up.</li>
    </ul>
    <p>This slow accumulation is <b>privilege creep</b> (you met it in Module 01). Governance is the immune system that periodically hunts down and removes it.</p>
    <div class="analogy"><div class="al">Think of it like</div>A building's keycard audit. Provisioning is handing out keycards on someone's first day. Governance is the security team that, every quarter, prints the list of everyone who can open the server room and walks it to each manager asking, "Do these people still need this? Initial here." The ones nobody will vouch for get their access pulled. No new doors are built — existing access is re-justified or removed.</div>
    <h3>The three pillars of governance</h3>
    <ul>
      <li><b>Visibility</b> — a single picture of every identity's access across all systems (the "who has what").</li>
      <li><b>Certification</b> — periodic campaigns where owners re-attest that access is still needed.</li>
      <li><b>Policy</b> — rules that flag risky combinations and out-of-pattern access automatically (e.g. Separation of Duties).</li>
    </ul>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> "We don't actually know who has access to what" is the quiet admission behind most governance projects. Before any certification can run, IGA tools spend months just <b>aggregating</b> entitlements from dozens of systems into one model. Visibility is step zero — you can't govern what you can't see.</div></div>`,
    example:`<p>Here's the governance view of one over-permissioned identity — the kind of picture an IGA tool assembles so a reviewer can make a decision.</p>
    <div class="example-wrap"><div class="example-label">Worked example · an access profile under review</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">iga · access-profile · ben.cole</div><div class="chip">GOVERNANCE</div></div>
    <div class="console-body"><table class="dt"><tr><th>Entitlement</th><th>Granted</th><th>Last used</th><th>Status</th></tr>
    <tr><td><code>salesforce:rep</code></td><td>on hire</td><td>2 days ago</td><td><span class="st-badge g">active</span></td></tr>
    <tr><td><code>github:write</code></td><td>old Eng role</td><td>411 days ago</td><td><span class="st-badge a">stale</span></td></tr>
    <tr><td><code>aws:prod-deploy</code></td><td>old Eng role</td><td>411 days ago</td><td><span class="st-badge r">stale + risky</span></td></tr>
    <tr><td><code>approvals:approve</code></td><td>new Mgr role</td><td>1 day ago</td><td><span class="st-badge g">active</span></td></tr></table>
    <div style="margin-top:10px;font-size:12.5px;color:#94a3b8">Ben moved from Engineering to a Finance manager role over a year ago. The two <code>github</code>/<code>aws</code> grants are leftovers — unused for 411 days. Worse, <code>aws:prod-deploy</code> next to a finance approval right is the seed of a Separation-of-Duties problem (next lesson). Governance surfaces exactly this so a human can decide to revoke.</div></div></div></div>`,
    lab:{ kind:'classify', id:'06.1', mode:'gov',
      title:'Provisioning or governance?',
      objective:'Decide whether each activity belongs to <b>Provisioning</b> (creating/granting access) or <b>Governance</b> (reviewing whether access should still exist). The two are different jobs and often different teams.',
      intro:'Tag each task. All correct to pass.',
      threeway:['Provisioning','Governance'],
      twoway:true,
      items:[
        {t:'A new hire is automatically given the standard Sales app bundle on day one.',layer:'Provisioning'},
        {t:'Every quarter, managers re-confirm that their reports still need admin access.',layer:'Governance'},
        {t:'A report lists everyone who can approve payments, flagged for review.',layer:'Governance'},
        {t:'SCIM creates a Salesforce account when a user is assigned to the app.',layer:'Provisioning'},
        {t:'Access unused for 90+ days is surfaced for possible removal.',layer:'Governance'}
      ]},
    quiz:[
      {q:'Identity Governance primarily answers which question?',
       o:['How fast can we create accounts?','Should this access still exist, and can we prove it?','What is the user\u2019s password?','Which network is fastest?'],a:1,
       e:'Provisioning grants access; governance continuously re-justifies it and produces the evidence that it\u2019s appropriate.'},
      {q:'The slow accumulation of access as people change roles is called:',
       o:['Privilege creep','Token expiry','Clock skew','Federation'],a:0,
       e:'Privilege creep is exactly what certification campaigns and access reviews are designed to find and remove.'},
      {q:'Why is "visibility" called step zero of governance?',
       o:['It looks nice','You cannot review or certify access you can\u2019t even see aggregated','It speeds up logins','It encrypts data'],a:1,
       e:'IGA tools must first aggregate entitlements from every system into one model. Without that single picture, no meaningful review is possible.'}
    ]},
  /* ---------------- 06.2 ---------------- */
  { id:'06.2', num:'06.2', title:'Separation of Duties (SoD)', minutes:9,
    dek:'The control that stops one person from quietly committing fraud. If you remember one governance concept for interviews, make it this one.',
    concept:`<p>Some combinations of access are dangerous not because either permission is bad, but because <b>one person holding both</b> can do harm with no one watching.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Separation of Duties (SoD)</div>A control that prevents a single identity from holding a <b>toxic combination</b> of permissions — typically the ability to both <i>initiate</i> and <i>approve</i> the same sensitive action. The classic: whoever <b>creates</b> a payment must not also be able to <b>approve</b> it.</div>
    <h3>Why "create + approve" is the canonical example</h3>
    <p>If Amy can both enter an invoice <i>and</i> approve it for payment, she can invent a fake vendor, bill the company, approve her own invoice, and route the money to herself — with zero second pair of eyes. Splitting those two duties across two people means fraud requires <b>collusion</b>, which is far rarer and far easier to detect.</p>
    <div class="analogy"><div class="al">Think of it like</div>Nuclear launch requiring two officers turning two keys at opposite ends of the room. Neither can act alone. The point isn't distrust of either officer — it's that no single mistake or single bad actor can cause a catastrophe.</div>
    <h3>SoD beyond finance</h3>
    <ul>
      <li><b>Dev + Prod:</b> the engineer who writes code shouldn't be the only one who can deploy it to production unreviewed.</li>
      <li><b>Identity admin + approver:</b> whoever can create accounts shouldn't also approve access requests.</li>
      <li><b>HR record + payroll:</b> whoever can add an employee shouldn't also be able to pay them.</li>
    </ul>
    <div class="callout warn"><span class="ic">⚠️</span><div>SoD violations most often appear during <b>movers</b>. Someone changes roles, keeps the old duties, gains new ones — and the <i>combination</i> across old and new is the toxic pair. Neither role alone is wrong; the union is. This is why mover hygiene (Module 04) and governance (this module) are two halves of the same fight.</div></div>
    <h3>What you do about it</h3>
    <p>An IGA tool runs SoD <b>policies</b> (rule pairs) continuously and flags any identity holding both halves. The remediation is to remove one half, or — if the access is genuinely needed — to put a documented <b>compensating control</b> in place (e.g. all of that person's approvals get a mandatory secondary review).</p>`,
    example:`<p>Below, an SoD policy engine scans three identities. Watch it match permission pairs, not single permissions.</p>
    <div class="example-wrap"><div class="example-label">Worked example · SoD policy scan</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">sod-scan</div></div>
    <div class="console-body"><div class="mono-out">policy: "Create + Approve Payments" = <span style="color:#22d3ee">sap:fi-display</span> + <span style="color:#22d3ee">approvals:approve</span>

amy   : [sap:fi-display, concur:user]                    → has 1 of 2  → <span style="color:#34d399">clean</span>
ben    : [salesforce:rep, approvals:approve, sap:fi-display] → has BOTH  → <span style="color:#f87171">VIOLATION (critical)</span>
carla  : [workday:hr-admin, greenhouse:recruiter]          → matches HR pair → <span style="color:#fbbf24">VIOLATION (medium)</span>

ben needs remediation: remove sap:fi-display OR approvals:approve,
                       or attach a compensating control (mandatory 2nd reviewer).</div></div></div>
    <p>Notice Amy is fine even though she holds <code>sap:fi-display</code> — because she lacks the second half of the pair. SoD is about <b>combinations</b>, never single permissions. In the lab you'll run this review yourself.</p></div>`,
    lab:{ kind:'sod', id:'06.2',
      title:'Run an SoD review',
      objective:'Review each identity and flag exactly the ones holding a <b>toxic combination</b>. Flag every true violation and nothing else — false positives erode trust in the program just as much as misses.',
      intro:'',
      identities:[
        {name:'Amy Rao', title:'AP Clerk', ents:['sap:fi-display','concur:user','okta:sso']},
        {name:'Ben Cole', title:'Finance Mgr (ex-Eng)', ents:['sap:fi-display','approvals:approve','salesforce:rep']},
        {name:'Dana Wu', title:'DevOps', ents:['github:write','aws:prod-deploy','jira:user']},
        {name:'Evan Hill', title:'Sales Rep', ents:['salesforce:rep','gong:user','okta:sso']},
        {name:'Carla Diaz', title:'HR Generalist', ents:['workday:hr-admin','greenhouse:recruiter']}
      ]},
    quiz:[
      {q:'Separation of Duties is designed primarily to prevent:',
       o:['Slow logins','One person both initiating and approving the same sensitive action','Password reuse','Network outages'],a:1,
       e:'SoD blocks toxic combinations — most classically create + approve — so that harmful action requires collusion rather than a single actor.'},
      {q:'Amy holds only sap:fi-display (create). Is that an SoD violation by itself?',
       o:['Yes, always','No — a violation requires holding BOTH halves of a toxic pair','Only on weekends','Only if she\u2019s an admin'],a:1,
       e:'SoD is about combinations. A single permission is never a violation; it\u2019s the union of two conflicting duties that is.'},
      {q:'SoD violations most commonly appear during which lifecycle event?',
       o:['Joiner','Mover','Login','Password reset'],a:1,
       e:'Movers keep old duties and gain new ones; the conflicting combination spans both. Clean mover handling and SoD policies together prevent this.'},
      {q:'If conflicting access is genuinely required, the accepted alternative to removal is:',
       o:['Ignore it','A documented compensating control (e.g. mandatory secondary review)','Delete the user','Disable logging'],a:1,
       e:'When you can\u2019t separate the duties, you mitigate the risk with a compensating control and document it for auditors.'}
    ]},
  /* ---------------- 06.3 ---------------- */
  { id:'06.3', num:'06.3', title:'Running a certification campaign', minutes:9,
    dek:'The recurring ritual where access gets re-justified or revoked. Done well it produces airtight audit evidence; done badly it\u2019s rubber-stamping.',
    concept:`<p>A <b>certification campaign</b> (also "access review" or "attestation") is a time-boxed exercise where reviewers go line by line through who-has-what and decide: keep it, or pull it.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Access Certification</div>A periodic campaign in which the appropriate owner reviews each access grant and explicitly <b>certifies</b> (approves) or <b>revokes</b> it, creating a dated, signed record that the access was deliberately re-authorized.</div>
    <h3>Who reviews what</h3>
    <ul>
      <li><b>Manager certification</b> — your manager reviews your access ("does my report need this?").</li>
      <li><b>Application-owner certification</b> — the owner of, say, Salesforce reviews everyone who has access to it.</li>
      <li><b>Role certification</b> — someone reviews what permissions a <i>role</i> bundles, since fixing the role fixes everyone in it.</li>
    </ul>
    <h3>The signals a good reviewer uses</h3>
    <p>A reviewer staring at a raw list will rubber-stamp everything. A good campaign hands them <b>decision signals</b>:</p>
    <ul>
      <li><b>Last-used date</b> — access unused for 90+ days is a prime revoke candidate.</li>
      <li><b>SoD flags</b> — anything carrying a toxic-combination flag should be revoked or mitigated now.</li>
      <li><b>Outlier detection</b> — "nobody else on this team has this; why does Sam?"</li>
      <li><b>High-risk markers</b> — privileged or sensitive entitlements get extra scrutiny.</li>
    </ul>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The rubber-stamp trap:</b> the most common audit failure isn't skipping reviews — it's reviews where managers click "approve all" in thirty seconds. Auditors specifically test for this. A campaign that revokes <i>nothing</i> across thousands of grants is a red flag, not a success. Real reviews always remove some access.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> The output of a campaign is the point. When an auditor asks "prove only appropriate people had access to the financial system in Q2," you hand them the signed, dated certification record. That artifact is what turns "we think it's fine" into "here is the evidence." Producing it is a core, resume-worthy IAM deliverable.</div></div>`,
    example:`<p>Here's a campaign worklist with the signals attached, and the defensible decision for each row.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a certification worklist</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">campaign · Q2-finance-access</div><div class="chip">CERTIFY</div></div>
    <div class="console-body"><table class="dt"><tr><th>User / access</th><th>Last used</th><th>Flag</th><th>Defensible call</th></tr>
    <tr><td>amy / <code>concur:user</code></td><td>3d ago</td><td>—</td><td><span class="st-badge g">approve — active &amp; clean</span></td></tr>
    <tr><td>ben / <code>aws:prod-deploy</code></td><td>411d ago</td><td>—</td><td><span class="st-badge r">revoke — unused &gt;90d</span></td></tr>
    <tr><td>ben / <code>approvals:approve</code></td><td>1d ago</td><td>SoD</td><td><span class="st-badge r">revoke — toxic combo</span></td></tr>
    <tr><td>sam / <code>sap:fi-display</code></td><td>10d ago</td><td>—</td><td><span class="st-badge g">approve — active &amp; clean</span></td></tr></table>
    <div style="margin-top:10px;font-size:12.5px;color:#94a3b8">Two approvals, two revokes — the campaign actually removed risk (a stale prod entitlement and an SoD half). That mix of decisions is what a healthy review looks like, and the signed result is the audit evidence.</div></div></div></div>`,
    lab:{ kind:'cert', id:'06.3',
      title:'Certify the access',
      objective:'Work the campaign worklist. <b>Approve</b> access that is active and clean; <b>revoke</b> anything unused over 90 days or carrying an SoD flag. Get every call right to produce a defensible result.',
      intro:'',
      items:[
        {user:'amy', ent:'concur:user', unusedDays:3, sodFlag:false},
        {user:'ben', ent:'aws:prod-deploy', unusedDays:411, sodFlag:false},
        {user:'ben', ent:'approvals:approve', unusedDays:1, sodFlag:true},
        {user:'sam', ent:'sap:fi-display', unusedDays:10, sodFlag:false},
        {user:'dana', ent:'github:write', unusedDays:140, sodFlag:false}
      ]},
    quiz:[
      {q:'A certification campaign produces, as its key output:',
       o:['A faster network','Dated, signed evidence that access was deliberately re-authorized','New passwords','More storage'],a:1,
       e:'The audit artifact is the point: it proves access was reviewed and re-justified by the right owner at a known time.'},
      {q:'Which signal most strongly suggests an access grant should be revoked during review?',
       o:['It was used today','It has been unused for 90+ days or carries an SoD flag','The user has a long name','It was granted recently'],a:1,
       e:'Staleness (long-unused) and SoD flags are the clearest revoke candidates a reviewer acts on.'},

  { id:'06.4', num:'06.4', title:'Risk, roles & the governance operating model', minutes:8,
    dek:'Tying it together: how governance prioritizes by risk, fixes problems at the role level, and runs as a continuous program rather than a once-a-year scramble.',
    concept:`<p>Mature governance isn't a frantic annual audit — it's a steady operating model that focuses effort where risk is highest and fixes root causes, not symptoms.</p>
    <h3>Prioritize by risk, not by volume</h3>
    <p>You cannot review everything with equal intensity. Risk-based governance certifies <b>privileged and sensitive access more often and more carefully</b> than low-risk access. The admin of the financial system gets reviewed quarterly with scrutiny; read access to the lunch-menu app might get a light annual touch — or be auto-approved by policy.</p>
    <div class="keyterm"><div class="kt-label">Core idea</div><div class="kt-term">Risk-based certification</div>Review frequency and rigor scale with the risk of the access. High-privilege, high-sensitivity, and SoD-relevant entitlements get frequent, careful review; low-risk access gets light-touch or policy-based handling.</div>
    <h3>Fix it at the role, not the person</h3>
    <p>If a certification keeps revoking the same stray permission from fifty people, the real bug is in the <b>role</b> that grants it. Role-level remediation — cleaning up what a role bundles — fixes the problem for everyone at once and stops it recurring. This is where governance loops back into RBAC design (Module 03): good roles make governance easy; sloppy roles make it endless.</p>
    <div class="analogy"><div class="al">Think of it like</div>A leak in an apartment building. You can keep mopping the floor of every unit below (revoking from each person), or you can fix the burst pipe (the over-broad role) once. Governance maturity is learning to look up at the pipe.</div>
    <h3>The continuous loop</h3>
    <ul>
      <li><b>Aggregate</b> access from all systems (visibility).</li>
      <li><b>Detect</b> risk continuously — SoD, outliers, stale access, over-broad roles.</li>
      <li><b>Certify</b> on a risk-based cadence.</li>
      <li><b>Remediate</b> — preferably at the role level.</li>
      <li><b>Evidence</b> — keep the signed records for audit.</li>
      <li>…and repeat. Governance is a program, not a project.</li>
    </ul>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> The phrase you\u2019ll hear is "least privilege is a journey, not a destination." Orgs don\u2019t reach perfect access and stop. They run the loop above forever, tightening each cycle. Understanding governance as a continuous operating model — and being able to describe this loop — is exactly what distinguishes a junior from a mid-level IAM engineer in interviews.</div></div>`,
    example:`<p>One stray permission shows up across many reviews. Watch the difference between treating the symptom and treating the cause.</p>
    <div class="example-wrap"><div class="example-label">Worked example · person-level vs role-level remediation</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">remediation.strategy</div></div>
    <div class="console-body"><div class="mono-out">finding: 50 "Sales Rep" users all carry <span style="color:#f87171">billing:write</span> — none use it.

<span style="color:#fbbf24">SYMPTOM FIX (person-level)</span>
  revoke billing:write from rep #1 … rep #50   (50 actions)
  next quarter: new reps onboard with it again  → problem returns 🔁

<span style="color:#34d399">ROOT FIX (role-level)</span>
  remove billing:write from the "Sales Rep" ROLE definition   (1 action)
  → all 50 lose it now, and every future rep never gets it     ✓ permanent</div></div></div>
    <p>Same outcome today, completely different tomorrow. Role-level remediation is the mark of governance maturity — and it\u2019s only possible if your roles are well-designed in the first place, which is why Module 03 and this module are two ends of one rope.</p></div>`,
    lab:{ kind:'quizonly', id:'06.4',
      title:'Governance judgment',
      objective:'These are the prioritization and remediation calls a governance program lives or dies on. Answer every question correctly to complete the lab.',
      intro:''},
    quiz:[
      {q:'Risk-based certification means:',
       o:['Review everything equally','Review high-risk/privileged access more often and carefully than low-risk access','Never review anything','Review only on holidays'],a:1,
       e:'You focus scarce review effort where the risk is greatest; low-risk access gets light-touch or policy-based handling.'},
      {q:'A certification keeps revoking the same permission from 50 people every cycle. The mature fix is:',
       o:['Revoke faster each time','Remove the permission from the ROLE so it stops being granted at all','Ignore it','Disable the campaign'],a:1,
       e:'Role-level remediation fixes the root cause for everyone at once and prevents recurrence — far better than repeatedly treating the symptom.'},
      {q:'"Least privilege is a journey, not a destination" implies governance is:',
       o:['A one-time project','A continuous, repeating operating loop','Unnecessary','Only for banks'],a:1,
       e:'Mature governance runs aggregate \u2192 detect \u2192 certify \u2192 remediate \u2192 evidence continuously, tightening each cycle rather than finishing once.'},
      {q:'Well-designed RBAC roles make governance:',
       o:['Harder','Easier — clean roles mean fewer outliers and simpler role-level fixes','Impossible','Slower'],a:1,
       e:'Governance and RBAC design reinforce each other: tight roles produce less drift and let you remediate at the role level instead of per person.'}
    ]},
  { id:'06.5', num:'06.5', title:'Access risk review: dormant, orphaned & missed terminations', minutes:10,
    dek:'The proactive hunt for dangerous access hiding in AD and Okta: stale accounts, ownerless accounts, and leavers who never left. A core day-to-day IAM responsibility.',
    concept:`<p>Certification campaigns (06.3) are scheduled and broad. <b>Access risk review</b> is the targeted, ongoing hunt for specific dangerous patterns in your directories \u2014 and it\u2019s a named responsibility on IAM job descriptions: "review and analyze Active Directory and Okta Universal Directory accounts to detect high-risk access, dormant accounts, and missed terminations."</p>
    <div class="keyterm"><div class="kt-label">Core idea</div><div class="kt-term">Hunting for risky access</div>Rather than wait for a quarterly review, you continuously scan directory data for accounts that <i>shouldn\u2019t</i> look the way they do: still-active leavers, long-dormant logins, ownerless accounts, and privileged accounts without MFA. Each is a foothold an attacker would love.</div>
    <h3>The high-risk patterns to detect</h3>
    <ul>
      <li><b>Missed terminations</b> \u2014 active accounts for workers HR shows as terminated. The single most dangerous finding: an ex-employee (or whoever took over their credentials) with live access. <span style="color:#22d3ee">Action: disable immediately.</span></li>
      <li><b>Orphaned accounts</b> \u2014 accounts with no matching identity or owner (often the duplicate-identity problem from Module 10, or service accounts whose owner left). Nobody is accountable for them. <span style="color:#22d3ee">Action: reassign or disable.</span></li>
      <li><b>Dormant accounts</b> \u2014 no sign-in for 90+ days. Unused access is pure risk with no benefit; it\u2019s a quiet target. <span style="color:#22d3ee">Action: review for removal.</span></li>
      <li><b>Privileged without MFA</b> \u2014 an admin account not enrolled in MFA. High power, weak protection. <span style="color:#22d3ee">Action: remediate now.</span></li>
    </ul>
    <h3>Where the data comes from</h3>
    <p>This is where your automation skills (Module 12) pay off: you pull account data from AD and Okta Universal Directory (often via PowerShell/Graph or the Okta API), reconcile against HR (the set-difference script from 12.3 finds missed terminations), and produce a findings list. The review is judgment; the data-gathering is scripting. Then you <b>document and track mitigating controls</b> \u2014 turning findings into evidence, the governance discipline from 06.3.</p>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>Severity drives speed:</b> not every finding is equal. A missed termination is <b>critical</b> \u2014 act in hours. An admin without MFA or an orphaned account is <b>high</b> \u2014 remediate now. A dormant account is <b>medium</b> \u2014 schedule for review. Triaging by severity is what separates a useful audit from an undifferentiated list nobody acts on.</div></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the JD:</b> "detect high-risk access, dormant accounts, and missed terminations; document and track mitigating controls" is a verbatim responsibility. This lesson is that exact task. It\u2019s also where your governance background and new IAM/scripting skills visibly converge \u2014 a strong story to tell.</div></div>`,
    example:`<p>A risk review over five directory accounts, each triaged by the pattern it matches and the severity that sets the response.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 triaging an access-risk review</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">access-risk \u00b7 AD + Okta UD scan</div><div class="chip">GOVERNANCE</div></div>
    <div class="console-body"><div class="mono-out">account            signal                              \u2192 finding
svc-legacy         no owner, HR has no match           \u2192 <span style="color:#f87171">HIGH: orphaned \u2014 reassign/disable</span>
b.cole             HR=terminated, account still ACTIVE  \u2192 <span style="color:#f87171">CRITICAL: missed termination \u2014 disable now</span>
a.rao              admin role, no MFA enrolled          \u2192 <span style="color:#f87171">HIGH: privileged w/o MFA \u2014 enroll/disable</span>
j.kim              last login 210 days ago             \u2192 <span style="color:#fbbf24">MEDIUM: dormant \u2014 review for removal</span>
d.osei             active, login 2d, MFA on             \u2192 <span style="color:#34d399">OK: healthy \u2014 keep</span>

triage by severity: critical in hours, high now, medium scheduled</div></div></div>
    <p>Five accounts, four distinct risk patterns, one healthy. Notice the critical missed-termination jumps the queue. In the lab you\u2019ll run this audit yourself, tagging each account keep / review / remediate by its risk.</p></div>`,
    lab:{ kind:'accessrisk', id:'06.5',
      title:'Run an access-risk audit',
      objective:'Audit these AD / Okta Universal Directory accounts. Tag each: <b>Keep</b> (healthy), <b>Review</b> (dormant, medium risk), or <b>Remediate</b> (high/critical \u2014 missed termination, orphaned, or privileged-without-MFA). All correct to pass.',
      intro:'',
      accounts:[
        {name:'b.cole', terminatedInHR:true, status:'active', isAdmin:false, lastLoginDays:5},
        {name:'svc-legacy', orphaned:true, status:'active', isAdmin:false},
        {name:'a.rao', isAdmin:true, mfaEnrolled:false, status:'active', lastLoginDays:3},
        {name:'j.kim', status:'active', isAdmin:false, lastLoginDays:210},
        {name:'d.osei', status:'active', isAdmin:false, lastLoginDays:2},
        {name:'p.singh', status:'active', isAdmin:true, mfaEnrolled:true, lastLoginDays:1}
      ]},
    quiz:[
      {q:'The most severe (critical) access-risk finding is:',
       o:['A dormant account','An active account for an HR-terminated worker (missed termination)','A user with a long name','An account with MFA'],a:1,
       e:'A still-active leaver is the most dangerous \u2014 live access for someone who should have none. Disable immediately.'},
      {q:'An "orphaned" account is one that:',
       o:['Has too much access','Has no matching identity or accountable owner','Was just created','Uses SMS MFA'],a:1,
       e:'Orphaned accounts (no owner/identity match) have nobody accountable for them and should be reassigned or disabled.'},
      {q:'A privileged (admin) account not enrolled in MFA should be rated:',
       o:['Low \u2014 ignore it','High \u2014 remediate now (enroll MFA or disable)','It\u2019s fine','Critical only on weekends'],a:1,
       e:'High power with weak protection is a high-severity finding; enroll MFA immediately or disable the account.'},
      {q:'Triaging findings by severity matters because:',
       o:['It looks tidy','It tells you what to fix in hours vs. now vs. on a schedule \u2014 turning a list into action','It\u2019s required by law','It speeds logins'],a:1,
       e:'Severity drives response time: critical (missed termination) in hours, high now, medium scheduled \u2014 so the dangerous items aren\u2019t lost in noise.'}
    ]},
  { id:'06.6', num:'06.6', title:'Okta Identity Governance (OIG) in practice', minutes:9,
    dek:'Governance as a product: access requests, approvals, and certification campaigns inside Okta. The named tool on Okta governance job descriptions.',
    concept:`<p>Module 06 taught governance concepts and Module 09 showed Entra\u2019s Access Reviews. <b>Okta Identity Governance (OIG)</b> is Okta\u2019s governance product \u2014 explicitly named in job descriptions ("support user access governance activities using Okta Identity Governance"). It brings access requests, approvals, and certifications into the Okta platform you already know.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Okta Identity Governance (OIG)</div>Okta\u2019s governance layer, adding <b>Access Requests</b> (self-service requests routed for approval), <b>Access Certifications</b> (periodic review campaigns), and governance reporting on top of Okta\u2019s lifecycle and directory. It turns ad-hoc "email your manager for access" into a governed, audited, policy-driven workflow.</div>
    <h3>The two pillars you\u2019ll touch</h3>
    <ul>
      <li><b>Access Requests</b> \u2014 a user requests access to an app or role through a catalog; the request routes to the right <b>approver</b> (manager, app owner), can require <b>justification</b>, can enforce <b>SoD checks</b> (block a toxic combination from 06.2), and can be <b>time-bound</b> so it auto-expires. This replaces untracked grants with a governed pipeline.</li>
      <li><b>Access Certifications</b> \u2014 the campaign engine from 06.3, native in Okta: reviewers periodically attest that access is still needed, with the signals and auto-revoke you learned, producing the audit evidence for SOC 2 / ISO 27001 / SOX.</li>
    </ul>
    <h3>Why it matters operationally</h3>
    <p>OIG closes the loop you\u2019ve built across the course: lifecycle (Okta provisioning) grants birthright access, OIG <b>Access Requests</b> govern the extra access people ask for, and OIG <b>Certifications</b> periodically re-justify all of it. Every grant has an approver, a reason, and an expiry; every campaign produces evidence. It\u2019s the governance operating model from 06.4, implemented as Okta features.</p>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the JD &amp; bonus points:</b> "support user access reviews and entitlement certifications using Okta Identity Governance (OIG) to ensure alignment with SOC2, ISO 27001, and SOX" \u2014 and OIG experience is listed as a bonus qualification. Knowing OIG = Access Requests + Certifications, with approvals, justification, SoD checks, and time-bound access, is exactly the fluency these roles want. The lab runs a governed access request end to end.</div></div>`,
    example:`<p>An access request flowing through OIG \u2014 governed, checked, and time-bound, versus the old untracked way.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 a governed access request in OIG</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#00297a"></i><i style="background:#22d3ee"></i><i style="background:#34d399"></i></div><div class="title">OIG \u00b7 access request</div><div class="chip">OIG</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#fbbf24">OLD WAY</span>: user emails IT "give me Salesforce admin"
   \u2192 granted on trust, no record, never revisited  <span style="color:#f87171">\u2717 ungoverned</span>

<span style="color:#34d399">OIG WAY</span>: user requests "Salesforce \u2013 Admin" from the catalog
   \u2192 justification required ............. "covering for J. while on leave"
   \u2192 SoD check ......................... no toxic combo \u2713
   \u2192 routes to approver (app owner) .... approved \u2713
   \u2192 granted, <span style="color:#22d3ee">time-bound (30 days, auto-expires)</span>
   \u2192 surfaces in next certification ... re-justify or auto-revoke
   = approver + reason + expiry + evidence  <span style="color:#34d399">\u2713 governed</span></div></div></div>
    <p>Same access, completely different accountability. OIG turns a favor into a governed, audited, self-cleaning grant. In the lab you\u2019ll push a request through this workflow \u2014 supplying justification and approval to get it granted.</p></div>`,
    lab:{ kind:'oig', id:'06.6', resource:'Salesforce \u2013 Admin', requesterHasConflict:false,
      title:'Run a governed access request',
      objective:'Submit an access request through Okta Identity Governance. The policy requires a business justification and approver sign-off, and the grant is time-bound. Provide what\u2019s needed, then submit.',
      intro:'',
      policy:{ requiresApproval:true, approverRole:'app owner', requiresJustification:true, autoExpiresDays:30, sodConflict:true }},
    quiz:[
      {q:'Okta Identity Governance (OIG) primarily adds which capabilities to Okta?',
       o:['Faster login screens','Access Requests (with approval) and Access Certifications','A new firewall','Email hosting'],a:1,
       e:'OIG brings governed access requests/approvals and certification campaigns into the Okta platform.'},
      {q:'An OIG access request can enforce all of these EXCEPT:',
       o:['Requiring a business justification','Routing to an approver','An SoD conflict check','Guaranteeing zero breaches'],a:3,
       e:'OIG can require justification, route approvals, check SoD, and time-bound the grant \u2014 but no control guarantees zero breaches.'},
      {q:'Making an OIG grant time-bound (auto-expiring) helps because:',
       o:['It looks modern','Access cleans itself up and resurfaces for re-justification, preventing creep','It speeds the network','It removes the approver'],a:1,
       e:'Time-bound access auto-expires and reappears in certification, directly fighting privilege creep \u2014 the governance operating model in action.'},
      {q:'OIG certifications support compliance by:',
       o:['Encrypting disks','Producing periodic, signed evidence that access was reviewed (SOC 2 / ISO 27001 / SOX)','Blocking SMS','Rotating passwords'],a:1,
       e:'Certification campaigns generate the dated, attested evidence auditors require under frameworks like SOC 2, ISO 27001, and SOX.'}
    ]}
  ]},

/* ===================== MODULE 07 — CyberArk & Privileged Access ===================== */
{ id:'M07', num:'07', title:'CyberArk & Privileged Access', sub:'4 lessons · PAM · vaults · sessions',
  blurb:'The crown-jewel accounts: root, domain admin, service credentials. Why privileged access needs its own fortress, how vaulting and rotation work, session isolation and recording, and the PAM concepts behind the CyberArk Defender certification.',
  lessons:[
  /* ---------------- 07.1 ---------------- */
  { id:'07.1', num:'07.1', title:'Why privileged access is different', minutes:8,
    dek:'Not all access is equal. A handful of super-powerful accounts can end a company in an afternoon — and they need controls ordinary accounts don\u2019t.',
    concept:`<p>Most IAM treats all identities with one framework. But a small set of accounts are categorically more dangerous, and the discipline that protects them has its own name.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Privileged Access Management (PAM)</div>The specialized discipline (and tooling — CyberArk, BeyondTrust, Delinea) for securing, controlling, and monitoring <b>privileged accounts</b>: the high-power credentials that can change configurations, access all data, or control other accounts.</div>
    <h3>What counts as "privileged"</h3>
    <ul>
      <li><b>Local admin / root</b> — full control of a server or workstation.</li>
      <li><b>Domain Admin</b> — control over an entire Active Directory; the literal keys to the kingdom.</li>
      <li><b>Service accounts</b> — non-human credentials apps use, often with broad rights and rarely rotated.</li>
      <li><b>Cloud root / break-glass</b> — the all-powerful accounts in AWS/Azure/GCP.</li>
      <li><b>Database sysadmin, network device admin, hypervisor admin</b> — infrastructure-level power.</li>
    </ul>
    <h3>Why ordinary controls aren\u2019t enough</h3>
    <p>A normal user account, if phished, exposes one person\u2019s access. A <b>Domain Admin</b> account, if phished, can mean total compromise — the attacker can create accounts, disable security, and move everywhere. The blast radius is the whole organization. Attackers know this: nearly every major breach involves the capture and abuse of privileged credentials at some stage.</p>
    <div class="analogy"><div class="al">Think of it like</div>A bank. Customer accounts (ordinary users) have normal locks. But the <b>vault</b> — and the master keys to it — get a completely different regime: time locks, dual control, cameras pointed at the door, and a log of every entry. PAM is that vault regime applied to your most powerful credentials.</div>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The standing-privilege problem:</b> the worst pattern is powerful credentials that exist <b>permanently</b>, are <b>shared</b> among admins, are <b>never rotated</b>, and whose use is <b>never recorded</b>. A leaked password to such an account is a skeleton key that works forever and leaves no trace. Everything in PAM exists to dismantle that pattern.</div></div>`,
    example:`<p>Compare the blast radius of a phish against an ordinary account versus a privileged one. The asymmetry is the entire justification for PAM.</p>
    <div class="example-wrap"><div class="example-label">Worked example · blast radius comparison</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">blast-radius.compare</div></div>
    <div class="console-body"><div class="mono-out">scenario: attacker phishes one credential

<span style="color:#fbbf24">ORDINARY USER</span>  (sales rep)
  attacker gains : that rep's Salesforce + email
  contained by   : least privilege — they can\u2019t reach finance, infra, or other users
  impact         : <span style="color:#fbbf24">one account's worth of data</span>

<span style="color:#f87171">DOMAIN ADMIN</span>  (privileged)
  attacker gains : create/delete any account, disable defenses,
                   reach every server and database
  contained by   : nothing — this account IS the control plane
  impact         : <span style="color:#f87171">potential total organizational compromise</span></div></div></div>
    <p>Same single phish, wildly different outcomes. PAM accepts that privileged accounts will occasionally be targeted and makes each one as hard to capture, as short-lived, and as observable as possible — so that even a successful phish yields little.</p></div>`,

  { id:'07.2', num:'07.2', title:'The vault: checkout, rotation, zero standing knowledge', minutes:9,
    dek:'The core CyberArk mechanic. Nobody knows the password — they borrow it, it\u2019s watched, and it\u2019s changed the moment they\u2019re done.',
    concept:`<p>The central idea of a privileged-access vault is radical: <b>humans stop knowing privileged passwords at all.</b> The vault knows them; people borrow them under control.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Credential Vault</div>A hardened, encrypted store (CyberArk\u2019s is the Digital Vault) that holds privileged credentials. Access is brokered: users <b>check out</b> a credential when needed, their use is recorded, and the credential is <b>rotated</b> (changed) afterward so what they saw no longer works.</div>
    <h3>The checkout flow</h3>
    <ul>
      <li><b>Request / check-out</b> — an admin asks the vault for a credential, often with MFA and a reason. The vault grants <b>exclusive</b> access (no two people use it at once).</li>
      <li><b>Use under control</b> — ideally the admin never even sees the password; the vault injects it into an isolated session (next lesson).</li>
      <li><b>Check-in</b> — when done, the credential is returned.</li>
      <li><b>Rotation</b> — the vault immediately <b>changes the password</b> to a new random value. Whatever the admin might have seen or captured is now dead.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">The payoff</div><div class="kt-term">Zero standing knowledge</div>Because credentials are rotated after every use (and on a schedule), no human carries a privileged password in their head or notes. There is no static secret to phish, shoulder-surf, or leak — the value is valid only for the brief, watched window it was checked out.</div>
    <div class="analogy"><div class="al">Think of it like</div>A valuable library book that can\u2019t leave the building. You don\u2019t get your own copy. You request it at the desk (check-out), a librarian watches you read it in the room (session), you return it (check-in), and — the magic part — the moment you hand it back, the book\u2019s contents rewrite themselves (rotation). Memorizing it does you no good; next reader gets a different book.</div>
    <h3>Why rotation is the linchpin</h3>
    <p>Without rotation, checkout is just a fancy password-sharing system — once someone sees the value, they can use it later, off the record. <b>Rotation after check-in</b> is what makes the borrowed credential worthless the instant it\u2019s returned. It\u2019s the difference between "we lent it out" and "we lent it out and then changed the locks."</p>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>Exclusive checkout matters too:</b> if two admins could hold the same credential simultaneously and something broke, you couldn\u2019t tell whose session did it. One-at-a-time checkout preserves <b>accountability</b> — every action traces to exactly one person.</div></div>`,
    example:`<p>Follow one full vault cycle. Watch the second admin get blocked, and watch the credential die on check-in.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a vault checkout cycle</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">vault · admin-prod-db</div><div class="chip">PAM</div></div>
    <div class="console-body"><div class="mono-out">14:02  alice  check-out (MFA ✓, reason: "patch DB")
       → <span style="color:#34d399">granted, EXCLUSIVE. session recording started.</span>
14:03  bob    check-out attempt
       → <span style="color:#f87171">DENIED — already held by alice. (accountability preserved)</span>
14:21  alice  check-in
       → returned. <span style="color:#22d3ee">credential auto-rotated to a new random value.</span>
       → whatever alice saw at 14:02 <span style="color:#f87171">no longer works.</span>
14:22  bob    check-out
       → <span style="color:#34d399">granted (gets the NEW value, also exclusive).</span></div></div></div>
    <p>At no point did a permanent, shared, static password exist for someone to steal. That\u2019s zero standing knowledge in action — and in the lab you\u2019ll drive this exact cycle.</p></div>`,
    lab:{ kind:'vault', id:'07.2',
      title:'Operate the vault',
      objective:'Run a complete privileged-access cycle: check out the credential as alice, observe that a second admin (bob) is blocked while it\u2019s held, then check it back in and watch it auto-rotate. Completing the full check-out \u2192 check-in cycle passes the lab.',
      intro:''},
    quiz:[
      {q:'After an admin checks a credential back in, a CyberArk-style vault immediately:',
       o:['Emails it to everyone','Rotates it to a new random value so the seen value is dead','Deletes the account','Disables MFA'],a:1,
       e:'Rotation on check-in is the linchpin: it makes the borrowed credential worthless the instant it\u2019s returned, achieving zero standing knowledge.'},
      {q:'"Zero standing knowledge" means:',
       o:['Admins memorize passwords','No human carries a valid privileged password because credentials are rotated after use','There are no admins','Passwords never change'],a:1,
       e:'Because the vault rotates credentials after each use, there is no static secret for a human to retain, phish, or leak.'},
      {q:'Why does the vault grant only exclusive (one-at-a-time) checkout?',
       o:['To save money','To preserve accountability — every action traces to one identifiable person','To slow people down','Licensing limits'],a:1,
       e:'If two people held the same credential at once, you couldn\u2019t attribute actions. Exclusive checkout keeps a clean audit trail.'}
    ]},

  { id:'07.3', num:'07.3', title:'Session isolation & recording', minutes:8,
    dek:'The admin\u2019s machine never touches the target directly, and everything that happens is filmed. This is how PAM contains attackers and produces forensics.',
    concept:`<p>Vaulting protects the credential. But what about the <b>session</b> — the actual connection where privileged work happens? PAM brokers and watches that too.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Session Isolation (proxying)</div>The privileged connection is routed through a PAM proxy (CyberArk\u2019s PSM — Privileged Session Manager) instead of going directly from the admin\u2019s workstation to the target. The admin\u2019s potentially-compromised machine never directly touches the crown-jewel server, and the credential is injected by the proxy so the human may never see it.</div>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Session Recording &amp; Monitoring</div>The proxy <b>records</b> the entire privileged session — keystrokes, commands, even video of the screen — and can monitor it live. Every privileged action becomes an auditable, replayable artifact.</div>
    <h3>Why isolation matters</h3>
    <p>Admin endpoints are prime malware targets precisely because admins are powerful. If an admin\u2019s laptop is infected and they connect <i>directly</i> to a domain controller, the malware can ride along — credential theft, keylogging, lateral movement. Routing through an isolated proxy breaks that path: the malware on the laptop sees a proxy session, not the target\u2019s credentials, and the sensitive connection originates from a hardened jump host instead of a dusty laptop.</p>
    <div class="analogy"><div class="al">Think of it like</div>A prison visitation room. The visitor (admin) never enters the cell block directly. They speak through a controlled booth (the proxy), a guard records the whole visit (session recording), and nothing physical passes without inspection. Even a visitor with bad intent is contained by the channel itself.</div>
    <h3>The forensic payoff</h3>
    <p>When an incident happens, "what exactly did this admin do at 2am on the payment server?" usually has no answer — direct sessions leave thin logs. With PAM session recording, you have the <b>replay</b>. This both deters insiders (people behave differently when recorded) and gives investigators ground truth.</p>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> Auditors and incident responders love session recording because it converts "trust us, the admins are careful" into "here is the video of every privileged action." Combined with vaulting and rotation, you can tell a complete story: who checked out which credential, when, what they did with it, and proof the credential died afterward.</div></div>`,
    example:`<p>Two paths for the same admin task — one direct and dangerous, one brokered and contained.</p>
    <div class="example-wrap"><div class="example-label">Worked example · direct vs isolated session</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">session-path.compare</div></div>
    <div class="console-body"><div class="mono-out">task: alice administers the production domain controller

<span style="color:#f87171">DIRECT (no PAM)</span>
  alice-laptop ──(credential typed here)──▶ Domain Controller
  if laptop infected: malware steals creds + keylogs everything
  audit trail: sparse DC logs, no replay

<span style="color:#34d399">ISOLATED (PAM / PSM)</span>
  alice-laptop ──▶ <span style="color:#22d3ee">PSM proxy (hardened)</span> ──(creds injected here)──▶ Domain Controller
  alice may never see the password; laptop never touches DC directly
  audit trail: <span style="color:#22d3ee">full keystroke + video recording, live-monitorable</span></div></div></div>
    <p>The isolated path means even a fully compromised admin laptop can\u2019t harvest the privileged credential or reach the target unsupervised — and you get a complete recording for free.</p></div>`,
    lab:{ kind:'pam', id:'07.3',
      title:'Harden a privileged account',
      objective:'A <code>root</code>-equivalent account is configured insecurely. Toggle controls to reach a maturity score of <b>100</b>: vault it, rotate it, record sessions, require MFA on checkout, and switch off the two risky settings (shared account, standing admin).',
      intro:''},
    quiz:[
      {q:'Session isolation (a PAM proxy like PSM) protects against:',
       o:['Slow typing','A compromised admin endpoint directly reaching and harvesting from the target','Expired licenses','Bad Wi-Fi'],a:1,
       e:'Routing through a hardened proxy means the admin\u2019s (possibly infected) laptop never directly touches the crown-jewel server or sees the injected credential.'},
      {q:'The main forensic benefit of session recording is:',
       o:['Faster sessions','A replayable record of exactly what each privileged session did','Cheaper storage','Automatic patching'],a:1,
       e:'Recording converts "trust the admins" into concrete evidence — keystroke/video replay of every privileged action for audit and investigation.'},
      {q:'In an isolated session, the privileged credential is ideally:',
       o:['Typed by the admin on their laptop','Injected by the proxy so the human may never see it','Emailed in advance','Written on a sticky note'],a:1,
       e:'Credential injection by the proxy means the admin operates the session without ever handling the secret, reinforcing zero standing knowledge.'}
    ]},
