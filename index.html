  { id:'07.4', num:'07.4', title:'JIT, least privilege & the CyberArk Defender mindset', minutes:9,
    dek:'Bringing PAM together: eliminate standing privilege with just-in-time elevation, and understand the program concepts the CyberArk Defender certification tests.',
    concept:`<p>The final PAM move is to attack <b>standing privilege itself</b> — the very existence of always-on admin rights — and to think about privileged access as a managed program, which is the lens the CyberArk Defender (PAM administrator) certification takes.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Just-In-Time (JIT) Privilege</div>Instead of accounts that are <i>permanently</i> privileged, identities are granted elevated rights <b>only at the moment of need, for a bounded time</b>, then automatically dropped back down. The window in which a privileged credential is even usable shrinks from "always" to "the 30 minutes you needed it."</div>
    <p>JIT is the same idea as PIM from the Entra world (you\u2019ll have seen it referenced): eligibility instead of permanent assignment, activated on demand with approval and MFA, auto-expiring. Combined with vaulting and rotation, JIT means a privileged credential is both <b>unknown</b> (rotated) and <b>inert</b> (no standing rights) almost all the time.</p>
    <h3>Least privilege, applied to admins</h3>
    <p>Least privilege (Module 01) hits hardest here. Many "admins" are handed full Domain Admin when they actually need to do one narrow task. PAM maturity means giving each privileged role the <b>minimum</b> elevation — a database operator gets DB admin, not domain admin — and granting even that just-in-time.</p>
    <div class="keyterm"><div class="kt-label">The CyberArk building blocks</div><div class="kt-term">Vault · CPM · PSM · PVWA</div>The Defender-level mental model of the platform: the <b>Vault</b> stores secrets; the <b>CPM</b> (Central Policy Manager) rotates them per policy; the <b>PSM</b> (Privileged Session Manager) isolates and records sessions; the <b>PVWA</b> (Password Vault Web Access) is the web interface admins use to request and check out. You don\u2019t need to operate these here — but recognizing what each does is core Defender knowledge.</div>
    <h3>The PAM program, end to end</h3>
    <ul>
      <li><b>Discover</b> privileged accounts everywhere (they hide — local admins, forgotten service accounts).</li>
      <li><b>Onboard</b> them into the vault.</li>
      <li><b>Rotate</b> their credentials on policy (CPM).</li>
      <li><b>Broker &amp; isolate</b> all use through recorded sessions (PSM).</li>
      <li><b>Eliminate standing privilege</b> with JIT and least-privilege roles.</li>
      <li><b>Monitor &amp; report</b> — detect anomalous privileged behavior and produce evidence.</li>
    </ul>
    <div class="callout real"><span class="ic">🛰️</span><div><b>For the certification &amp; the job:</b> CyberArk Defender focuses on operating this program — onboarding accounts, configuring rotation policies, setting up session management, and troubleshooting. The concepts in this module (vault, rotation, isolation, JIT, least privilege for admins) are the foundation everything in that exam builds on. You now have the mental model the tooling hangs off of.</div></div>`,
    example:`<p>Watch the same admin right modeled two ways — standing versus just-in-time — and what an attacker finds in each case.</p>
    <div class="example-wrap"><div class="example-label">Worked example · standing vs just-in-time privilege</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">jit.compare</div></div>
    <div class="console-body"><div class="mono-out">role: "DB Operator" needs DBA rights ~2 hours/week

<span style="color:#f87171">STANDING PRIVILEGE</span>
  DBA rights: <span style="color:#f87171">active 24/7/365</span>
  attacker who phishes this account at any random time → <span style="color:#f87171">full DBA, instantly</span>
  exposure window: <span style="color:#f87171">always</span>

<span style="color:#34d399">JUST-IN-TIME</span>
  DBA rights: <span style="color:#34d399">eligible, not active</span>; activated on request (MFA + reason), 2h expiry
  attacker who phishes this account at a random time → <span style="color:#34d399">no active privilege; nothing to use</span>
  exposure window: <span style="color:#34d399">~2 hours/week, watched and recorded</span></div></div></div>
    <p>JIT shrinks the time a privileged credential is even usable from "always" to a sliver — and that sliver is exactly when a human is present, authenticated, and recorded. Standing privilege is the gift that keeps giving to attackers; JIT takes the gift away.</p></div>`,
    lab:{ kind:'quizonly', id:'07.4',
      title:'PAM program judgment',
      objective:'These are the design and certification-level concepts that define a mature PAM program. Answer every question correctly to complete the lab — and the module.',
      intro:''},
    quiz:[
      {q:'Just-In-Time privilege reduces risk by:',
       o:['Making passwords longer','Granting elevated rights only briefly on demand instead of permanently','Recording video','Adding more admins'],a:1,
       e:'JIT shrinks the window in which a privileged credential is usable from "always" to the brief, authenticated, recorded period of actual need.'},
      {q:'In CyberArk terms, which component rotates credentials according to policy?',
       o:['PSM','CPM (Central Policy Manager)','PVWA','Vault alone'],a:1,
       e:'The CPM handles automated credential rotation. The Vault stores, the PSM isolates/records sessions, and the PVWA is the web access interface.'},
      {q:'Applying least privilege to admins means:',
       o:['Everyone gets Domain Admin','Each privileged role gets the minimum elevation it needs (e.g. DB admin, not domain admin)','No one is an admin','Admins share one account'],a:1,
       e:'Least privilege for admins means scoping each privileged role to the narrow rights its task requires, rather than handing out blanket top-level admin.'},
      {q:'Which CyberArk component isolates and records privileged sessions?',
       o:['CPM','PVWA','PSM (Privileged Session Manager)','The Vault'],a:2,
       e:'The PSM proxies privileged connections so the endpoint never touches the target directly, and records the full session for audit.'}
    ]},
  { id:'07.5', num:'07.5', title:'Managing a vault fleet', minutes:10,
    dek:'Real PAM isn\u2019t one credential — it\u2019s hundreds. You\u2019ll operate a multi-account vault console: onboard a discovered account, run a full cycle, and see exclusivity enforced across the fleet.',
    concept:`<p>The single-vault lesson taught the mechanic. Production PAM means a <b>fleet</b> of privileged accounts — domain admins, database roots, service accounts, network gear — each onboarded, rotated, and brokered. Managing the fleet is the actual day-to-day of a CyberArk administrator.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Onboarding</div>Bringing a privileged account <i>under vault management</i>: the vault takes ownership of its credential, sets a rotation policy, and from then on brokers all access. An account that exists but isn\u2019t onboarded is an <b>unmanaged</b> privileged account — exactly the risk PAM exists to remove.</div>
    <h3>Discovery → onboarding</h3>
    <p>Privileged accounts hide everywhere: local admins on every server, forgotten service accounts, hard-coded app credentials. The first job is <b>discovery</b> — finding them — then <b>onboarding</b> each into the vault. An unmanaged privileged account is invisible to all your controls; it has standing, static, often-shared credentials with none of the brokering, rotation, or recording.</p>
    <h3>The fleet still obeys the core rules</h3>
    <ul>
      <li><b>Exclusive checkout</b> — even across hundreds of accounts, each credential is held by one person at a time for accountability.</li>
      <li><b>Rotation on check-in</b> — every account\u2019s credential dies after use.</li>
      <li><b>Per-account policy</b> — rotation frequency and session rules can differ by account sensitivity.</li>
    </ul>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The unmanaged account is the gap attackers find:</b> you can vault 500 accounts perfectly, but the one local-admin credential nobody onboarded is the way in. Mature PAM programs continuously discover and onboard — the fleet is never "done," much like governance (Module 06).</div></div>`,
    example:`<p>A fleet view: some accounts managed, one freshly discovered and still unmanaged. Watch onboarding bring it under control and exclusivity hold across the fleet.</p>
    <div class="example-wrap"><div class="example-label">Worked example · operating the fleet</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">vault · fleet</div><div class="chip">PAM</div></div>
    <div class="console-body"><div class="mono-out">prod-db        <span style="color:#34d399">vaulted</span>     rotation: 1d
domain-ctrl    <span style="color:#34d399">vaulted</span>     rotation: 12h
svc-legacy     <span style="color:#f87171">UNMANAGED</span>   ← discovered; standing static password ⚠

actions:
  onboard svc-legacy        → <span style="color:#34d399">now vaulted, rotated, brokered</span>
  alice checkout prod-db    → granted (exclusive, recorded)
  bob checkout prod-db      → <span style="color:#f87171">DENIED — held by alice</span>
  alice checkin prod-db     → <span style="color:#22d3ee">rotated; the value alice saw is dead</span></div></div></div>
    <p>The discovered <code>svc-legacy</code> account was the real risk — standing and unmanaged — until onboarding folded it into the same regime as the rest. In the lab you\u2019ll onboard the unmanaged account, run a full cycle, and trigger the exclusivity block yourself.</p></div>`,
    lab:{ kind:'vaultfleet', id:'07.5',
      title:'Operate the vault fleet',
      objective:'Manage a fleet of privileged accounts. Complete three objectives: <b>onboard</b> the unmanaged account, run a full <b>checkout → check-in</b> cycle on a managed one, and trigger the <b>exclusivity</b> block by having a second admin try a held credential.',
      intro:'',
      accounts:[
        {id:'proddb', label:'prod-db (root)', vaulted:true, rotationDays:1},
        {id:'dc', label:'domain-controller', vaulted:true, rotationDays:1},
        {id:'svc', label:'svc-legacy (discovered)', vaulted:false, rotationDays:0}
      ]},
    quiz:[
      {q:'"Onboarding" a privileged account means:',
       o:['Deleting it','Bringing it under vault management (ownership, rotation, brokering)','Emailing its password','Making it standard'],a:1,
       e:'Onboarding puts the account under the vault: it owns and rotates the credential and brokers all access from then on.'},
      {q:'An unmanaged privileged account is dangerous because:',
       o:['It\u2019s slow','It has standing, static, often-shared credentials outside all your PAM controls','It costs more','It logs too much'],a:1,
       e:'Unmanaged means no brokering, rotation, or recording — exactly the standing-credential risk PAM exists to eliminate, and the gap attackers exploit.'},
      {q:'Across a fleet of hundreds of accounts, exclusive checkout still matters because:',
       o:['It\u2019s faster','It preserves per-credential accountability — one holder at a time','It saves disk','It\u2019s required by law everywhere'],a:1,
       e:'Even at scale, one-at-a-time checkout keeps every action attributable to a single identifiable person.'},
      {q:'Mature PAM treats discovery and onboarding as:',
       o:['A one-time task','A continuous process — new privileged accounts keep appearing','Optional','A governance-only concern'],a:1,
       e:'Like governance, PAM is never "done": local admins and service accounts keep appearing and must be continuously discovered and onboarded.'}
    ]},
  { id:'07.6', num:'07.6', title:'JIT elevation requests', minutes:9,
    dek:'The end state of privileged access: nobody is a standing admin. You\u2019ll drive a just-in-time elevation request through MFA, approval, and a ticket — and watch it auto-expire.',
    concept:`<p>Vaulting hides the credential; rotation kills it after use. The final move eliminates <b>standing privilege</b> itself: with <b>just-in-time (JIT) elevation</b>, nobody holds admin rights continuously — they request elevation at the moment of need, and it evaporates afterward.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">JIT elevation</div>A workflow where an identity requests elevated privilege on demand — gated by MFA, approval, and often a change/incident ticket — for a bounded time window, after which the rights auto-revoke. The same idea as Entra PIM (Module 09), applied to infrastructure and PAM.</div>
    <h3>Why JIT is the endgame</h3>
    <p>Vaulting + rotation already mean a credential is unknown and short-lived. JIT adds that the privilege itself is <b>inert</b> almost always: even a valid, current credential confers nothing unless an elevation is active. Phish an account at a random moment and there\u2019s no active privilege to abuse — the exposure window collapses to the brief, approved, recorded period of real work.</p>
    <h3>What a request typically requires</h3>
    <ul>
      <li><b>MFA</b> — prove identity before elevating.</li>
      <li><b>Approval</b> — a designated approver signs off for sensitive roles.</li>
      <li><b>Ticket reference</b> — tie the elevation to a change/incident for audit (why are you elevating?).</li>
      <li><b>Time limit</b> — a maximum window; rights auto-revoke when it expires.</li>
    </ul>
    <div class="callout real"><span class="ic">🛰️</span><div><b>The whole program in one sentence:</b> discover and vault every privileged account, rotate after every use, broker and record every session, and grant the privilege itself only just-in-time with least privilege. Be able to say that — and drive the request flow you\u2019re about to — and you can speak credibly to any PAM or CyberArk Defender interview.</div></div>`,
    example:`<p>One elevation request, two attempts. The first misses requirements; the second satisfies them and grants time-boxed, ticketed access that auto-revokes.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a JIT elevation request</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">JIT · request "DB Admin"</div><div class="chip">PAM</div></div>
    <div class="console-body"><div class="mono-out">policy: MFA · approval · ticket · max 4h

<span style="color:#fbbf24">attempt 1</span>: no MFA, not approved, no ticket, 9h
  → <span style="color:#f87171">DENIED</span>: MFA required · approval pending · ticket required · exceeds 4h

<span style="color:#fbbf24">attempt 2</span>: MFA done · approved · ticket CHG-2208 · 2h
  → <span style="color:#34d399">GRANTED</span> DB Admin for 2h against CHG-2208; auto-revokes on expiry
  exposure window: <span style="color:#34d399">2h, recorded</span> — not 24/7</div></div></div>
    <p>Between requests the identity is an ordinary, unprivileged account. That dormancy — privilege that exists only when explicitly summoned — is the strongest possible posture. In the lab you\u2019ll satisfy the requirements and grant the elevation.</p></div>`,
    lab:{ kind:'jit', id:'07.6',
      title:'Request just-in-time elevation',
      objective:'You need temporary DB Admin to resolve an incident. Satisfy the policy — complete MFA, obtain approval, supply a change/incident ticket, and stay within the 4-hour maximum — then request the elevation.',
      intro:'',
      policy:{role:'DB Admin', requireMfa:true, requireApproval:true, requireTicket:true, maxHours:4}},
    quiz:[
      {q:'Just-in-time elevation means an identity:',
       o:['Is a permanent admin','Holds no standing privilege and requests it on demand, time-boxed','Can never get admin','Shares an admin account'],a:1,
       e:'JIT eliminates standing privilege: rights are requested when needed (MFA/approval/ticket), granted briefly, then auto-revoked.'},
      {q:'Why does JIT make a phished account less valuable to an attacker?',
       o:['The password is longer','Most of the time there\u2019s no active privilege to abuse','It logs them out','It encrypts the network'],a:1,
       e:'With privilege inert until explicitly elevated, a random-moment compromise finds nothing active — the exposure window shrinks to the approved work period.'},
      {q:'Requiring a change/incident ticket on a JIT request primarily provides:',
       o:['Faster access','An audit trail tying each elevation to a documented reason','More storage','A password'],a:1,
       e:'The ticket answers "why are you elevating?" and ties privileged time to documented work — essential audit evidence.'},
      {q:'JIT elevation in PAM is conceptually the same as which Entra feature?',
       o:['Conditional Access','Privileged Identity Management (PIM)','Dynamic groups','Access Reviews'],a:1,
       e:'PIM is Entra\u2019s JIT for directory/Azure roles; JIT elevation is the same eligible-then-activate idea applied to infrastructure/PAM.'}
    ]},
  { id:'07.7', num:'07.7', title:'CyberArk components: Vault, CPM, PSM, PVWA', minutes:10,
    dek:'The named building blocks of a CyberArk Self-Hosted (on-prem) deployment, and which one does what. This is core CyberArk Defender knowledge and an explicit job requirement.',
    concept:`<p>You\u2019ve learned PAM concepts hands-on \u2014 vaulting, rotation, session isolation, JIT. Now name the actual <b>CyberArk components</b> that implement them. Job descriptions ask for "hands-on expertise with CyberArk components including PVWA, CPM, and PSM," so knowing each by name and role is essential.</p>
    <div class="keyterm"><div class="kt-label">Core architecture</div><div class="kt-term">The four CyberArk Self-Hosted components</div>A CyberArk on-prem (Self-Hosted) deployment is built from four cooperating components: the <b>Digital Vault</b> (stores), the <b>CPM</b> (rotates), the <b>PSM</b> (isolates &amp; records sessions), and the <b>PVWA</b> (the web interface). Each maps directly to a concept you already practiced.</div>
    <h3>The components, one by one</h3>
    <ul>
      <li><b>Digital Vault</b> \u2014 the hardened, encrypted core that <i>stores</i> all privileged credentials and secrets. It\u2019s deliberately isolated (its own server, locked-down). This is the "vault" from lesson 07.2 made concrete.</li>
      <li><b>CPM \u2014 Central Policy Manager</b> \u2014 the component that <i>rotates and manages</i> credentials per policy: it changes passwords, verifies them, and reconciles them when they drift. The automatic rotation you saw on check-in is the CPM doing its job.</li>
      <li><b>PSM \u2014 Privileged Session Manager</b> \u2014 the proxy that <i>isolates and records</i> privileged sessions, so the admin\u2019s machine never touches the target directly and every session is captured. This is lesson 07.3 made concrete.</li>
      <li><b>PVWA \u2014 Password Vault Web Access</b> \u2014 the <i>web interface</i> where users log in to request access, check out credentials, and where admins manage the system. It\u2019s the front door humans actually click.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">How they work together</div><div class="kt-term">A checkout, by component</div>A user logs into the <b>PVWA</b> to request a credential \u2192 the <b>Vault</b> releases it under policy \u2192 the <b>PSM</b> brokers an isolated, recorded session to the target \u2192 on check-in, the <b>CPM</b> rotates the credential. Four components, one seamless privileged-access cycle \u2014 the exact flow you operated in earlier labs.</div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>For the CyberArk Defender cert &amp; the JD:</b> Defender-level knowledge is largely about operating these components \u2014 onboarding accounts into the Vault, configuring CPM rotation policies, setting up PSM session management, and administering via the PVWA. There are more components in a full deployment (CCP/AAM for app secrets, PTA for threat analytics), but Vault/CPM/PSM/PVWA are the four you must know cold. The lab drills exactly this mapping.</div></div>`,
    example:`<p>The privileged-access cycle you already ran, re-labeled with the CyberArk component responsible at each step.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 one checkout, mapped to components</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">cyberark \u00b7 components in a checkout</div><div class="chip">PAM</div></div>
    <div class="console-body"><div class="mono-out">admin needs the prod-db root credential

1  logs into <span style="color:#22d3ee">PVWA</span> (web UI) \u2192 requests access, MFA
2  <span style="color:#22d3ee">Vault</span> (encrypted store) \u2192 releases the credential under policy
3  <span style="color:#22d3ee">PSM</span> (session proxy) \u2192 opens an isolated, recorded session to prod-db
                            (admin's laptop never touches the target)
4  work happens \u2014 fully recorded
5  check-in \u2192 <span style="color:#22d3ee">CPM</span> (policy manager) \u2192 rotates the credential

PVWA = front door \u00b7 Vault = stores \u00b7 PSM = isolates+records \u00b7 CPM = rotates</div></div></div>
    <p>Same cycle you operated in the vault labs, now with each step attributed to its component. Knowing which box does what is what turns "I get PAM concepts" into "I can administer CyberArk." In the lab you\u2019ll match each task to the right component.</p></div>`,
    lab:{ kind:'components', id:'07.7',
      title:'Match the CyberArk component',
      objective:'For each administrative task, select the CyberArk component responsible: the <b>Vault</b> (stores), <b>CPM</b> (rotates), <b>PSM</b> (isolates &amp; records sessions), or <b>PVWA</b> (web access). All correct to pass.',
      intro:'',
      tasks:[
        {task:'Securely store all privileged credentials in an encrypted, hardened repository.', component:'vault'},
        {task:'Automatically rotate a service account\u2019s password on a schedule.', component:'cpm'},
        {task:'Proxy and record an admin\u2019s RDP session to a domain controller.', component:'psm'},
        {task:'Provide the web page where a user logs in to request and check out access.', component:'pvwa'},
        {task:'Verify and reconcile a credential whose value drifted out of sync.', component:'cpm'},
        {task:'Ensure the admin\u2019s workstation never directly touches the target server.', component:'psm'}
      ]},
    quiz:[
      {q:'Which CyberArk component automatically rotates and manages credentials per policy?',
       o:['PVWA','CPM (Central Policy Manager)','PSM','The Vault alone'],a:1,
       e:'The CPM changes, verifies, and reconciles credentials according to policy \u2014 the engine behind automatic rotation.'},
      {q:'The PSM (Privileged Session Manager) is responsible for:',
       o:['Storing passwords','Isolating and recording privileged sessions via a proxy','The web login page','Rotating credentials'],a:1,
       e:'PSM proxies the session so the endpoint never touches the target, and records the full session for audit.'},
      {q:'The PVWA is:',
       o:['The encrypted credential store','The web interface where users request/check out access and admins manage the system','The rotation engine','The session proxy'],a:1,
       e:'Password Vault Web Access is the human-facing web UI; the Vault stores, CPM rotates, PSM isolates/records.'},
      {q:'In a checkout, the correct order of components is:',
       o:['CPM \u2192 PSM \u2192 Vault \u2192 PVWA','PVWA (request) \u2192 Vault (release) \u2192 PSM (isolated session) \u2192 CPM (rotate on check-in)','PSM \u2192 PVWA \u2192 CPM \u2192 Vault','Vault \u2192 CPM \u2192 PVWA \u2192 PSM'],a:1,
       e:'A user requests via PVWA, the Vault releases the secret, PSM brokers the recorded session, and CPM rotates on check-in.'}
    ]}
  ]},

{ id:'M08', num:'08', title:'Capstone Portfolio Projects', sub:'4 projects · build your portfolio',
  blurb:'Put it all together into artifacts you can show employers. Each project is a realistic design decision set drawn from the whole course — make the right calls and you produce a defensible, portfolio-ready deliverable.',
  lessons:[
  /* ---------------- 08.1 ---------------- */
  { id:'08.1', num:'08.1', title:'Project 1 — Design an RBAC model', minutes:10,
    dek:'A 200-person company has access chaos. Design a clean role model from scratch — the single most common real IAM engineering deliverable.',
    concept:`<p>This capstone draws on Modules 01 (least privilege) and 03 (RBAC). You\u2019re handed a company assigning permissions to individuals one by one, and asked to design a role model that\u2019s governable.</p>
    <h3>The brief</h3>
    <p><b>Northwind Trading, 200 employees, four departments</b> (Sales, Finance, Engineering, HR), currently grants every permission directly to each user. New hires are set up by copying a "similar" person\u2019s access — so permissions sprawl unpredictably and nobody can answer "who can approve payments?"</p>
    <h3>What a good RBAC design includes</h3>
    <ul>
      <li><b>Roles mapped to job functions</b>, not to individuals — "Finance Analyst," not "Amy\u2019s access."</li>
      <li><b>A role hierarchy</b> where common access is factored into a base role everyone inherits (the <code>Employee</code> base: SSO, email, VPN), so you don\u2019t repeat it in every role.</li>
      <li><b>Least privilege per role</b> — each role carries only what its job needs.</li>
      <li><b>Birthright vs. requestable</b> — baseline access is automatic on join; sensitive access is requested and approved.</li>
      <li><b>SoD-awareness</b> — no single role bundles a toxic combination (e.g. create + approve payments).</li>
    </ul>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>Common anti-patterns to avoid:</b> a single "super role" that grants everything; roles named after people; copying access from an existing user as the provisioning method; or putting both halves of an SoD pair into one role for convenience. Each of these will show up as a wrong option in the project review.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>Portfolio tip:</b> when you build this for real, the deliverable is a short design doc: a role catalog (role \u2192 permissions), the hierarchy diagram, the birthright matrix by department, and a note on which roles are SoD-sensitive. That document is genuinely something to show in an interview — it demonstrates you think in systems, not one-off grants.</div></div>`,
    example:`<p>Here\u2019s the shape of a clean design for Northwind — the target you\u2019re aiming the project decisions at.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a clean role catalog (excerpt)</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">rbac-design · northwind</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#22d3ee">Employee (base — everyone inherits)</span>
    okta:sso, email:mailbox, vpn:base

<span style="color:#22d3ee">Finance Analyst</span>  inherits Employee
    sap:fi-display, concur:user, workday:reader
    <span style="color:#5c6b80"># note: does NOT include approvals:approve (SoD)</span>

<span style="color:#22d3ee">Finance Manager</span>  inherits Finance Analyst
    approvals:approve
    <span style="color:#5c6b80"># approve sits in a SEPARATE role from create — SoD respected</span>

birthright: dept=Finance → Finance Analyst (auto on join)
requestable: Finance Manager (needs approval)</div></div></div>
    <p>Base role factors out the common access; each job role adds only its delta; create and approve live in different roles so no one role is a toxic combination. That\u2019s the design the project rewards.</p></div>`,
    lab:{ kind:'capstone', id:'08.1',
      title:'Approve the RBAC design',
      scenario:'You\u2019re reviewing a proposed RBAC design for Northwind Trading (200 staff, four departments, currently all direct grants). Select every decision that reflects best practice. Choosing an anti-pattern fails the review.',
      options:[
        {t:'Create a base "Employee" role with SSO, email, and VPN that all job roles inherit.', good:true},
        {t:'Map roles to job functions (Finance Analyst, Sales Rep), not to individuals.', good:true},
        {t:'Make one "Northwind Admin" super-role that grants every permission, for convenience.', good:false},
        {t:'Keep "create payment" and "approve payment" in separate roles to respect SoD.', good:true},
        {t:'Provision new hires by copying a similar existing employee\u2019s exact access.', good:false},
        {t:'Make baseline department access birthright (auto), and sensitive access requestable with approval.', good:true},
        {t:'Name roles after the senior person who first needed them (e.g. "Dave-Access").', good:false}
      ]},
    quiz:[
      {q:'Factoring common access (SSO, email, VPN) into a base role that others inherit achieves:',
       o:['More passwords','No repetition — change it once, everyone updates','Slower logins','SoD violations'],a:1,
       e:'A base/parent role means shared access is defined once and inherited, instead of copied into every role. This is core RBAC hierarchy design.'},
      {q:'Why should "create payment" and "approve payment" never be in the same role?',
       o:['Performance','It would bundle an SoD toxic combination into a single grant','Cost','Naming'],a:1,
       e:'Putting both halves of an SoD pair into one role hands every holder a fraud-enabling combination. Keep them in separate roles.'},
      {q:'Provisioning new hires by copying an existing user\u2019s access is an anti-pattern because:',
       o:['It\u2019s too fast','It propagates that user\u2019s accumulated privilege creep to everyone new','It\u2019s illegal','It needs MFA'],a:1,
       e:'Copy-from-user spreads whatever drift and over-privilege the source already had. Birthright roles tied to job function are the clean alternative.'}
    ]},
  /* ---------------- 08.2 ---------------- */
  { id:'08.2', num:'08.2', title:'Project 2 — Automate the JML lifecycle', minutes:10,
    dek:'Design the joiner-mover-leaver automation for an org, with airtight deprovisioning. Draws on Modules 02 (SCIM) and 04 (JML).',
    concept:`<p>This project draws on Modules 02 (SCIM) and 04 (JML). The brief: design the lifecycle automation so that access appears correctly on day one, recalculates cleanly on role change, and — most importantly — disappears completely on departure.</p>
    <h3>The brief</h3>
    <p>Northwind\u2019s HR system is the source of truth for employment. You must design how identity flows from HR through the IdP to downstream apps for each lifecycle event, and where the human checkpoints go.</p>
    <h3>What a good JML design includes</h3>
    <ul>
      <li><b>HR as the authoritative source</b> — lifecycle events originate from the system of record (a hire, a transfer, a termination), not from manual tickets.</li>
      <li><b>Birthright provisioning on joiner</b> — baseline access auto-granted via group membership and SCIM, no ticket needed.</li>
      <li><b>Mover = recalculate, including revoke</b> — on a transfer, grant the new department\u2019s access <i>and remove the old</i>. The revoke is the step that prevents privilege creep and SoD violations.</li>
      <li><b>Leaver = immediate, complete deprovisioning</b> — disable the identity at the IdP first (instant SSO cutoff), then SCIM-deprovision every downstream app, and <b>verify</b> rather than assume.</li>
      <li><b>Catch non-human identities</b> — service accounts the leaver owned must be reassigned or disabled too.</li>
    </ul>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The deprovisioning trap (again):</b> the highest-severity design flaw is assuming SCIM deprovisioning silently succeeded. A robust design includes a reconciliation/verification step that confirms each downstream account is actually disabled, and flags any app that didn\u2019t confirm — exactly the broken-connector scenario from Module 02.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>Portfolio tip:</b> the deliverable here is a lifecycle flow diagram (HR \u2192 IdP \u2192 apps) annotated with what happens at each of J/M/L, where approvals sit, and the verification step for leavers. Pair it with a one-page "leaver runbook." Showing you designed for the failure case (broken deprovisioning) signals real-world maturity.</div></div>`,
    example:`<p>The target leaver flow — note the order and the verification step that separates a safe design from a hopeful one.</p>
    <div class="example-wrap"><div class="example-label">Worked example · the leaver flow done right</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">jml-design · leaver</div></div>
    <div class="console-body"><div class="mono-out">trigger: HR marks amy.chen "Terminated" (source of truth)

1. <span style="color:#34d399">IdP account disabled immediately</span>  → all SSO/federated access cut at once
2. SCIM deprovision fan-out:
     salesforce  → active:false   <span style="color:#34d399">confirmed</span>
     slack       → active:false   <span style="color:#34d399">confirmed</span>
     github      → removed        <span style="color:#34d399">confirmed</span>
     legacy-hr   → <span style="color:#f87171">NO CONFIRMATION</span> → <span style="color:#fbbf24">flagged for manual action</span>
3. <span style="color:#22d3ee">verification step</span>: reconcile expected vs confirmed → 1 exception raised
4. owned service accounts (svc-datasync) → reassigned to manager, not orphaned</div></div></div>
    <p>The design doesn\u2019t trust the fan-out blindly — step 3 catches the un-confirmed app, turning a silent lingering-access risk into a tracked exception. That verification step is what the project rewards.</p></div>`,
    lab:{ kind:'capstone', id:'08.2',
      title:'Approve the JML design',
      scenario:'Review the proposed joiner-mover-leaver automation for Northwind. Select every decision that reflects best practice; an anti-pattern fails the review.',
      options:[
        {t:'Treat the HR system as the authoritative source that triggers lifecycle events.', good:true},
        {t:'Auto-provision baseline access on joiner via group membership and SCIM.', good:true},
        {t:'On a mover, grant new-department access but leave the old access in place "just in case."', good:false},
        {t:'On a mover, recalculate entitlements — grant new AND revoke old.', good:true},
        {t:'On a leaver, disable the IdP identity first, then SCIM-deprovision every app.', good:true},
        {t:'Assume SCIM deprovisioning succeeded; no need to verify.', good:false},
        {t:'Include a verification step that flags any app that didn\u2019t confirm deprovisioning.', good:true},
        {t:'Reassign or disable service accounts the leaver owned.', good:true}
      ]},
    quiz:[
      {q:'On a mover (role change), the step most often skipped — and most important — is:',
       o:['Granting new access','Revoking the old department\u2019s access','Resetting the password','Sending a welcome email'],a:1,
       e:'Forgetting to revoke old access is the root of privilege creep and many SoD violations. A mover must recalculate to the new role\u2019s exact entitlements.'},
      {q:'The safest first action when a leaver is detected is to:',
       o:['Email their manager','Disable the IdP identity immediately to cut all federated access at once','Archive their files','Schedule a review'],a:1,
       e:'Disabling at the IdP instantly cuts SSO to every federated app, then SCIM cleans up individual accounts. Speed at the IdP limits the window of lingering access.'},
      {q:'A robust leaver design protects against broken SCIM connectors by:',
       o:['Ignoring them','Including a verification step that confirms each app actually deprovisioned','Adding more apps','Disabling MFA'],a:1,
       e:'Verification/reconciliation turns a silent failure (an app that never got the deprovision) into a tracked exception someone must resolve.'}
    ]},
  /* ---------------- 08.3 ---------------- */
  { id:'08.3', num:'08.3', title:'Project 3 — Run a governance campaign', minutes:9,
    dek:'Stand up an access certification program that produces audit evidence and actually reduces risk. Draws on Module 06.',
    concept:`<p>This project draws on Module 06. The brief: an auditor is coming, and leadership can\u2019t answer "who has access to the financial system and is it appropriate?" Design and run a certification program that produces the evidence and removes real risk.</p>
    <h3>The brief</h3>
    <p>Design a recurring access-review program for Northwind\u2019s sensitive systems, choosing the right reviewers, the right signals, the right cadence, and the right remediation approach — then be ready to hand an auditor a defensible record.</p>
    <h3>What a good governance program includes</h3>
    <ul>
      <li><b>Risk-based cadence</b> — privileged/financial access reviewed quarterly with rigor; low-risk access light-touch or policy-approved.</li>
      <li><b>The right reviewer</b> — managers certify their reports; app owners certify their app\u2019s users; someone owns role definitions.</li>
      <li><b>Decision signals provided</b> — last-used dates, SoD flags, outliers — so reviewers make informed calls instead of rubber-stamping.</li>
      <li><b>Real remediation</b> — revocations actually execute, and recurring issues get fixed at the role level.</li>
      <li><b>Evidence retained</b> — dated, signed certification records kept for the auditor.</li>
    </ul>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>Anti-patterns the review will test:</b> reviewing everything at the same low intensity regardless of risk; giving reviewers a raw list with no signals; letting "approve all" stand with zero revocations; fixing the same stray permission person-by-person every cycle instead of fixing the role; and discarding the evidence after the campaign.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>Portfolio tip:</b> the deliverable is a one-page governance program description (scope, reviewers, cadence by risk tier, signals used, remediation path, evidence retention) plus a sample certification report showing a healthy mix of approvals and revocations. This directly answers the interview question "how would you run access reviews?"</div></div>`,
    example:`<p>The shape of a defensible program — risk-tiered, signal-rich, and evidence-producing.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a governance program on a page</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">governance-program · northwind</div></div>
    <div class="console-body"><div class="mono-out">TIER 1 (privileged / financial)   cadence: quarterly, high rigor
   reviewer: app owner + manager   signals: last-used, SoD, outliers
TIER 2 (business apps)             cadence: semi-annual
   reviewer: manager               signals: last-used
TIER 3 (low-risk)                  cadence: annual / policy auto-approve

remediation: revocations execute automatically; recurring findings → fix the ROLE
evidence: signed, dated records retained 18 months for audit
health check: a campaign that revokes nothing is re-opened, not accepted</div></div></div>
    <p>Effort concentrates where risk lives, reviewers get the signals to decide, fixes happen at the root, and the output is audit-ready. That\u2019s a program, not a fire drill.</p></div>`,
    lab:{ kind:'capstone', id:'08.3',
      title:'Approve the governance program',
      scenario:'Review the proposed access-certification program for Northwind ahead of an audit. Select every decision that reflects best practice; an anti-pattern fails the review.',
      options:[
        {t:'Review privileged/financial access quarterly with high rigor; low-risk access annually.', good:true},
        {t:'Have managers certify their reports and app owners certify their app\u2019s users.', good:true},
        {t:'Give reviewers last-used dates, SoD flags, and outlier markers to inform decisions.', good:true},
        {t:'Review every entitlement in the company at the same high intensity regardless of risk.', good:false},
        {t:'Accept "approve all" with zero revocations as a successful campaign.', good:false},
        {t:'When a stray permission recurs across many people, fix it in the role definition.', good:true},
        {t:'Discard certification records once the campaign closes to save space.', good:false},
        {t:'Retain dated, signed certification records as audit evidence.', good:true}
      ]},
    quiz:[
      {q:'Risk-based certification concentrates review effort:',
       o:['Evenly across everything','On high-risk and privileged access','On the cheapest systems','Randomly'],a:1,
       e:'You review high-risk access more often and more carefully, and handle low-risk access with light-touch or policy-based approval.'},
      {q:'A certification campaign that revokes nothing across a large population suggests:',
       o:['Perfect access hygiene','Rubber-stamping rather than genuine review','A fast network','Good design'],a:1,
       e:'Healthy reviews always find some access to remove. Zero revocations is a red flag auditors specifically look for.'},
      {q:'The key audit-facing output of a governance campaign is:',
       o:['A faster login','Dated, signed records proving access was reviewed and re-authorized','New hardware','A bigger team'],a:1,
       e:'The retained evidence is what lets you prove to an auditor that access was deliberately certified by the right owners at known times.'}
    ]},

  { id:'08.4', num:'08.4', title:'Project 4 — Secure privileged access', minutes:10,
    dek:'Design the PAM program for the crown-jewel accounts and tell the complete story end to end. Draws on Module 07 — your final capstone.',
    concept:`<p>The final capstone draws on Module 07. The brief: Northwind\u2019s privileged accounts are a mess — shared, permanent, unrotated, unmonitored. Design the PAM program that fixes it, and be able to narrate the full lifecycle of a single privileged action.</p>
    <h3>The brief</h3>
    <p>Bring the Domain Admin, production root, and key service accounts under control. Choose the controls, eliminate standing privilege, and define how a privileged action flows from request to recorded completion with the credential dead afterward.</p>
    <h3>What a good PAM program includes</h3>
    <ul>
      <li><b>Discover &amp; onboard</b> privileged accounts into the vault — including the hidden ones (local admins, forgotten service accounts).</li>
      <li><b>Vault + rotate</b> — no human holds a standing privileged password; credentials rotate after use and on schedule.</li>
      <li><b>Exclusive checkout with MFA</b> — one holder at a time, authenticated, with a reason, for accountability.</li>
      <li><b>Session isolation + recording</b> — privileged connections proxied through a hardened host and fully recorded.</li>
      <li><b>Just-in-time, least-privilege elevation</b> — eliminate standing admin; grant the minimum rights only at moment of need.</li>
      <li><b>Monitor &amp; report</b> — detect anomalous privileged behavior and retain evidence.</li>
    </ul>
    <div class="callout danger"><span class="ic">🚨</span><div><b>Anti-patterns the review will test:</b> leaving privileged accounts shared with no individual accountability; keeping standing 24/7 admin rights; storing privileged passwords in a spreadsheet or password manager instead of a brokering vault; allowing direct connections from admin laptops to crown-jewel servers; and skipping rotation so a once-seen credential stays valid forever.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>Portfolio capstone:</b> the deliverable is a PAM design doc — the account inventory and tiers, the control set per tier (vault/rotate/isolate/record/JIT), and a narrated walkthrough of one privileged session from checkout to rotated check-in. Being able to tell that end-to-end story — "here\u2019s exactly what happens, and here\u2019s the evidence trail" — is a genuinely senior signal. Finish this and you\u2019ve touched every major domain of IAM engineering.</div></div>`,
    example:`<p>The complete story of one privileged action under a mature program — the narrative your design should make possible.</p>
    <div class="example-wrap"><div class="example-label">Worked example · one privileged action, end to end</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">pam-program · privileged-action-story</div></div>
    <div class="console-body"><div class="mono-out">need: alice must patch the production database tonight

1. <span style="color:#22d3ee">JIT request</span>: alice requests DB-admin elevation (MFA + reason) → approved, 2h window
2. <span style="color:#22d3ee">checkout</span>: vault grants the prod-db credential, EXCLUSIVE; bob is blocked
3. <span style="color:#22d3ee">isolated session</span>: connection proxied through PSM; credential injected
                     (alice never sees it); full keystroke + video recording on
4. alice patches the DB; everything is recorded
5. <span style="color:#22d3ee">check-in</span>: credential auto-rotated → the value used tonight is now dead
6. <span style="color:#22d3ee">elevation expires</span>: DB-admin rights drop automatically at the 2h mark
7. <span style="color:#34d399">evidence</span>: who/when/what/recording all retained for audit</div></div></div>
    <p>Vaulted, rotated, exclusive, MFA-gated, isolated, recorded, just-in-time, least-privilege, evidenced. Every concept from Module 07 in a single flow — and a story you can tell an interviewer start to finish.</p></div>`,
    lab:{ kind:'capstone', id:'08.4',
      title:'Approve the PAM program',
      scenario:'Review the proposed privileged-access program for Northwind\u2019s crown-jewel accounts. Select every decision that reflects best practice; an anti-pattern fails the review — and completes the course.',
      options:[
        {t:'Onboard all privileged accounts (including hidden local/service accounts) into a brokering vault.', good:true},
        {t:'Rotate privileged credentials after each use and on a schedule.', good:true},
        {t:'Keep privileged accounts shared among the admin team with no individual checkout.', good:false},
        {t:'Require exclusive, MFA-gated checkout with a stated reason for accountability.', good:true},
        {t:'Proxy and record all privileged sessions through a hardened session manager.', good:true},
        {t:'Allow admins to connect directly from their laptops to crown-jewel servers.', good:false},
        {t:'Replace standing 24/7 admin rights with just-in-time, least-privilege elevation.', good:true},
        {t:'Store the privileged passwords in a shared spreadsheet for convenience.', good:false}
      ]},
    quiz:[
      {q:'The single most powerful move against privileged-credential risk is:',
       o:['Longer passwords','Eliminating standing privilege with vaulting + rotation + JIT','More admins','Faster servers'],a:1,
       e:'Together, vaulting (no one knows it), rotation (seen values die), and JIT (rights aren\u2019t standing) shrink the usable window of a privileged credential to almost nothing.'},
      {q:'Storing privileged passwords in a shared spreadsheet instead of a vault is bad because:',
       o:['Spreadsheets are slow','There\u2019s no brokering, no rotation, no recording, and no individual accountability','It uses disk space','Auditors like spreadsheets'],a:1,
       e:'A vault brokers access, rotates after use, records sessions, and attributes actions to individuals. A spreadsheet provides none of that — it\u2019s standing, shared, static knowledge.'},
      {q:'Being able to narrate one privileged action from JIT request through rotated check-in demonstrates:',
       o:['Nothing useful','A complete, mature PAM mental model — a senior-level signal','Only typing speed','Spreadsheet skills'],a:1,
       e:'Telling the end-to-end story — request, checkout, isolation, recording, rotation, expiry, evidence — shows you understand how all the PAM controls fit into one coherent program.'}
    ]}
  ]},
/* ===================== MODULE 09 — Entra ID in Depth ===================== */
{ id:'M09', num:'09', title:'Entra ID in Depth', sub:'4 lessons · CA · PIM · governance',
  blurb:'Microsoft\u2019s cloud identity platform up close. The tenant model, the Conditional Access policy engine you\u2019ll configure live, Privileged Identity Management for just-in-time admin, and Access Reviews — the controls behind the SC-300 exam and most enterprise cloud shops.',
  lessons:[
  /* ---------------- 09.1 ---------------- */
  { id:'09.1', num:'09.1', title:'The Entra tenant, users & groups', minutes:8,
    dek:'Before the fancy controls: what an Entra tenant actually is, and how users and groups form the backbone everything else hangs off.',
    concept:`<p><b>Microsoft Entra ID</b> (formerly Azure Active Directory) is the cloud identity provider behind Microsoft 365, Azure, and thousands of SaaS apps. If a company runs Office, it almost certainly runs Entra. Knowing it is one of the most marketable IAM skills.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Tenant</div>A dedicated, isolated instance of Entra ID for one organization — its own directory of users, groups, apps, and policies. <code>northwind.onmicrosoft.com</code> is a tenant. Everything you configure lives inside it.</div>
    <h3>Cloud identity, not on-prem AD</h3>
    <p>Entra is <i>not</i> Active Directory in the cloud. AD (Module 04 cousin) uses LDAP/Kerberos, OUs, and domain controllers for on-prem Windows. Entra speaks <b>SAML, OIDC, OAuth, and SCIM</b> (Module 02) and secures cloud and SaaS apps. Many orgs run both and sync between them with <b>Entra Connect</b> — that\u2019s "hybrid identity."</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Security group vs. assignment</div>In Entra you rarely assign access to one person. You put users in a <b>security group</b> and assign the app, role, or policy to the <b>group</b>. Group membership is the unit of access — exactly the RBAC indirection from Module 03, applied in Entra.</div>
    <h3>Dynamic groups: membership by rule</h3>
    <p>Entra can compute group membership automatically from user attributes — a <b>dynamic group</b> like "everyone where department = Finance." When HR updates someone\u2019s department, their group membership (and the access it carries) recalculates without a ticket. This is birthright access (Module 04) implemented in Entra, and it\u2019s the foundation Conditional Access and governance target.</p>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> Almost every access problem and policy in Entra is expressed in terms of <b>groups</b>. "Who can reach the Finance app?" → the group assigned to it. "Who must use MFA?" → the group the Conditional Access policy targets. Master groups and you can read the whole tenant.</div></div>`,
    example:`<p>Here\u2019s how one user resolves through the Entra model — directory identity, group memberships (static and dynamic), and the access those groups carry.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a user in the tenant</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#3b82f6"></i><i style="background:#8b5cf6"></i><i style="background:#22d3ee"></i></div><div class="title">entra · user · amy.chen@northwind.com</div><div class="chip">DIRECTORY</div></div>
    <div class="console-body"><div class="mono-out">attributes : dept=Finance, country=US, employeeType=staff

group memberships:
  All-Staff             (static)   → baseline apps, Teams, email
  Finance-Team          <span style="color:#22d3ee">(dynamic: dept==Finance)</span> → Finance SharePoint, SAP
  MFA-Required          <span style="color:#22d3ee">(dynamic: employeeType==staff)</span> → targeted by CA policy

effective access derives ENTIRELY from group membership.
change dept → dynamic groups recompute → access follows automatically.</div></div></div>
    <p>Notice nobody granted Amy the Finance app directly. She\u2019s in <code>Finance-Team</code> because her department attribute matches the rule, and the app is assigned to that group. Move her to Sales and she silently loses Finance access and gains Sales — the lifecycle from Module 04, enforced by attributes.</p></div>`,
    lab:{ kind:'classify', id:'09.1', mode:'entra',
      title:'Static or dynamic group?',
      objective:'Classify each Entra group as <b>Static</b> (members added manually) or <b>Dynamic</b> (membership computed from a rule on user attributes). Knowing which is which tells you how access will behave when someone\u2019s attributes change.',
      intro:'Tag each group. All correct to pass.',
      threeway:['Static','Dynamic'],
      twoway:true,
      items:[
        {t:'"All-Staff" — every employee is added by HR onboarding.',layer:'Static'},
        {t:'"Finance-Team" — membership rule: department equals Finance.',layer:'Dynamic'},
        {t:'"Project-Aurora" — a PM hand-picks the 8 people on the project.',layer:'Static'},
        {t:'"US-Employees" — rule: country equals US.',layer:'Dynamic'},
        {t:'"Managers" — rule: jobTitle contains Manager.',layer:'Dynamic'}
      ]},
    quiz:[
      {q:'An Entra tenant is:',
       o:['A single user account','An isolated directory instance for one organization','A type of password','A network cable'],a:1,
       e:'A tenant is the dedicated Entra directory for one org — its users, groups, apps, and policies all live inside it.'},
      {q:'In Entra, access is almost always assigned to:',
       o:['Individual users one by one','Security groups, with users placed in the groups','Random IDs','The firewall'],a:1,
       e:'Group-based assignment is the RBAC indirection applied in Entra: put users in groups, assign access to groups.'},
      {q:'A dynamic group\u2019s membership is determined by:',
       o:['A manual list','A rule evaluated against user attributes','Alphabetical order','Login time'],a:1,
       e:'Dynamic groups compute membership from attributes (e.g. department==Finance), so access follows attribute changes automatically.'},
      {q:'Entra ID differs from on-prem Active Directory in that it primarily speaks:',
       o:['LDAP and Kerberos','SAML, OIDC, OAuth, and SCIM for cloud/SaaS','Only Wi-Fi','Morse code'],a:1,
       e:'Entra is a cloud IdP using modern web protocols, whereas AD DS uses LDAP/Kerberos for on-prem Windows. Hybrid setups sync the two.'}
    ]},
  /* ---------------- 09.2 ---------------- */
  { id:'09.2', num:'09.2', title:'Conditional Access — the policy engine', minutes:11,
    dek:'Entra\u2019s heart. Signals in, access decision out. You\u2019ll configure a live policy console and prove it behaves across multiple sign-in scenarios.',
    concept:`<p><b>Conditional Access (CA)</b> is Entra\u2019s real-time policy engine. On every sign-in it evaluates <b>signals</b> and applies <b>controls</b> — the practical core of Zero Trust ("never trust, always verify").</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Conditional Access policy</div>An if-then rule: <b>IF</b> these signals (which users, which apps, what location, device state, sign-in risk) <b>THEN</b> grant with these controls (require MFA, require a compliant device) or block entirely.</div>
    <h3>The signals (the "if")</h3>
    <ul><li><b>Users/groups</b> — who the policy targets.</li>
    <li><b>Cloud apps</b> — which applications.</li>
    <li><b>Location</b> — trusted office IPs vs. anywhere; country.</li>
    <li><b>Device state</b> — managed/compliant vs. unmanaged.</li>
    <li><b>Sign-in risk</b> — Entra\u2019s ML risk score (impossible travel, leaked credentials).</li></ul>
    <h3>The controls (the "then")</h3>
    <ul><li><b>Block</b> — deny the sign-in outright.</li>
    <li><b>Grant with MFA</b> — allow only after a second factor.</li>
    <li><b>Require compliant device</b> — allow only from a managed device.</li></ul>
    <div class="keyterm"><div class="kt-label">The decisive rule</div><div class="kt-term">Block always wins</div>All applicable policies are evaluated together. If <i>any</i> applicable policy says block, the sign-in is blocked — regardless of other grants. Otherwise, <b>every</b> required control across applicable policies must be satisfied. This is exactly the Deny-overrides logic from AWS/ABAC (Module 03), applied to sign-ins.</div>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>The lockout trap:</b> a careless CA policy can lock everyone — including admins — out of the tenant (e.g. "block all access from untrusted locations" with no exclusion). Real admins always keep a <b>break-glass</b> account excluded from CA, and test policies in <i>report-only</i> mode first. Power and danger ride together.</div></div>
    <h3>How to read a CA decision</h3>
    <p>When troubleshooting "why was I blocked / not prompted for MFA," you open the <b>sign-in logs</b>, which name every policy that applied and what it required. The whole engine is auditable — you never have to guess.</p>`,
    example:`<p>Two policies apply to one risky sign-in. Watch block beat grant, then watch a clean sign-in satisfy the MFA control.</p>
    <div class="example-wrap"><div class="example-label">Worked example · evaluating a sign-in</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#3b82f6"></i><i style="background:#8b5cf6"></i><i style="background:#22d3ee"></i></div><div class="title">conditional-access · evaluate</div></div>
    <div class="console-body"><div class="mono-out">policies:
  P1 "All staff need MFA"          users=all apps=all      → grant + require MFA
  P2 "Block high sign-in risk"     users=all risk=high     → block

<span style="color:#fbbf24">sign-in A</span>: amy, finance app, risk=high, mfa done
  P1 applies (grant+mfa, satisfied) · P2 applies (block)
  → <span style="color:#f87171">BLOCKED</span>  (block always wins, even though MFA was satisfied)

<span style="color:#fbbf24">sign-in B</span>: amy, finance app, risk=none, mfa NOT done
  P1 applies (requires MFA) · P2 does not apply
  → <span style="color:#f87171">BLOCKED</span>  (required MFA control not satisfied)

<span style="color:#fbbf24">sign-in C</span>: amy, finance app, risk=none, mfa done
  P1 applies (MFA satisfied) · P2 does not apply
  → <span style="color:#34d399">ALLOWED</span></div></div></div>
    <p>Same user, three outcomes — driven entirely by signals and controls. In the lab you\u2019ll configure the controls on a real policy set and make a batch of sign-in scenarios all resolve correctly.</p></div>`,
    lab:{ kind:'caconsole', id:'09.2',
      title:'Configure Conditional Access',
      objective:'Configure the grant controls so every sign-in scenario resolves as required. The Finance app must require <b>MFA</b>; high sign-in risk must be <b>blocked</b>; and access from outside the US to Finance must be blocked. Toggle controls, then run all scenarios.',
      intro:'',
      policies:[
        {name:'Staff MFA on Finance', apps:['Finance'], users:'all', grant:'allow', controls:[]},
        {name:'Block high risk', apps:'all', users:'all', conditions:{risk:'high'}, grant:'allow', controls:[]},
        {name:'Finance US-only', apps:['Finance'], users:'all', conditions:{locationNotIn:['US']}, grant:'allow', controls:[]}
      ],
      scenarios:[
        {label:'Finance · US · low risk · MFA done', signin:{user:'amy',app:'Finance',location:'US',risk:'none',mfaDone:true,deviceManaged:true}, want:'ALLOWED'},
        {label:'Finance · US · low risk · NO MFA', signin:{user:'amy',app:'Finance',location:'US',risk:'none',mfaDone:false,deviceManaged:true}, want:'BLOCKED'},
        {label:'Finance · from RU · MFA done', signin:{user:'amy',app:'Finance',location:'RU',risk:'none',mfaDone:true,deviceManaged:true}, want:'BLOCKED'},
        {label:'Any app · high sign-in risk · MFA done', signin:{user:'amy',app:'Mail',location:'US',risk:'high',mfaDone:true,deviceManaged:true}, want:'BLOCKED'}
      ]},
    quiz:[
      {q:'Conditional Access decides access based on:',
       o:['Only the password','Signals (user, app, location, device, risk) plus grant controls','Alphabetical order','Network speed'],a:1,
       e:'CA is an if-then engine: evaluate signals, then apply controls (block, require MFA, require compliant device).'},
      {q:'Two applicable policies: one grants with MFA (satisfied), one blocks. The result is:',
       o:['Allowed','Blocked — block always wins','Depends on order','MFA prompt again'],a:1,
       e:'Across all applicable policies, any block overrides all grants. This mirrors Deny-overrides logic elsewhere in IAM.'},
      {q:'Why do admins keep a break-glass account excluded from Conditional Access?',
       o:['To save money','So a bad policy can\u2019t lock everyone (including admins) out of the tenant','For faster login','To skip MFA forever'],a:1,
       e:'A misconfigured CA policy can cause a full lockout. An excluded break-glass account is the recovery path; report-only mode tests policies safely first.'},
      {q:'To see which CA policy blocked a user, you check:',
       o:['The user\u2019s desk','The Entra sign-in logs','The Wi-Fi router','Nothing — it\u2019s secret'],a:1,
       e:'Sign-in logs name every policy that applied and the controls required, making CA decisions fully auditable.'}
    ]},
  /* ---------------- 09.3 ---------------- */
  { id:'09.3', num:'09.3', title:'PIM — just-in-time admin', minutes:9,
    dek:'Standing admin is a standing risk. Privileged Identity Management makes powerful roles eligible-not-active, activated on demand. You\u2019ll run a live activation.',
    concept:`<p>You met just-in-time privilege in the CyberArk module; <b>Privileged Identity Management (PIM)</b> is how Entra delivers it for directory and Azure roles. It\u2019s the Entra answer to standing admin access.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Eligible vs. Active assignment</div>A PIM <b>eligible</b> assignment means a user <i>can</i> hold a role but doesn\u2019t right now. They <b>activate</b> it on demand — with MFA, a justification, optional approval, and a time limit — after which it auto-deactivates back to eligible. An <b>active</b> assignment is standing (always on) — what PIM is designed to minimize.</div>
    <h3>Why this matters so much</h3>
    <p>A permanently-active Global Administrator is a 24/7 target: phish it any time and you own the tenant. Make it <b>eligible</b> via PIM and, most of the time, there is <i>no active privilege to steal</i> — the role is dormant. The window of exposure shrinks from "always" to the few approved, MFA-gated, recorded hours of actual need.</p>
    <h3>What activation can require</h3>
    <ul><li><b>MFA</b> at activation — prove it\u2019s really you before elevating.</li>
    <li><b>Justification</b> — a reason captured for the audit trail.</li>
    <li><b>Approval</b> — a designated approver must sign off for the most sensitive roles.</li>
    <li><b>Time limit</b> — a maximum activation window; it expires automatically.</li></ul>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field &amp; the SC-300 exam:</b> "A contractor needs admin for four hours" is the textbook PIM scenario — eligible assignment + time-boxed activation, never a permanent role. PIM also produces the access history auditors ask for: who activated what, when, why, and for how long.</div></div>`,
    example:`<p>One eligible role, two activation attempts. The first is missing requirements; the second satisfies them and elevates just-in-time.</p>
    <div class="example-wrap"><div class="example-label">Worked example · activating a privileged role</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#3b82f6"></i><i style="background:#8b5cf6"></i><i style="background:#22d3ee"></i></div><div class="title">PIM · Global Administrator (eligible)</div><div class="chip">PRIVILEGED</div></div>
    <div class="console-body"><div class="mono-out">role requires: MFA · justification · approval · max 8h

<span style="color:#fbbf24">attempt 1</span>: no MFA, no justification, not approved, 12h
  → <span style="color:#f87171">DENIED</span>: MFA missing · justification missing · approval pending · exceeds 8h

<span style="color:#fbbf24">attempt 2</span>: MFA done · "patching DC, INC-4471" · approved · 4h
  → <span style="color:#34d399">ACTIVATED for 4h</span>; auto-deactivates back to eligible afterward
  audit: who/when/why/duration all recorded</div></div></div>
    <p>Between activations the role is inert — eligible but not active. That dormancy is the whole point: most of the time there\u2019s simply no standing Global Admin for an attacker to capture. In the lab you\u2019ll drive an activation to success.</p></div>`,
    lab:{ kind:'pim', id:'09.3',
      title:'Activate a role through PIM',
      objective:'You hold an <b>eligible</b> Global Administrator assignment and need it for an incident. Satisfy every activation requirement — complete MFA, get approval, enter a justification, and stay within the 8-hour maximum — then activate.',
      intro:'',
      roleCfg:{role:'Global Administrator', eligible:true, requireMfa:true, requireJustification:true, requireApproval:true, maxHours:8}},
    quiz:[
      {q:'A PIM "eligible" assignment means the user:',
       o:['Has the role active permanently','Can activate the role on demand, time-boxed, then it deactivates','Can never use the role','Owns the tenant'],a:1,
       e:'Eligible = can activate when needed (with MFA/justification/approval), after which it auto-expires back to eligible. It minimizes standing privilege.'},
      {q:'PIM reduces risk primarily by:',
       o:['Making passwords longer','Eliminating standing privilege so there\u2019s usually nothing active to steal','Recording video','Adding admins'],a:1,
       e:'If the powerful role is dormant most of the time, a phish at a random moment finds no active privilege — the exposure window shrinks to the approved activation period.'},
      {q:'"A contractor needs Global Admin for four hours." The right approach is:',
       o:['Permanent Global Admin','A PIM eligible assignment with time-boxed activation','Share the admin password','Disable MFA'],a:1,
       e:'Time-boxed PIM activation gives exactly the access needed for exactly as long as needed, with an audit trail — never a permanent grant.'},
      {q:'Activation requirements PIM can enforce include all EXCEPT:',
       o:['MFA','Justification and approval','A maximum time window','Permanently disabling the account'],a:3,
       e:'PIM can require MFA, justification, approval, and a max duration. Disabling the account isn\u2019t an activation control.'}
    ]},
  /* ---------------- 09.4 ---------------- */
  { id:'09.4', num:'09.4', title:'Access Reviews & Identity Governance', minutes:9,
    dek:'Entra\u2019s built-in governance: recurring reviews that prune stale and guest access automatically. The cloud-native cousin of Module 06\u2019s certifications.',
    concept:`<p>Module 06 taught governance and certifications in the abstract. <b>Entra Access Reviews</b> (part of Entra ID Governance) are Microsoft\u2019s built-in implementation — recurring campaigns that ask reviewers to keep or remove access, with smart defaults for the messiest cases.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Access Review</div>A scheduled campaign in Entra where a reviewer (a manager, group owner, or the users themselves) confirms whether each member still needs access to a group, app, or role. Decisions can <b>auto-apply</b> — removing access on "remove" without a separate step.</div>
    <h3>The case Access Reviews shine on: guests</h3>
    <p>External <b>guest accounts</b> (B2B collaboration) are a notorious source of drift — a partner is invited for a project, the project ends, and the guest lingers with access for years. Access Reviews can target guests specifically and remove those who are inactive or have no internal sponsor.</p>
    <h3>Signals that drive good decisions</h3>
    <ul><li><b>Inactivity</b> — last sign-in date; long-dormant access is a prime removal.</li>
    <li><b>Sponsorship</b> — does a guest still have an internal business sponsor?</li>
    <li><b>Recommendations</b> — Entra can suggest keep/remove based on sign-in activity, which reviewers accept or override.</li></ul>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The guest sprawl problem:</b> tenants routinely accumulate thousands of stale guest accounts from years of partner collaboration, each a potential entry point. Recurring guest Access Reviews with auto-apply are the standard remedy — and a very common real assignment for a junior IAM engineer.</div></div>
    <h3>Where this sits</h3>
    <p>Access Reviews close the loop you learned in Module 06: provisioning grants, Conditional Access governs the sign-in, PIM governs privilege, and Access Reviews periodically re-justify standing membership and access — all inside Entra, all producing the audit evidence governance demands.</p>`,
    example:`<p>An access review over a group\u2019s membership, with the defensible call for each row based on inactivity and sponsorship.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a guest-heavy access review</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#3b82f6"></i><i style="background:#8b5cf6"></i><i style="background:#22d3ee"></i></div><div class="title">entra · access review · Project-Aurora</div><div class="chip">GOVERNANCE</div></div>
    <div class="console-body"><table class="dt"><tr><th>Member</th><th>Type</th><th>Inactive</th><th>Sponsor</th><th>Call</th></tr>

/* ===================== MODULE 10 — HR-Driven Provisioning (HRIS to IdP to AD) ===================== */
/* ===================== MODULE 10 — HR-Driven Provisioning (HRIS to IdP to AD) ===================== */
{ id:'M10', num:'10', title:'HR-Driven Provisioning', sub:'5 lessons \u00b7 HRIS \u00b7 AD-first &amp; IdP-first',
  blurb:'Where identity actually begins: the HR system. How Workday and BambooHR drive joiners, movers, and leavers into the directory \u2014 covering both wiring models (AD-first/hybrid, where AD is the hub and Entra Connect syncs up; and IdP-first/cloud, where the IdP writes down into AD) with the real Okta and Entra mechanics.',
  lessons:[
  /* ---------------- 10.1 ---------------- */
  { id:'10.1', num:'10.1', title:'HRIS as the source of truth', minutes:9,
    dek:'Identity does not start in the IdP \u2014 it starts when HR hires someone. This is how the HR system becomes the authoritative source that drives everything downstream.',
    concept:`<p>Module 04 said lifecycle events "originate from the system of record." This module opens that black box. The system of record is the <b>HRIS</b> \u2014 the Human Resources Information System \u2014 and it is where a person's identity is truly born.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">HRIS (HR Information System)</div>The system HR uses to manage employment: hires, transfers, leaves, terminations. <b>Workday</b> and <b>BambooHR</b> are common examples (also SuccessFactors, UKG, ADP, Namely). In an HR-driven model the HRIS is the <b>authoritative source of truth</b> for who exists and what their core attributes are.</div>
    <h3>Why HR, not IT, is the source</h3>
    <p>A person becomes an employee the moment HR completes a hire \u2014 before IT touches anything. If identity instead started with an IT ticket, you'd have the gaps Module 04 warned about: accounts created late, attributes that disagree with HR, leavers IT never hears about. Anchoring identity to the HRIS means <b>the same event that makes someone an employee makes them an identity</b> \u2014 automatically, with no ticket.</p>
    <h3>The order of AD vs. the IdP is not fixed \u2014 there are two topologies</h3>
    <p>Here is the thing most explanations get wrong by picking one diagram: <b>where Active Directory sits relative to the cloud IdP depends on the organization\u2019s history.</b> There are two legitimate, common topologies, and a real IAM engineer is expected to recognize both.</p>
    <div class="keyterm"><div class="kt-label">Topology 1</div><div class="kt-term">AD-first (hybrid) \u2014 HRIS \u2192 AD \u2192 IdP \u2192 apps</div>The long-established enterprise pattern. HR data lands in <b>on-premises Active Directory first</b> (historically via middleware like Microsoft Identity Manager / MIM or SAP IDM, sometimes CSV/scripts). AD is the de facto identity backbone, and the cloud IdP is <b>synced up from AD</b> \u2014 in Microsoft\u2019s world that\u2019s <b>Entra Connect</b> reading AD and projecting users into Entra ID. Here <b>AD comes before the IdP.</b> Most organizations that had AD before they had a cloud IdP run this way.</div>
    <div class="keyterm"><div class="kt-label">Topology 2</div><div class="kt-term">IdP-first (HR-driven) \u2014 HRIS \u2192 IdP \u2192 AD + apps</div>The modern cloud-centric pattern. The HRIS feeds the <b>IdP directly</b>, the IdP is the hub, and <b>AD becomes just another downstream target</b> the IdP writes into (Okta\u2019s AD agent + Profile Push, or Entra\u2019s Provisioning Agent). Here the <b>IdP comes before AD.</b> Newer or re-platformed organizations favor this.</div>
    <p>Both are correct. The difference is simply <b>which system is the hub</b> \u2014 AD (Topology 1) or the cloud IdP (Topology 2). If someone describes their chain as "HR \u2192 AD \u2192 Entra," they\u2019re not wrong; they\u2019re describing the hybrid model. This module teaches the mechanics of <i>both</i> directions: writing <i>into</i> AD (Topology 2) and syncing <i>up from</i> AD (Topology 1).</p>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>One hub, one writer:</b> whichever topology you run, a given user should be owned by <b>one</b> sync path at a time. Pointing two tools at the same objects (e.g. both writing to AD and syncing from it as a source) creates "last writer wins" conflicts and duplicates. Decide the hub, then make everything else a target.</div></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the field:</b> "What\u2019s your source of truth, and is AD upstream or downstream of your IdP?" is one of the first questions in any IAM design discussion. The mature answer names the topology: "HR is the source of truth; AD is the hub and Entra syncs up from it" (hybrid), or "HR feeds the IdP and AD is a downstream target" (cloud-first). Being able to say which one \u2014 and why \u2014 is exactly what this lesson is for.</div></div>`,
    example:`<p>The same hire, wired two ways. Notice AD and the IdP swap places \u2014 both deliver the worker to the same apps, just through a different hub.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 the two topologies, side by side</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f59e0b"></i><i style="background:#3b82f6"></i><i style="background:#22d3ee"></i></div><div class="title">hire "Amy Chen" \u2014 two wiring diagrams</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#22d3ee">TOPOLOGY 1 \u2014 AD-first (hybrid)</span>
  Workday (source of truth)
    \u2192 middleware (MIM / SAP IDM) creates the user in
  <span style="color:#3b82f6">Active Directory</span>  (the hub; on-prem backbone)
    \u2192 <span style="color:#3b82f6">Entra Connect</span> syncs the AD account UP into
  Entra ID (cloud IdP)
    \u2192 cloud apps. <span style="color:#5c6b80"># AD comes BEFORE the IdP</span>

<span style="color:#22d3ee">TOPOLOGY 2 \u2014 IdP-first (HR-driven, cloud)</span>
  Workday (source of truth)
    \u2192 <span style="color:#22d3ee">Okta / Entra</span> (the hub) creates the identity
    \u2192 writes DOWN into <span style="color:#3b82f6">Active Directory</span> (a target; AD agent / Provisioning Agent)
    \u2192 and into SaaS apps via SCIM. <span style="color:#5c6b80"># IdP comes BEFORE AD</span>

both: HR fires once \u2192 worker lands in AD + apps, no IT ticket</div></div></div>
    <p>Same source (HR), same destinations (AD + apps) \u2014 the only difference is which system is the hub in the middle. Your question "doesn\u2019t AD come first?" describes Topology 1 exactly, and it\u2019s extremely common. The rest of the module covers the mechanics of both: lessons 10.2\u201310.4 dig into the cloud IdP paths (including syncing up <i>from</i> AD and writing down <i>into</i> it), and the next lab has you tell the two topologies apart from a description.</p></div>`,
    lab:{ kind:'classify', id:'10.1', mode:'sot',
