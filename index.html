      objective:'For each piece of data, decide whether the authoritative owner is the <b>HRIS</b> (worker identity &amp; core HR attributes) or the <b>IdP</b> (access &amp; entitlements). Getting this boundary right is the heart of HR-driven design.',
      intro:'Tag each. All correct to pass.',
      threeway:['HRIS','IdP'],
      twoway:true,
      items:[
        {t:'Whether a person is an active employee, and their hire/termination dates.',layer:'HRIS'},
        {t:'Department, job title, and manager.',layer:'HRIS'},
        {t:'Which applications and groups the person is assigned to.',layer:'IdP'},
        {t:'The user\u2019s MFA factors and sign-on policy.',layer:'IdP'},
        {t:'Legal name, employee ID, and employment type.',layer:'HRIS'},
        {t:'Membership in the "Finance-App-Users" access group.',layer:'IdP'}
      ]},
    quiz:[
      {q:'In an HR-driven model, the authoritative source of truth for worker identity is:',
       o:['The firewall','The HRIS (e.g. Workday, BambooHR)','The SaaS app','The end user'],a:1,
       e:'The HRIS owns who exists and their core HR attributes; the same hire/termination that changes employment drives identity automatically.'},
      {q:'The clean ownership split in HR-driven identity is:',
       o:['HR owns everything','HR owns who you are; the IdP owns what you can reach','IT tickets own everything','The app owns identity'],a:1,
       e:'HR is authoritative for worker identity and core attributes; the IdP is authoritative for access and entitlements.'},
      {q:'Why stage a hire as a "pre-hire" before the start date?',
       o:['To bill earlier','So accounts are ready on day one but stay disabled until the effective date','To skip MFA','To avoid HR'],a:1,
       e:'Pre-hire staging provisions everything ahead of time while keeping the account disabled until the start date \u2014 ready, but not usable early.'},
      {q:'An org says their chain is "HR \u2192 Active Directory \u2192 Entra ID \u2192 apps." This is:',
       o:['Wrong \u2014 the IdP must always come first','A valid AD-first (hybrid) topology, where AD is the hub and Entra Connect syncs up from it','Impossible','Only for tiny companies'],a:1,
       e:'AD-first is a legitimate, very common topology: HR lands in AD (often via MIM/SAP IDM), and Entra Connect syncs AD up into Entra ID. AD comes before the IdP here.'},
      {q:'In the IdP-first (cloud HR-driven) topology, Active Directory is:',
       o:['The hub everything syncs from','A downstream target the IdP writes into (Okta AD agent / Entra Provisioning Agent)','Not used at all','The HR system'],a:1,
       e:'When the IdP is the hub fed directly by HR, AD becomes one more downstream target the IdP provisions into \u2014 the reverse of the hybrid model.'}
    ]},
  /* ---------------- 10.2 ---------------- */
  { id:'10.2', num:'10.2', title:'The Okta path: Workday & BambooHR as profile source', minutes:11,
    dek:'How Okta actually ingests HR data \u2014 profile sourcing, the Workday integration user, Real-Time Sync, and AD as a downstream target. Verified against Okta documentation.',
    concept:`<p>In Okta, HR-driven provisioning is built on <b>profile sourcing</b>. You connect the HRIS as a profile source and Okta treats it as the master for those users.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Profile source (profile master)</div>An app Okta treats as the authoritative source for user identities and attributes. When you enable the HRIS (Workday, BambooHR) as a profile source, creation, updates, and termination events flow <b>from the HRIS into Okta</b>, and Okta keeps managing those users from then on. If no external source is set, Okta itself is the source.</div>
    <h3>Workday \u2192 Okta, concretely</h3>
    <p>Okta connects to <b>Workday's Human Resources APIs</b> using a dedicated <b>integration system user</b> (a service account in Workday). It supports two modes that build on each other:</p>
    <ul>
      <li><b>Import from Workday</b> \u2014 pulls users/attributes into Okta on a schedule.</li>
      <li><b>Workday-driven IT provisioning</b> \u2014 a superset: Workday continues to <i>manage</i> imported users, so updates and terminations in Workday are reflected in Okta and downstream apps. Okta imports workers once their <b>Hire Date / First Day of Work</b> attributes are populated.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Real-Time Sync (RTS)</div>For time-critical changes \u2014 above all an <b>immediate termination</b> \u2014 Okta supports a Workday business process that pushes a trigger to Okta in real time, rather than waiting for the next scheduled import. You configure the trigger in Workday so urgent leaver events cut access right away.</div>
    <h3>BambooHR \u2192 Okta, concretely</h3>
    <p>BambooHR connects more simply: in Okta's BambooHR app you <b>Configure API Integration</b> and authenticate (BambooHR uses an <b>API key</b> generated under Account \u2192 API Keys). Under the provisioning settings you enable <b>"Allow BambooHR to source Okta users"</b> in the Profile &amp; Lifecycle Sourcing area \u2014 that switch makes BambooHR the profile source.</p>
    <h3>Active Directory as a downstream target (in this topology)</h3>
    <p>In the <b>IdP-first</b> topology (Topology 2 from 10.1), <b>AD is a destination, not the source.</b> Okta runs a lightweight <b>AD agent</b> on-premises, and with <b>Profile Push</b> enabled Okta creates and updates the AD account (in the right OU) from the HR-sourced Okta profile. So here the chain is: Workday/Bamboo \u2192 Okta (Universal Directory) \u2192 Active Directory \u2192 SaaS apps. (In the AD-first topology the arrow runs the other way \u2014 AD is the source and Okta imports <i>from</i> it via its AD integration. This lesson focuses on the HR-driven, IdP-first direction.)</p>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>One source per user:</b> Okta allows only one profile source per user at a time. If you point both Workday and AD at the same users as sources, you get conflicts. The discipline is: pick the hub \u2014 in this topology HR is the source and AD and apps are <i>targets</i> Okta pushes to. Mixing directions for the same users is a classic misconfiguration.</div></div>`,
    example:`<p>Two real Okta HR connections side by side \u2014 the heavyweight Workday path and the lightweight BambooHR path \u2014 both ending with AD as a downstream target.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 configuring HR sourcing in Okta</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f59e0b"></i><i style="background:#22d3ee"></i><i style="background:#3b82f6"></i></div><div class="title">okta \u00b7 profile sourcing</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#22d3ee">WORKDAY</span>
  auth     : Workday Human Resources API via integration system user
  modes    : Import  |  Workday-driven IT provisioning (manages users ongoing)
  trigger  : scheduled import + <span style="color:#fbbf24">Real-Time Sync</span> for instant terminations
  imports  : workers once Hire Date / First Day of Work are set

<span style="color:#22d3ee">BAMBOOHR</span>
  auth     : Configure API Integration \u2192 API key (Account \u25b8 API Keys)
  source   : enable "Allow BambooHR to source Okta users"

<span style="color:#22d3ee">DOWNSTREAM (both)</span>
  Okta UD \u2192 Active Directory (AD agent + Profile Push, correct OU) \u2192 SaaS via SCIM</div></div></div>
    <p>Notice AD sits on the <i>output</i> side of Okta in both cases. The HRIS is the only source; Okta is the hub; AD and apps are targets. In the lab you'll build the Okta-side attribute mapping that turns a raw Workday record into a clean provisioned profile.</p></div>`,
    lab:{ kind:'attrmap', id:'10.2', hris:'Workday', idp:'Okta',
      title:'Map Workday attributes into Okta',
      objective:'A raw Workday worker record needs to become a clean Okta/AD profile. For each target attribute, pick the transform that yields the required provisioned value.',
      intro:'',
      worker:{first:'Amy', last:'Chen', dept:'Finance', country:'us'},
      targets:[
        {to:'login', expect:'achen', transform:'firstInitialLastName'},
        {to:'email', expect:'achen@northwind.com', transform:'email', domain:'northwind.com'},
        {to:'department', from:'dept', expect:'Finance', transform:'copy'},
        {to:'countryCode', from:'country', expect:'US', transform:'upper'},
        {to:'userType', expect:'Employee', transform:'static', value:'Employee'}
      ]},
    quiz:[
      {q:'In Okta, making Workday or BambooHR the authoritative source for users is called:',
       o:['Federation','Profile sourcing (profile master)','Clock skew','Tokenization'],a:1,
       e:'Enabling the HRIS as a profile source makes its create/update/terminate events drive the matching Okta users.'},
      {q:'Okta authenticates to Workday\u2019s HR APIs using:',
       o:['The employee\u2019s own password','A dedicated Workday integration system user (service account)','An anonymous link','A SAML assertion'],a:1,
       e:'A Workday integration system user is the service account Okta uses to read worker data via the Workday Human Resources APIs.'},
      {q:'For an immediate termination, Okta avoids waiting for the next scheduled import by using:',
       o:['Email','Real-Time Sync triggered by a Workday business process','A reboot','A nightly batch'],a:1,
       e:'Real-Time Sync lets a Workday business process push the event to Okta instantly \u2014 essential for cutting a terminated worker\u2019s access right away.'},
      {q:'In the Okta HR-driven model, Active Directory is:',
       o:['The source of truth','A downstream target Okta writes to via the AD agent + Profile Push','Irrelevant','The MFA provider'],a:1,
       e:'HR is the source; Okta pushes into AD as a destination using the on-prem AD agent with Profile Push. AD is downstream, not the master.'}
    ]},
  /* ---------------- 10.3 ---------------- */
  { id:'10.3', num:'10.3', title:'The Entra path: inbound provisioning & AD write-back', minutes:11,
    dek:'Microsoft\u2019s HR-driven flow: the Entra provisioning service pulls from Workday, the Provisioning Agent writes to on-prem AD, Entra Connect syncs back up, and writeback returns data to HR. Verified against Microsoft Learn.',
    concept:`<p>Microsoft Entra implements the same HR-driven pattern with its own components. The shape is identical \u2014 HRIS is the source, AD can be a target \u2014 but the plumbing has specific named pieces worth knowing for the SC-300 exam and real Entra shops.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Entra inbound (HR-driven) provisioning</div>The Microsoft Entra provisioning service integrates with the <b>Workday Human Resources API</b> and runs <b>scheduled synchronizations</b>, identifying worker changes (New Hires, Transfers, Terminations) and turning them into create/update/enable/disable operations downstream.</div>
    <h3>Two target patterns</h3>
    <p>Entra supports two destinations, and which you choose depends on whether users need an on-prem AD account:</p>
    <ul>
      <li><b>Workday \u2192 Entra ID (cloud-only)</b> \u2014 for users who need only a cloud account. Worker events create/update the user directly in Entra ID.</li>
      <li><b>Workday \u2192 on-premises Active Directory</b> \u2014 for users who need an AD account (or both). Here the event flows from Workday into AD <i>through</i> Entra and the <b>Provisioning Agent</b>.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Entra Connect Provisioning Agent</div>A lightweight on-prem agent that the Entra provisioning service uses to <b>create and update accounts in on-premises AD</b>, via a service account. It is the bridge that lets a cloud service write into your on-prem directory.</div>
    <h3>The full hybrid round-trip</h3>
    <p>For the AD pattern, data makes a loop \u2014 and understanding the loop is the whole point:</p>
    <ul>
      <li><b>Down:</b> Workday \u2192 Entra provisioning service \u2192 <b>Provisioning Agent</b> \u2192 creates/updates the user in on-prem <b>AD</b> (correct OU, enable/disable per event).</li>
      <li><b>Up:</b> <b>Entra Connect</b> (the long-standing sync engine) runs a <b>delta sync</b> that pulls those AD changes up into Entra ID, so the cloud account matches.</li>
      <li><b>Back to HR:</b> the optional <b>Workday Writeback</b> app returns generated values \u2014 work <b>email, username, phone</b> \u2014 from Entra back into Workday, so HR\u2019s record shows the person\u2019s real corporate email.</li>
    </ul>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>Why writeback matters:</b> HR enters a hire, but they don\u2019t know the person\u2019s eventual <code>first.last@company.com</code> address \u2014 the IdP generates it. Writeback closes the loop so Workday holds the authoritative corporate email and username, which other HR processes (and the worker\u2019s manager) rely on. It\u2019s a small flow that prevents a lot of "what\u2019s my email?" confusion.</div></div>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>Don\u2019t confuse the two sync tools:</b> the <b>Provisioning Agent</b> pushes HR \u2192 AD (inbound provisioning). <b>Entra Connect</b> syncs AD \u2192 Entra ID (the classic hybrid directory sync). They run in the same architecture but point in opposite directions. Knowing which does which is a common interview and exam discriminator.</div></div>`,
    example:`<p>The Workday-to-AD round-trip in Entra, step by step \u2014 down through the Provisioning Agent, up through Entra Connect, and back to Workday via writeback.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 Entra HR-driven round-trip</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f59e0b"></i><i style="background:#3b82f6"></i><i style="background:#22d3ee"></i></div><div class="title">workday \u2194 entra \u2194 active directory</div><div class="chip">HYBRID</div></div>
    <div class="console-body"><div class="mono-out">1  Workday: New Hire "Amy Chen" (authoritative HR event)
2  Entra provisioning service: scheduled sync detects the new worker
3  <span style="color:#22d3ee">Provisioning Agent</span> (on-prem, service account)
     \u2192 create AD account in Finance OU; generate UPN + email
4  <span style="color:#22d3ee">Entra Connect</span> delta sync
     \u2192 AD account synced UP into Entra ID (cloud account matches)
5  <span style="color:#22d3ee">Workday Writeback</span> app
     \u2192 write email + username + phone BACK into Workday
result: one HR action \u2192 AD account + Entra account + HR record all consistent</div></div></div>
    <p>Down via the Provisioning Agent, up via Entra Connect, back via Writeback. That three-arrow loop is the canonical Entra hybrid HR integration \u2014 in the lab you\u2019ll drive these worker events and watch the IdP and AD operations each one produces.</p></div>`,
    lab:{ kind:'hrispipeline', id:'10.3', hris:'Workday', idp:'Entra ID',
      title:'Drive the HR-to-AD pipeline',
      objective:'Process the worker lifecycle through the Entra pipeline. Fire each event and watch it flow to the IdP and on-prem AD. Process all the events to complete the full lifecycle.',
      intro:'',
      events:[
        {label:'New Hire (pre-hire)', event:{type:'hire', preHire:true}},
        {label:'Transfer to new dept', event:{type:'transfer'}},
        {label:'Leave of absence', event:{type:'leave'}},
        {label:'Return from leave', event:{type:'returnFromLeave'}},
        {label:'Termination', event:{type:'terminate'}}
      ]},
    quiz:[
      {q:'The Entra component that writes accounts into on-premises Active Directory is the:',
       o:['Entra Connect sync engine','Entra Connect Provisioning Agent','Conditional Access engine','PIM'],a:1,
       e:'The Provisioning Agent uses a service account to create/update on-prem AD accounts as part of inbound HR-driven provisioning.'},
      {q:'Entra Connect\u2019s role in the Workday-to-AD pattern is to:',
       o:['Push HR data into AD','Delta-sync AD changes UP into Entra ID','Send email','Rotate passwords'],a:1,
       e:'Provisioning Agent goes HR \u2192 AD; Entra Connect goes AD \u2192 Entra ID. They point in opposite directions in the same architecture.'},
      {q:'Workday Writeback exists to:',
       o:['Delete users','Return generated values like email/username/phone from Entra back to Workday','Block sign-ins','Replace SCIM'],a:1,
       e:'Writeback closes the loop so HR\u2019s record holds the authoritative corporate email and username the IdP generated.'},
      {q:'For users who need only a cloud account and no on-prem AD, you would use:',
       o:['Workday \u2192 on-prem AD provisioning','Workday \u2192 Entra ID (cloud-only) provisioning','No provisioning','LDAP only'],a:1,
       e:'The cloud-only inbound provisioning app creates/updates users directly in Entra ID without involving on-prem AD or the Provisioning Agent.'}
    ]},
  /* ---------------- 10.4 ---------------- */
  { id:'10.4', num:'10.4', title:'Attribute mapping, transformation & matching', minutes:10,
    dek:'The make-or-break details of any HR integration: mapping source fields to target attributes, transforming values, and matching identities so you never create a duplicate.',
    concept:`<p>Connecting the HRIS is the easy part. The work \u2014 and where integrations break \u2014 is in three details: <b>mapping</b>, <b>transformation</b>, and <b>matching</b>. Both Okta and Entra center their configuration on exactly these.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Attribute mapping</div>Declaring which <b>source</b> field (Workday/Bamboo) populates which <b>target</b> attribute (in the IdP and AD). E.g. Workday <code>Business_Title</code> \u2192 IdP <code>title</code>; Workday <code>Supervisory_Org</code> \u2192 <code>department</code>. Get a mapping wrong and every provisioned user carries the wrong value.</div>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Transformation</div>Source values rarely match the target format. Transformations reshape them: build a <b>username</b> as first-initial + last name, construct an <b>email</b>, upper/lower-case a country code, or set a <b>static</b> value like <code>userType = Employee</code>. This is how a raw HR record becomes clean directory data.</div>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Matching (correlation)</div>Before creating an account, the IdP checks whether this worker already exists \u2014 using a stable <b>matching identifier</b> (e.g. employee ID, or email). Good matching links the HR record to the existing identity on a <b>rehire</b> or re-sync instead of creating a <b>duplicate</b>. Bad matching is how you end up with two accounts for one person.</div>
    <h3>Why matching is the dangerous one</h3>
    <p>Mapping and transformation errors are visible \u2014 a wrong title is obvious. Matching errors are <b>silent and costly</b>: a rehired employee gets a brand-new account while their old one lingers, or a sync re-creates everyone because the match key changed. The fix is to choose a <b>stable, unique</b> matching attribute (employee ID is ideal; email can change on a name change) and to test the rehire path explicitly.</p>
    <div class="callout danger"><span class="ic">\ud83d\udea8</span><div><b>The duplicate-identity trap:</b> the most expensive HR-integration bug is poor matching producing duplicate accounts \u2014 two identities for one human, with access split across both and neither cleanly deprovisioned at termination. It re-creates the exact leaver risk from Module 04. Always anchor matching to an immutable identifier and verify rehires link rather than duplicate.</div></div>
    <h3>How the pieces fit</h3>
    <p>Putting the module together: HR fires an event (10.1); Okta or Entra ingests it via profile sourcing / inbound provisioning (10.2, 10.3); <b>matching</b> finds or creates the identity; <b>mapping + transformation</b> shape the attributes; the IdP provisions into AD and apps; and for movers/leavers the same machinery updates or disables everywhere. That end-to-end pipeline \u2014 source, ingest, match, map, transform, provision, deprovision \u2014 is the spine of enterprise identity.</p>`,
    example:`<p>One worker re-synced twice. Watch good matching link to the existing identity while bad matching spawns a duplicate.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 matching prevents duplicates</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">identity matching</div></div>
    <div class="console-body"><div class="mono-out">incoming worker: employeeId=E-4471, name now "Amy Rao" (married name)

<span style="color:#f87171">BAD: match on email</span>  (achen@ vs arao@)
  \u2192 email changed \u2192 no match \u2192 <span style="color:#f87171">creates DUPLICATE account</span>
  \u2192 two identities for one person; access split; messy termination

<span style="color:#34d399">GOOD: match on employeeId</span>  (E-4471 == E-4471)
  \u2192 stable key matches \u2192 <span style="color:#34d399">links to existing identity</span>
  \u2192 updates name + email on the SAME account; no duplicate</div></div></div>
    <p>The only difference is the matching attribute. An immutable identifier like employee ID survives name and email changes; a mutable one silently fractures the identity. In the lab you\u2019ll get the transforms right so a raw worker record provisions to exactly the expected target values.</p></div>`,
    lab:{ kind:'attrmap', id:'10.4', hris:'BambooHR', idp:'Okta/AD',
      title:'Build the mapping & transforms',
      objective:'Turn this BambooHR worker record into the exact target profile. Pick the transform for each target attribute so every computed value matches what\u2019s required.',
      intro:'',
      worker:{first:'Ben', last:'Cole', dept:'Engineering', country:'US'},
      targets:[
        {to:'samAccountName', expect:'bcole', transform:'firstInitialLastName'},
        {to:'mail', expect:'bcole@northwind.com', transform:'email', domain:'northwind.com'},
        {to:'displayDept', from:'dept', expect:'Engineering', transform:'copy'},
        {to:'countryLower', from:'country', expect:'us', transform:'lower'},
        {to:'employeeType', expect:'Employee', transform:'static', value:'Employee'}
      ]},
    quiz:[
      {q:'Attribute mapping in an HR integration declares:',
       o:['Which password to use','Which source HR field populates which target directory attribute','The network route','The MFA factor'],a:1,
       e:'Mapping wires source fields (Workday/Bamboo) to target attributes (IdP/AD), e.g. Business Title \u2192 title.'},
      {q:'Constructing a username as first-initial + last name from HR data is an example of:',
       o:['Matching','Transformation','Federation','Tokenization'],a:1,
       e:'Transformations reshape raw source values into the target format \u2014 usernames, emails, case changes, static values.'},
      {q:'The safest attribute to match a worker on, to avoid duplicates, is:',
       o:['Email (can change on a name change)','A stable, immutable employee ID','First name','Phone number'],a:1,
       e:'An immutable identifier like employee ID survives name/email changes, so re-syncs and rehires link to the existing identity instead of duplicating it.'},
      {q:'The most expensive matching failure produces:',
       o:['Slower logins','Duplicate identities \u2014 two accounts for one person, split access, messy termination','A nicer UI','Extra MFA prompts'],a:1,
       e:'Poor matching creates duplicate accounts, fracturing access and re-creating the leaver risk because neither account cleanly deprovisions.'}
    ]},
  /* ---------------- 10.5 ---------------- */
  { id:'10.5', num:'10.5', title:'AD-first vs. IdP-first: reading the topology', minutes:9,
    dek:'Pull the module together by learning to recognize which wiring an organization actually has \u2014 the question that anchors any real HR-identity design discussion.',
    concept:`<p>Lesson 10.1 introduced two topologies; 10.2\u201310.4 covered the cloud mechanics. This lesson makes you fluent at <b>telling them apart</b> \u2014 because the first real task on any identity project is figuring out which one you\u2019re standing in, and they are wired in opposite directions.</p>
    <div class="keyterm"><div class="kt-label">Topology 1 \u2014 recap</div><div class="kt-term">AD-first (hybrid): HRIS \u2192 AD \u2192 IdP \u2192 apps</div><b>Active Directory is the hub.</b> HR data reaches AD first (via MIM, SAP IDM, or older CSV/script processes), and <b>Entra Connect syncs AD up into Entra ID</b>. Tells: an on-prem AD that predates the cloud; Entra Connect installed; the cloud directory treated as a mirror of AD; the source anchor (<code>ms-DS-ConsistencyGuid</code> \u2192 cloud <code>ImmutableID</code>) tying each cloud user to its AD object.</div>
    <div class="keyterm"><div class="kt-label">Topology 2 \u2014 recap</div><div class="kt-term">IdP-first (HR-driven): HRIS \u2192 IdP \u2192 AD + apps</div><b>The cloud IdP is the hub.</b> HR feeds Okta/Entra directly, and the IdP <b>writes down into AD</b> (Okta AD agent + Profile Push, or Entra\u2019s Provisioning Agent) as one more target. Tells: HR connected straight to the IdP; AD created/updated <i>by</i> the IdP; cloud-first or greenfield orgs; AD shrinking to "just where the on-prem file server checks logins."</div>
    <h3>The questions that reveal the topology</h3>
    <p>You don\u2019t need a diagram \u2014 a few questions expose it:</p>
    <ul>
      <li><b>"Which system does HR connect to?"</b> AD/middleware \u2192 Topology 1. Okta/Entra directly \u2192 Topology 2.</li>
      <li><b>"Which way does Entra Connect / the agent run?"</b> Syncing AD \u2192 cloud is Topology 1. The IdP writing \u2192 AD is Topology 2.</li>
      <li><b>"What was here first?"</b> Decades-old AD \u2192 almost certainly Topology 1. Cloud-native company \u2192 Topology 2.</li>
      <li><b>"Where do new accounts first appear?"</b> In AD \u2192 Topology 1. In the IdP \u2192 Topology 2.</li>
    </ul>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>Hybrids of the hybrid exist:</b> large orgs sometimes run both \u2014 AD-first for legacy staff, IdP-first for a newer division \u2014 or are mid-migration from one to the other. That\u2019s fine, as long as <b>each user has one hub</b>. The danger is ambiguity: nobody can say which system owns a given account, so two tools fight over it. Naming the topology per population is how you avoid that.</div></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>Why interviewers love this:</b> "Walk me through how HR data gets into your directories" instantly separates someone who memorized one diagram from someone who understands the design space. The strong answer is "it depends on whether AD or the IdP is the hub \u2014 here\u2019s how I\u2019d tell, and here\u2019s the trade-off." That\u2019s this lesson.</div></div>`,
    example:`<p>Two real-sounding environments. Same goal, opposite wiring \u2014 read the tells.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 diagnosing two shops</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f59e0b"></i><i style="background:#3b82f6"></i><i style="background:#22d3ee"></i></div><div class="title">topology diagnosis</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#fbbf24">SHOP A</span>: "We\u2019ve run AD for 15 years. SAP IDM creates accounts in
         AD from our HR feed, and Entra Connect pushes them to the cloud
         for Microsoft 365."
  tells: AD predates cloud \u00b7 middleware \u2192 AD \u00b7 Entra Connect AD\u2192cloud
  \u2192 <span style="color:#3b82f6">TOPOLOGY 1 \u2014 AD-first (hybrid)</span>

<span style="color:#fbbf24">SHOP B</span>: "We\u2019re cloud-native on Okta. Workday provisions users into
         Okta, and Okta\u2019s AD agent creates accounts in the one AD we keep
         for a legacy file server."
  tells: HR \u2192 IdP directly \u00b7 IdP writes INTO AD \u00b7 AD is a leftover target
  \u2192 <span style="color:#22d3ee">TOPOLOGY 2 \u2014 IdP-first (HR-driven)</span></div></div></div>
    <p>The giveaway is always <b>which system is the hub</b> and <b>which way the sync runs</b>. In the lab you\u2019ll classify a set of described environments as AD-first or IdP-first \u2014 the exact reasoning a design conversation needs.</p></div>`,
    lab:{ kind:'classify', id:'10.5', mode:'topology',
      title:'Classify the topology',
      objective:'Read each described environment and tag it <b>AD-first</b> (AD is the hub; Entra Connect syncs up to the cloud) or <b>IdP-first</b> (the cloud IdP is the hub; it writes down into AD). All correct to pass.',
      intro:'Tag each environment. All correct to pass.',
      threeway:['AD-first','IdP-first'],
      twoway:true,
      items:[
        {t:'HR feed \u2192 MIM creates the user in on-prem AD \u2192 Entra Connect syncs it up to Entra ID.',layer:'AD-first'},
        {t:'Workday provisions directly into Okta; Okta\u2019s AD agent then creates the AD account.',layer:'IdP-first'},
        {t:'Decades-old AD is the backbone; the cloud directory is just a synced mirror of it.',layer:'AD-first'},
        {t:'Cloud-native shop: Entra inbound provisioning pulls from Workday and the Provisioning Agent writes to a small legacy AD.',layer:'IdP-first'},
        {t:'New accounts first appear in Active Directory, then propagate to the cloud IdP.',layer:'AD-first'},
        {t:'New accounts first appear in the IdP, which then pushes them down into AD and SaaS apps.',layer:'IdP-first'}
      ]},
    quiz:[
      {q:'In the AD-first (hybrid) topology, the hub of identity is:',
       o:['The cloud IdP','On-premises Active Directory, with Entra Connect syncing up to the cloud','The SaaS app','The HR system itself'],a:1,
       e:'AD-first makes Active Directory the hub; HR lands there first and Entra Connect projects users up into Entra ID.'},
      {q:'The clearest single question to distinguish the two topologies is:',
       o:['How many users are there?','Which system is the hub, and which way does the sync run (into AD vs. up from AD)?','What color is the logo?','How old is the CEO?'],a:1,
       e:'Topology is defined by which system is the hub and the sync direction: HR\u2192AD\u2192cloud (AD-first) vs. HR\u2192IdP\u2192AD (IdP-first).'},
      {q:'An org running AD-first for legacy staff and IdP-first for a new division is:',
       o:['Misconfigured by definition','Fine, as long as each user is owned by exactly one hub','Impossible','Required to pick only one'],a:1,
       e:'Mixed topologies are common during migrations or across divisions; the rule is single-hub ownership per user to avoid sync conflicts.'},
      {q:'The risk when a topology is ambiguous (no clear hub per user) is:',
       o:['Faster logins','Two sync tools fighting over the same object \u2014 "last writer wins" conflicts and duplicates','Lower cost','Better security'],a:1,
       e:'Without a single owning hub per user, competing writers create conflicts and duplicate identities \u2014 the failure mode 10.4 warned about.'}
    ]}
  ]},
/* ===================== MODULE 11 — IAM's Role in Cybersecurity ===================== */
{ id:'M11', num:'11', title:'IAM\u2019s Role in Cybersecurity', sub:'4 lessons \u00b7 the big picture',
  blurb:'Step back and see where everything you\u2019ve learned fits. How identity became the primary security perimeter, why "identity is the new firewall," how IAM maps to Zero Trust and the defense-in-depth stack, and the role IAM plays across the breach lifecycle and compliance.',
  lessons:[
  /* ---------------- 11.1 ---------------- */
  { id:'11.1', num:'11.1', title:'What IAM is, and why security depends on it', minutes:8,
    dek:'The definition that ties the whole course together, and why identity sits at the center of modern cyber defense.',
    concept:`<p>You\u2019ve spent ten modules building IAM skills hands-on. This final module zooms out to the question an interviewer or executive will ask: <i>why does any of this matter to security as a whole?</i> Start with the definition.</p>
    <div class="keyterm"><div class="kt-label">The definition</div><div class="kt-term">Identity and Access Management (IAM)</div>Identity and Access Management (IAM) is a framework of policies, processes, and technologies that manage digital identities and control who can access organizational resources. It ensures that access is correct, monitored, and compliant; all critical to defending against cyber threats.</div>
    <p>Read that definition again, because each clause maps to something you\u2019ve already practiced:</p>
    <ul>
      <li><b>"Policies, processes, and technologies"</b> \u2014 not just a tool. Policy (governance, Module 06), process (joiner-mover-leaver, Module 04), and technology (Okta, Entra, CyberArk, Modules 05/09/07) together.</li>
      <li><b>"Manage digital identities"</b> \u2014 the identity lifecycle from HR source through every system (Modules 01, 04, 10).</li>
      <li><b>"Control who can access organizational resources"</b> \u2014 authentication and authorization, RBAC/ABAC, least privilege (Modules 01, 02, 03).</li>
      <li><b>"Correct, monitored, and compliant"</b> \u2014 access reviews, certifications, audit evidence (Module 06).</li>
    </ul>
    <h3>Why identity is now the front line</h3>
    <p>For decades, security meant defending a <b>network perimeter</b>: a hard outer wall (firewalls, the corporate LAN) protecting a soft trusted inside. That model broke. Cloud apps, SaaS, remote work, and mobile devices mean there is no single wall anymore; resources and users are everywhere. What remains constant across all of it is <b>identity</b>: every access decision, on any device, to any app, comes down to "who is this, and what may they do?"</p>
    <div class="keyterm"><div class="kt-label">The industry phrase</div><div class="kt-term">"Identity is the new perimeter"</div>When the network boundary dissolves, identity becomes the control plane that decides access everywhere. The strength of your IAM \u2014 authentication, authorization, governance, privileged access \u2014 is, in large part, the strength of your security posture.</div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the field:</b> industry breach reporting consistently finds that compromised credentials and identity misuse are involved in a large share of breaches. Attackers rarely "break in" through a clever exploit anymore; far more often they <b>log in</b> with stolen or misused credentials. That single fact is why identity has moved from an IT housekeeping task to a board-level security priority \u2014 and why IAM skills are in demand.</div></div>`,
    example:`<p>The same resource, defended the old way and the modern way. Watch where the decisive control moves.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 perimeter security vs. identity-centric security</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">where the control lives</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#fbbf24">OLD: perimeter-centric</span>
  trust = "are you inside the network?"
  once inside the firewall \u2192 broad implicit trust
  problem: cloud + remote + SaaS \u2192 <span style="color:#f87171">there is no single "inside" anymore</span>
  a stolen VPN credential \u2192 attacker is "inside" \u2192 wide access

<span style="color:#34d399">MODERN: identity-centric</span>
  trust = "who are you, on what device, and what may you do?"
  every request re-evaluated by IAM (authN + authZ + policy)
  a stolen credential alone \u2192 <span style="color:#34d399">MFA, device + risk checks, least privilege limit the blast radius</span>
  identity is the control plane, everywhere</div></div></div>
    <p>The resource didn\u2019t change; the <b>locus of control</b> moved from the network edge to the identity layer. Everything you built in this course \u2014 MFA, Conditional Access, least privilege, governance, PAM \u2014 lives in that identity control plane. That\u2019s why IAM <i>is</i> security work, not adjacent to it.</p></div>`,
    lab:{ kind:'classify', id:'11.1', mode:'iamsec',
      title:'Map the definition to the practice',
      objective:'Each item is part of the IAM definition in action. Tag whether it primarily concerns <b>Access Control</b> (deciding who can do what, right now) or <b>Governance &amp; Assurance</b> (keeping access correct, monitored, and compliant over time). Both halves of the definition matter.',
      intro:'Tag each. All correct to pass.',
      threeway:['Access Control','Governance & Assurance'],
      twoway:true,
      items:[
        {t:'Requiring MFA and checking device compliance before granting a sign-in.',layer:'Access Control'},
        {t:'A quarterly certification campaign re-confirming who still needs financial-system access.',layer:'Governance & Assurance'},
        {t:'Enforcing least privilege so a role grants only what the job needs.',layer:'Access Control'},
        {t:'Retaining dated, signed audit evidence that access was reviewed.',layer:'Governance & Assurance'},
        {t:'Evaluating an authorization policy (RBAC/ABAC) at the moment of a request.',layer:'Access Control'},
        {t:'Detecting and flagging Separation-of-Duties violations across identities.',layer:'Governance & Assurance'}
      ]},
    quiz:[
      {q:'Per the definition, IAM is best described as:',
       o:['A single login tool','A framework of policies, processes, and technologies that manage digital identities and control access','A type of firewall','An antivirus product'],a:1,
       e:'IAM is a framework spanning policy, process, and technology that manages identities and controls access to resources \u2014 not any single product.'},
      {q:'"Identity is the new perimeter" means:',
       o:['Firewalls no longer exist','As the network boundary dissolves, identity becomes the control plane for access everywhere','Passwords are obsolete','Networks are unimportant'],a:1,
       e:'With cloud, SaaS, and remote work, there is no single network wall; identity becomes the consistent point where access is decided.'},
      {q:'The definition says access must be "correct, monitored, and compliant." "Monitored and compliant" maps most directly to which discipline you learned?',
       o:['Password complexity','Access governance and certifications','Network cabling','Email filtering'],a:1,
       e:'Keeping access correct over time and producing compliance evidence is the governance/certification work from Module 06.'},
      {q:'Why have attackers shifted toward "logging in" rather than "breaking in"?',
       o:['It\u2019s illegal to break in','Compromised credentials and identity misuse are often easier and are involved in a large share of breaches','Firewalls are perfect now','Networks got slower'],a:1,
       e:'Stolen or misused credentials are a leading breach vector, which is exactly why identity has become a top security priority.'}
    ]},
  /* ---------------- 11.2 ---------------- */
  { id:'11.2', num:'11.2', title:'IAM and Zero Trust', minutes:9,
    dek:'The security model the whole industry is moving toward, and why IAM is its engine. "Never trust, always verify" is an identity statement.',
    concept:`<p>If "identity is the new perimeter" is the observation, <b>Zero Trust</b> is the strategy built on it \u2014 and IAM is what makes Zero Trust actually run.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Zero Trust</div>A security model that assumes no implicit trust based on network location. Every access request is <b>continuously verified</b> \u2014 authenticating the user, validating the device, and authorizing the specific action \u2014 regardless of whether the request comes from "inside" or "outside." Its motto: <b>never trust, always verify</b>.</div>
    <h3>Why Zero Trust is an identity strategy</h3>
    <p>"Never trust, always verify" is, in practice, a series of <b>identity decisions</b>. Verify the user (authentication + MFA). Verify the device (compliant/managed). Authorize the exact action (least privilege, RBAC/ABAC). Re-check continuously (risk-based, Conditional Access). Every one of those is IAM machinery you\u2019ve already operated.</p>
    <div class="keyterm"><div class="kt-label">The pillars, mapped to what you built</div><div class="kt-term">Verify explicitly \u00b7 least privilege \u00b7 assume breach</div><b>Verify explicitly</b> \u2014 always authenticate and authorize on all signals (Conditional Access, sign-on policies: Modules 09, 05). <b>Use least-privilege access</b> \u2014 just-enough and just-in-time (least privilege Module 01; JIT/PIM Modules 07, 09). <b>Assume breach</b> \u2014 minimize blast radius and verify end to end (segmentation of privilege, PAM session isolation, governance: Modules 07, 06).</div>
    <h3>The shift in one sentence</h3>
    <p>Old model: "trust the network, guard the edge." Zero Trust: "trust nothing by default; make identity prove itself on every request." The firewall doesn\u2019t disappear, but the <b>decisive</b> control moves to the identity layer \u2014 which is why organizations adopting Zero Trust invest heavily in IAM, and why these skills travel well.</p>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>For interviews:</b> "How does IAM relate to Zero Trust?" is a near-certain question for identity roles. The crisp answer: <i>Zero Trust is the strategy; IAM is the engine that executes it.</i> Verify explicitly = authentication + Conditional Access; least privilege = RBAC/ABAC + JIT/PIM; assume breach = PAM, segmentation, and governance. You can speak to all three from hands-on practice.</div></div>`,
    example:`<p>One risky request, evaluated under Zero Trust \u2014 every check is an IAM control you\u2019ve configured.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 a request through the Zero Trust pipeline</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#3b82f6"></i><i style="background:#8b5cf6"></i><i style="background:#22d3ee"></i></div><div class="title">zero-trust \u00b7 evaluate request</div></div>
    <div class="console-body"><div class="mono-out">request: user opens the finance app from a new location

verify explicitly
  authenticate user ................. <span style="color:#34d399">ok</span>
  step-up MFA (Conditional Access) .. <span style="color:#34d399">ok</span>
  device compliant? ................. <span style="color:#34d399">ok</span>
  sign-in risk (impossible travel) .. <span style="color:#fbbf24">elevated \u2192 extra verification</span>
least privilege
  authorize the SPECIFIC action ..... read-only role (RBAC) \u2192 <span style="color:#34d399">scoped</span>
  admin rights? ..................... none standing (JIT/PIM) \u2192 <span style="color:#34d399">none to abuse</span>
assume breach
  privileged actions isolated + recorded (PAM); access reviewed (governance)
\u2192 access granted, narrowly, and fully observable</div></div></div>
    <p>No step trusts the network. Each is an identity decision drawn straight from the modules you completed. Zero Trust is the philosophy; this pipeline of IAM controls is how it actually happens.</p></div>`,
    lab:{ kind:'classify', id:'11.2', mode:'zerotrust',
      title:'Sort the Zero Trust pillars',
      objective:'Tag each control by the Zero Trust pillar it primarily serves: <b>Verify Explicitly</b>, <b>Least Privilege</b>, or <b>Assume Breach</b>. This is the mental map interviewers look for.',
      intro:'Tag each control. All correct to pass.',
      threeway:['Verify Explicitly','Least Privilege','Assume Breach'],
      items:[
        {t:'Requiring MFA and a compliant device via Conditional Access.',layer:'Verify Explicitly'},
        {t:'Granting a role only the permissions its job actually needs.',layer:'Least Privilege'},
        {t:'Recording and isolating every privileged session through a PAM proxy.',layer:'Assume Breach'},
        {t:'Activating admin rights just-in-time, with auto-expiry, instead of standing access.',layer:'Least Privilege'},
        {t:'Re-evaluating sign-in risk (e.g. impossible travel) on each request.',layer:'Verify Explicitly'},
        {t:'Running access certifications so a compromised account\u2019s extra access is caught and removed.',layer:'Assume Breach'}
      ]},
    quiz:[
      {q:'The Zero Trust motto is:',
       o:['Trust but verify','Never trust, always verify','Trust the network','Verify once, trust forever'],a:1,
       e:'Zero Trust assumes no implicit trust from network location; every request is continuously verified.'},
      {q:'The relationship between Zero Trust and IAM is best stated as:',
       o:['They\u2019re unrelated','Zero Trust is the strategy; IAM is the engine that executes it','IAM replaced Zero Trust','Zero Trust replaced IAM'],a:1,
       e:'Zero Trust\u2019s verify-explicitly, least-privilege, and assume-breach pillars are all carried out by IAM controls.'},
      {q:'"Verify explicitly" is implemented primarily through:',
       o:['Longer cables','Authentication, MFA, device checks, and Conditional Access','Disk encryption','Bigger monitors'],a:1,
       e:'Verifying explicitly means authenticating the user and validating signals (MFA, device, risk) on every request \u2014 core IAM authentication controls.'},
      {q:'Just-in-time / PIM elevation most directly supports which pillar?',
       o:['Verify explicitly','Least privilege','Physical security','Email security'],a:1,
       e:'JIT/PIM gives just-enough, just-in-time access with no standing privilege \u2014 the least-privilege pillar of Zero Trust.'}
    ]},
  /* ---------------- 11.3 ---------------- */
  { id:'11.3', num:'11.3', title:'IAM across the attack lifecycle', minutes:9,
    dek:'Where identity controls stop, slow, or detect an attacker at each stage of a breach. This is how you articulate IAM\u2019s security value concretely.',
    concept:`<p>To see IAM\u2019s defensive value, follow a typical intrusion and notice how many stages are an identity problem \u2014 and where your controls intervene.</p>
    <h3>The stages, and the IAM control at each</h3>
    <ul>
      <li><b>Initial access</b> \u2014 attacker obtains a credential (phishing, leak, password reuse). <span style="color:#22d3ee">IAM defense:</span> MFA and Conditional Access blunt a stolen password; a phished password alone isn\u2019t enough.</li>
      <li><b>Privilege escalation</b> \u2014 attacker tries to gain admin rights. <span style="color:#22d3ee">IAM defense:</span> least privilege and JIT/PIM mean there\u2019s little standing privilege to seize; PAM vaults the powerful accounts.</li>
      <li><b>Lateral movement</b> \u2014 attacker pivots to other systems. <span style="color:#22d3ee">IAM defense:</span> scoped roles and segmentation of access limit how far one identity reaches; privileged sessions are isolated.</li>
      <li><b>Persistence</b> \u2014 attacker creates backdoor accounts or keeps access. <span style="color:#22d3ee">IAM defense:</span> governance and access reviews surface anomalous or orphaned accounts; joiner-mover-leaver hygiene removes lingering access.</li>
      <li><b>Impact / exfiltration</b> \u2014 attacker abuses access to data. <span style="color:#22d3ee">IAM defense:</span> least privilege caps what any single identity can reach; session recording and logs give forensics.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">The pattern</div><div class="kt-term">Identity is the connective tissue of an attack</div>Nearly every breach stage hinges on <b>acquiring and abusing access</b>. That means IAM doesn\u2019t defend one stage \u2014 it raises the cost of <i>every</i> stage. Strong identity controls don\u2019t just block the front door; they shrink the blast radius if someone gets in.</div>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>The flip side:</b> because identity touches every stage, <b>weak</b> IAM is a force multiplier for attackers. One over-privileged service account, one un-rotated admin credential, one leaver who kept access \u2014 each can turn a small foothold into a full compromise. The same leverage that makes IAM powerful defensively makes its gaps especially dangerous. Everything you practiced (least privilege, rotation, clean deprovisioning, governance) exists to close those gaps.</div></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>Defense in depth, identity edition:</b> no single IAM control is a silver bullet \u2014 MFA can be phished, a role can be over-scoped. The strength is in <b>layers</b>: authentication + authorization + least privilege + PAM + governance, each catching what the others miss. Being able to explain how these layers compound is a senior-level way to talk about IAM\u2019s security role.</div></div>`,
    example:`<p>One intrusion attempt, stage by stage, with the identity control that stops or limits it. This is the story to tell in an interview.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 IAM at each breach stage</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">attack lifecycle vs. IAM controls</div></div>
    <div class="console-body"><div class="mono-out">1 initial access   phished password
                   \u2192 <span style="color:#34d399">MFA + Conditional Access block the login</span>
2 escalation       tries to grab admin
                   \u2192 <span style="color:#34d399">no standing admin (JIT/PIM); admin creds vaulted (PAM)</span>
3 lateral movement pivot to finance systems
                   \u2192 <span style="color:#34d399">least-privilege role doesn't reach them; sessions isolated</span>
4 persistence      creates a backdoor account
                   \u2192 <span style="color:#34d399">access review / governance flags the anomaly</span>
5 impact           tries to exfiltrate data
                   \u2192 <span style="color:#34d399">scoped access caps reach; logs + recording = forensics</span>

each layer the attacker hits is an IAM control \u2192 cost rises at every step</div></div></div>
    <p>Notice no single control did all the work \u2014 they compounded. That layering is defense in depth, and identity runs through every layer. Articulating this chain is how you show, concretely, that IAM <i>is</i> cybersecurity.</p></div>`,
    lab:{ kind:'classify', id:'11.3', mode:'lifecycle',
      title:'Match the control to the stage',
      objective:'For each IAM control, tag whether it primarily defends the <b>Entry</b> stage (initial access / escalation) or the <b>Spread &amp; Aftermath</b> stage (lateral movement, persistence, impact). Both are needed for defense in depth.',
      intro:'Tag each. All correct to pass.',
      threeway:['Entry','Spread & Aftermath'],
      twoway:true,
      items:[
        {t:'MFA and Conditional Access stopping a phished password at login.',layer:'Entry'},
        {t:'Least-privilege roles preventing a compromised account from reaching finance systems.',layer:'Spread & Aftermath'},
        {t:'JIT/PIM leaving no standing admin rights to escalate into.',layer:'Entry'},
        {t:'Access reviews catching a backdoor account an attacker created for persistence.',layer:'Spread & Aftermath'},
        {t:'PAM session recording providing forensics after privileged access.',layer:'Spread & Aftermath'},
        {t:'Risk-based sign-in checks blocking an anomalous initial login.',layer:'Entry'}
      ]},
    quiz:[
      {q:'Why is IAM described as defending every stage of an attack, not just one?',
       o:['It\u2019s the only security tool','Nearly every breach stage hinges on acquiring and abusing access','It replaces firewalls','It encrypts disks'],a:1,
       e:'From initial access to impact, attackers rely on getting and misusing access \u2014 so identity controls raise the cost at every stage.'},
      {q:'Least privilege most directly limits which part of an attack?',
       o:['The weather','Lateral movement and the blast radius once an attacker is in','Email delivery speed','Screen brightness'],a:1,
       e:'Scoped, least-privilege access caps how far a compromised identity can reach and how much data it can touch.'},
      {q:'"Defense in depth" applied to IAM means:',
       o:['One perfect control','Layered controls (authN, authZ, least privilege, PAM, governance) that each catch what others miss','Only using MFA','Turning off logging'],a:1,
       e:'No single control is foolproof; layered identity controls compound so a gap in one is covered by another.'},
      {q:'Weak IAM is dangerous because:',
       o:['It looks bad','Because identity touches every stage, its gaps (over-privilege, un-rotated creds, leavers) multiply an attacker\u2019s leverage','It\u2019s expensive','It slows email'],a:1,
       e:'The same leverage that makes strong IAM powerful makes weak IAM a force multiplier for attackers \u2014 one gap can turn a foothold into full compromise.'}
    ]},
  /* ---------------- 11.4 ---------------- */
  { id:'11.4', num:'11.4', title:'IAM, compliance & the business case', minutes:8,
    dek:'Closing the loop: how IAM satisfies regulators and auditors, and how to articulate its value to the business. The bridge between governance and the boardroom.',
    concept:`<p>IAM\u2019s value isn\u2019t only stopping attackers \u2014 it\u2019s also <b>proving</b> the organization is in control, which is what regulators, auditors, and customers demand. This is where your governance background and IAM practice meet the business.</p>
    <h3>Why compliance frameworks lean on IAM</h3>
    <p>Almost every security and privacy framework includes access-control and accountability requirements that IAM directly satisfies:</p>
    <ul>
      <li><b>Access control &amp; least privilege</b> \u2014 prove only authorized people can reach sensitive systems and data.</li>
      <li><b>Separation of duties</b> \u2014 prove no one person can both initiate and approve sensitive actions (Module 06).</li>
      <li><b>Accountability &amp; audit trail</b> \u2014 prove who did what, when, with which access (PAM recording, logs, certifications).</li>
      <li><b>Periodic review</b> \u2014 prove access is re-justified on a schedule (access certifications, Module 06).</li>
    </ul>
    <p>Frameworks and regulations such as SOX, HIPAA, PCI DSS, GDPR, ISO 27001, and the NIST frameworks all contain controls of this shape. You don\u2019t need to memorize them; you need to recognize that <b>"correct, monitored, and compliant" access</b> \u2014 the end of the IAM definition \u2014 is precisely what they\u2019re testing for.</p>
    <div class="keyterm"><div class="kt-label">The connection</div><div class="kt-term">Governance produces the evidence compliance needs</div>The certification campaigns, SoD policies, and audit records from Module 06 aren\u2019t busywork \u2014 they are the <b>evidence artifacts</b> that turn "we believe access is appropriate" into "here is signed, dated proof." IAM is how an organization demonstrates control, not just claims it.</div>
    <h3>The business case, in plain terms</h3>
    <p>When you explain IAM\u2019s value to non-security leaders, three points land:</p>
    <ul>
      <li><b>Risk reduction</b> \u2014 fewer breaches, smaller blast radius when something does happen.</li>
      <li><b>Compliance &amp; audit readiness</b> \u2014 pass audits with evidence on hand instead of fire drills, avoiding fines and lost deals.</li>
      <li><b>Efficiency</b> \u2014 automated joiner-mover-leaver and self-service access mean people are productive on day one and access cleans itself up, cutting helpdesk load.</li>
    </ul>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>You\u2019ve now seen the whole picture.</b> IAM is a framework of policies, processes, and technologies that manages identities and controls access \u2014 keeping it correct, monitored, and compliant. Across this course you built the mental models, the protocols, the access models, the lifecycle, the platforms (Okta, Entra, CyberArk), governance, HR-driven provisioning, and now the security and compliance context that ties it together. That end-to-end view \u2014 from a SAML assertion to a board-level risk conversation \u2014 is exactly what makes an IAM professional valuable.</div></div>`,
    example:`<p>An auditor\u2019s question, answered with IAM evidence. This is governance and security meeting compliance \u2014 the full loop.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 turning IAM into audit evidence</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">audit \u00b7 "prove access to the financial system is controlled"</div></div>
    <div class="console-body"><div class="mono-out">auditor asks: who can access the financial system, and is it appropriate?

IAM answers with evidence:
  access control ... only the Finance roles are assigned (RBAC) <span style="color:#34d399">\u2713</span>
  least privilege .. roles scoped to job function, no excess <span style="color:#34d399">\u2713</span>
  SoD ............. no one can both create AND approve payments <span style="color:#34d399">\u2713</span>
  review .......... Q2 certification signed + dated by owners <span style="color:#34d399">\u2713</span>
  accountability .. privileged actions vaulted + recorded (PAM) <span style="color:#34d399">\u2713</span>

result: "we believe it's fine" \u2192 <span style="color:#34d399">"here is the signed evidence"</span></div></div></div>
    <p>Every checkmark is something you built in this course. That\u2019s the payoff of IAM as a security discipline: it doesn\u2019t just defend access \u2014 it <b>demonstrates</b>, on demand, that access is correct, monitored, and compliant.</p></div>`,
    lab:{ kind:'capstone', id:'11.4',
      title:'Make the case for IAM',
      scenario:'You\u2019re briefing leadership on why investing in IAM matters to the business and its security posture. Select every statement that is an accurate, defensible point about IAM\u2019s role. A misleading or false statement fails the briefing.',
      options:[
        {t:'IAM keeps access correct, monitored, and compliant, directly supporting frameworks like SOX, HIPAA, PCI DSS, and ISO 27001.', good:true},
        {t:'Because identity touches every breach stage, strong IAM reduces both the chance of compromise and its blast radius.', good:true},
        {t:'IAM is the engine that executes a Zero Trust strategy (verify explicitly, least privilege, assume breach).', good:true},
        {t:'Once a firewall is installed, IAM is unnecessary.', good:false},
        {t:'Governance artifacts (certifications, SoD checks, audit logs) turn "we think access is fine" into signed, dated evidence.', good:true},
        {t:'MFA alone is a complete security strategy, so no other controls are needed.', good:false},
        {t:'Automated joiner-mover-leaver improves both security (clean deprovisioning) and efficiency (day-one productivity).', good:true},
        {t:'Compromised credentials are a leading breach vector, which is why identity is now a top security priority.', good:true}

    quiz:[
      {q:'Compliance frameworks lean on IAM because they require:',
       o:['Faster networks','Access control, separation of duties, accountability, and periodic review \u2014 all IAM functions','Bigger logos','More email'],a:1,
       e:'The access-control and accountability requirements common to SOX, HIPAA, PCI DSS, ISO 27001, etc. are exactly what IAM provides and evidences.'},
      {q:'The governance artifacts from Module 06 matter to compliance because they:',
       o:['Look professional','Provide signed, dated evidence that access was reviewed and is appropriate','Speed up logins','Reduce storage'],a:1,

      {q:'Which is an accurate business-case point for IAM?',

/* ===================== MODULE 12 — IAM Automation & Scripting ===================== */
{ id:'M12', num:'12', title:'IAM Automation &amp; Scripting', sub:'4 lessons \u00b7 PowerShell \u00b7 Python \u00b7 Workflows \u00b7 REST',
  blurb:'The skill that separates an IAM operator from an IAM engineer: making identity run itself. Real PowerShell with Microsoft Graph, Python for IAM tasks, Okta Workflows for no-code orchestration, and the REST API fundamentals all of it rides on.',
  lessons:[
  /* ---------------- 12.1 ---------------- */
  { id:'12.1', num:'12.1', title:'REST APIs: the language of IAM automation', minutes:10,
    dek:'Every IAM platform is an API with a UI bolted on. Learn the HTTP verbs, status codes, and tokens, and you can automate anything Okta or Entra can do.',
    concept:`<p>Before any script, understand what scripts actually <i>do</i>: they make <b>REST API calls</b>. The Okta admin console, the Entra portal, every click you make is, under the hood, an HTTP request to a REST API. Automation just makes those requests directly.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">REST API</div>A web interface where you act on <b>resources</b> (users, groups, apps) by sending HTTP requests to URLs (endpoints). The <b>method</b> says what to do, the <b>path</b> says to which resource, the body carries data, and a <b>status code</b> tells you what happened.</div>
    <h3>The four methods you\u2019ll use constantly</h3>
    <ul>
      <li><b>GET</b> \u2014 read a resource. "List all users", "get this group." Never changes anything.</li>
      <li><b>POST</b> \u2014 create a resource. "Create a user", "add a group." Success is usually <code>201 Created</code>.</li>
      <li><b>PUT</b> (or PATCH) \u2014 update a resource. "Change this user\u2019s department."</li>
      <li><b>DELETE</b> \u2014 remove a resource. "Deactivate/delete this user." Success is often <code>204 No Content</code>.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Status codes</div><b>2xx</b> = success (200 OK, 201 Created, 204 No Content). <b>4xx</b> = you did something wrong (400 bad request, 401 unauthenticated, 403 forbidden, 404 not found). <b>5xx</b> = the server erred. As the "log detective," reading these tells you instantly whether a failure is auth (401/403), a typo in the path (404), or bad data (400).</div>
    <h3>Authentication: the API token</h3>
    <p>An API won\u2019t talk to just anyone. Okta calls carry an <b>API token</b> (header <code>Authorization: SSWS &lt;token&gt;</code>); Microsoft Graph carries an <b>OAuth 2.0 bearer token</b> (<code>Authorization: Bearer &lt;token&gt;</code>) obtained via the client-credentials or delegated flows you met in Module 02. A <b>401</b> means the token is missing or expired; a <b>403</b> means the token is valid but lacks the scope/permission for that action. That distinction is a daily troubleshooting cue.</p>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the field &amp; the JD:</b> "Foundational understanding of REST API concepts (GET, POST, PUT, DELETE and status codes)" is a literal line in Okta IAM job descriptions. Everything else in this module (PowerShell, Python, Workflows) is just a friendlier way to make these same calls. Master the request and you can read any IAM platform\u2019s API docs and automate it.</div></div>`,
    example:`<p>The same "create a user" operation, shown as the raw REST call your tools generate under the hood.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 an Okta API request, decoded</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">POST /api/v1/users</div><div class="chip">API</div></div>
    <div class="console-body"><div class="mono-out">POST https://your-org.okta.com/api/v1/users?activate=true
Authorization: SSWS &lt;api-token&gt;          <span style="color:#5c6b80"># who's calling</span>
Content-Type: application/json
{
  "profile": { "firstName":"Amy", "lastName":"Chen",
               "email":"amy@northwind.com", "login":"amy@northwind.com" }
}
\u2192 <span style="color:#34d399">201 Created</span>   <span style="color:#5c6b80"># success: the user resource was created</span>

other outcomes:
  <span style="color:#fbbf24">401</span> token missing/expired   <span style="color:#fbbf24">403</span> token lacks permission
  <span style="color:#fbbf24">400</span> bad/missing fields      <span style="color:#fbbf24">404</span> wrong endpoint path</div></div></div>
    <p>POST to the users endpoint, authenticated with a token, body describing the user, and a <code>201</code> back. Every "create" in IAM looks like this. In the lab you\u2019ll choose the right method and success status for a set of common IAM operations.</p></div>`,
    lab:{ kind:'rest', id:'12.1', api:'Okta', base:'https://your-org.okta.com/api/v1',
      title:'Build the IAM API calls',
      objective:'For each IAM operation, pick the correct HTTP method and the status code a successful call returns. This is the REST fluency every Okta/Entra automation rides on.',
      intro:'',
      ops:[
        {goal:'List all users', path:'/users', method:'GET', expectStatus:200},
        {goal:'Create a new user', path:'/users', method:'POST', expectStatus:201},
        {goal:'Update a user\u2019s profile', path:'/users/{id}', method:'PUT', expectStatus:200},
        {goal:'Deactivate (delete) a user', path:'/users/{id}', method:'DELETE', expectStatus:204},
        {goal:'Get one group by ID', path:'/groups/{id}', method:'GET', expectStatus:200}
      ]},
    quiz:[
      {q:'Which HTTP method creates a new resource (e.g. a user)?',
       o:['GET','POST','DELETE','HEAD'],a:1,
       e:'POST creates resources; a successful create typically returns 201 Created.'},
      {q:'An API call returns 401. The most likely cause is:',
       o:['The user has too much access','The API token is missing or expired (not authenticated)','The server crashed','The path is too long'],a:1,
       e:'401 = unauthenticated. 403 would mean authenticated-but-not-permitted; 404 a wrong path; 400 bad data.'},
      {q:'You can read a user without changing anything using:',
       o:['DELETE','GET','POST','PUT'],a:1,
       e:'GET retrieves a resource and is safe/idempotent \u2014 it never modifies state.'},
      {q:'The difference between a 401 and a 403 is:',
       o:['No difference','401 = not authenticated; 403 = authenticated but lacking permission/scope','401 is faster','403 means success'],a:1,
       e:'401 means the token is missing/invalid; 403 means the token is valid but doesn\u2019t have rights for that action \u2014 a key troubleshooting distinction.'}
    ]},
  /* ---------------- 12.2 ---------------- */
  { id:'12.2', num:'12.2', title:'PowerShell & Microsoft Graph', minutes:11,
    dek:'The automation workhorse for Entra/Microsoft shops. Real Graph PowerShell to read, create, and govern identities at scale.',
    concept:`<p>In Microsoft environments, <b>PowerShell with the Microsoft Graph SDK</b> is <i>the</i> identity automation tool. Microsoft Graph is the single REST API behind Entra ID, Microsoft 365, Intune, and more; the Graph PowerShell module wraps it in friendly commands.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Microsoft Graph + Graph PowerShell</div><b>Microsoft Graph</b> is the unified REST API for the Microsoft cloud (endpoint <code>https://graph.microsoft.com</code>). The <b>Microsoft.Graph</b> PowerShell module gives you cmdlets like <code>Get-MgUser</code> that call Graph for you, handling tokens and paging. It\u2019s how IAM engineers bulk-manage identities, automate JML, and pull governance reports.</div>
    <h3>The pattern: connect, scope, act</h3>
    <p>Every Graph PowerShell script follows the same shape: authenticate with the <b>scopes</b> (permissions) you need, then run cmdlets. Scopes map directly to the least-privilege idea from Module 01 \u2014 you request only the permissions the task requires.</p>
    <div class="codeblock"><div class="cb-label">PowerShell \u00b7 connect and read</div><pre><span style="color:#5c6b80"># Connect with least-privilege scopes (consent prompt on first run)</span>
Connect-MgGraph -Scopes "User.Read.All","Group.ReadWrite.All"

<span style="color:#5c6b80"># Find all members of the Finance department</span>
Get-MgUser -Filter "department eq 'Finance'" -All |
    Select-Object DisplayName, UserPrincipalName, Department</pre></div>
    <h3>Creating and governing identities</h3>
    <p>The same module creates users, manages group membership (the access lever from Module 09), and pulls the audit data governance needs:</p>
    <div class="codeblock"><div class="cb-label">PowerShell \u00b7 add a user to a group, then audit dormant accounts</div><pre><span style="color:#5c6b80"># Add a joiner to the Finance access group (drives downstream access)</span>
New-MgGroupMember -GroupId $groupId -DirectoryObjectId $userId

<span style="color:#5c6b80"># Governance: find sign-ins older than 90 days (dormant-account hunt)</span>
$cutoff = (Get-Date).AddDays(-90)
Get-MgUser -All -Property DisplayName,SignInActivity |
    Where-Object { $_.SignInActivity.LastSignInDateTime -lt $cutoff } |
    Select-Object DisplayName</pre></div>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>Scopes are least privilege for automation:</b> a script that only reads should connect with <code>User.Read.All</code>, never <code>User.ReadWrite.All</code>. Over-scoping a service principal or script is exactly the over-privilege problem from Module 01, now in automation form \u2014 and a common audit finding. Request the minimum, and prefer app registrations with tightly scoped permissions for unattended scripts.</div></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the bio &amp; JD:</b> "I use PowerShell with Microsoft Graph to automate identity processes" appears verbatim in IAM engineer profiles. Even reading-level fluency \u2014 connect, filter, select, pipe \u2014 lets you bulk-audit access, automate JML, and produce governance evidence far faster than clicking. In the lab you\u2019ll order a real Graph script that off-boards a leaver.</div></div>`,
    example:`<p>A complete, realistic leaver-offboarding script in Graph PowerShell. Read it top to bottom \u2014 it\u2019s the JML logic from Module 04 expressed as automation.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 automate a leaver in PowerShell + Graph</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#012a70"></i><i style="background:#22d3ee"></i><i style="background:#34d399"></i></div><div class="title">offboard-leaver.ps1</div><div class="chip">POWERSHELL</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#5c6b80"># 1. authenticate with just the scopes we need</span>
Connect-MgGraph -Scopes "User.ReadWrite.All","Group.ReadWrite.All"

<span style="color:#5c6b80"># 2. resolve the leaver to their object id</span>
$u = Get-MgUser -Filter "userPrincipalName eq 'amy@northwind.com'"

<span style="color:#5c6b80"># 3. block sign-in immediately (cut access first \u2014 Module 04)</span>
Update-MgUser -UserId $u.Id -AccountEnabled:$false

<span style="color:#5c6b80"># 4. revoke active sessions/tokens so existing logins die</span>
Revoke-MgUserSignInSession -UserId $u.Id

<span style="color:#5c6b80"># 5. remove from all groups (strip downstream access)</span>
Get-MgUserMemberOf -UserId $u.Id | ForEach-Object {
    Remove-MgGroupMemberByRef -GroupId $_.Id -DirectoryObjectId $u.Id }

<span style="color:#34d399"># leaver is disabled, sessions killed, access stripped \u2014 verifiably</span></div></div></div>
    <p>Disable first, kill sessions, then strip access \u2014 the exact leaver discipline from Module 04, now automated and repeatable. In the lab you\u2019ll put these steps in the right order yourself.</p></div>`,

      objective:'Arrange the PowerShell + Graph steps so the leaver is off-boarded safely: authenticate, find the user, disable sign-in, revoke sessions, then remove group access. Order matters \u2014 a step can\u2019t run before the one it depends on.',

      steps:[

        {label:'Get-MgUser -Filter ... (resolve the user)', code:'$u = Get-MgUser -Filter "userPrincipalName eq amy@northwind.com"'},
        {label:'Update-MgUser -AccountEnabled:$false', code:'Update-MgUser -UserId $u.Id -AccountEnabled:$false'},
        {label:'Revoke-MgUserSignInSession', code:'Revoke-MgUserSignInSession -UserId $u.Id'},
        {label:'Remove from all groups', code:'Get-MgUserMemberOf -UserId $u.Id | ForEach-Object { Remove-MgGroupMemberByRef ... }'}

      {q:'In Connect-MgGraph, "scopes" represent:',

      {q:'In the leaver script, why disable the account and revoke sessions before removing groups?',
