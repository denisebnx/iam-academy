<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAM Academy | Denise Banks</title>
  <link rel="icon" type="image/png" href="geminisvg.svg?v=1">
<style>
  /* ============ DESIGN SYSTEM ============
     Identity: an enterprise security console you learn inside of.
     Palette  : deep slate "ops room" + a single signal-cyan accent + amber/red signal lights
     Type     : Space Grotesk (display, structural numbers) + Inter (body) + JetBrains Mono (console/data)
  */
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#0a0e14; --bg-2:#0e131c; --panel:#121826; --panel-2:#18202f; --panel-3:#1e2839;
    --line:#263044; --line-bright:#33415c;
    --ink:#e8eef6; --ink-dim:#94a3b8; --ink-faint:#5c6b80;
    --cyan:#22d3ee; --cyan-dim:#0c3a44; --cyan-deep:#072730;
    --blue:#3b82f6; --violet:#8b5cf6; --violet-dim:#241a3a;
    --green:#34d399; --green-dim:#0c3328; --green-deep:#07241c;
    --amber:#fbbf24; --amber-dim:#332811; --amber-deep:#241c0a;
    --red:#f87171; --red-dim:#3a1414; --red-deep:#280d0d;
    --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --disp:'Space Grotesk',var(--sans);
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --rail-w:312px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line-bright);border-radius:5px}::-webkit-scrollbar-track{background:transparent}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  button{font-family:var(--sans)}
  a{color:var(--cyan)}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:14px;padding:0 18px;height:54px;background:linear-gradient(180deg,#0d131e,#0a0e14);border-bottom:1px solid var(--line);flex-shrink:0;z-index:30}
  .logo{display:flex;align-items:center;gap:11px;font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:-.3px}
  .logo .glyph{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:radial-gradient(circle at 30% 25%,#22d3ee,#0e7490 70%);box-shadow:0 0 0 1px #0891b233,0 4px 14px #22d3ee22;position:relative}
  .logo .glyph::after{content:"";position:absolute;width:11px;height:11px;border:2px solid #06222a;border-radius:50%;border-bottom-color:transparent;transform:rotate(45deg)}
  .logo small{display:block;font-family:var(--sans);font-weight:500;font-size:9.5px;letter-spacing:1.6px;color:var(--ink-faint);text-transform:uppercase;margin-top:-2px}
  .topbar .spacer{flex:1}
  .topbar .stat{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);background:var(--panel);border:1px solid var(--line);padding:6px 12px;border-radius:8px}
  .topbar .stat b{color:var(--cyan);font-weight:700}
  .topbar .stat .lvl{color:var(--amber)}
  .xp-wrap{width:140px}
  .xp-bar{height:6px;background:var(--panel-3);border-radius:3px;overflow:hidden;margin-top:4px}
  .xp-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#22d3ee,#34d399);transition:width .6s cubic-bezier(.2,.8,.2,1)}

  /* ---------- shell ---------- */
  .shell{flex:1;display:flex;overflow:hidden}

  /* ---------- curriculum rail ---------- */
  .rail{width:var(--rail-w);flex-shrink:0;background:var(--bg-2);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .rail-head{padding:16px 18px 12px;border-bottom:1px solid var(--line)}
  .rail-head h2{font-family:var(--disp);font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-dim);margin:0 0 3px;font-weight:600}
  .rail-head .track{font-size:11px;color:var(--ink-faint)}
  .rail-scroll{overflow-y:auto;flex:1;padding:8px 10px 40px}

  .mod{margin-bottom:6px;border-radius:10px;overflow:hidden}
  .mod-head{display:flex;align-items:center;gap:11px;padding:11px 12px;cursor:pointer;border-radius:9px;transition:background .15s}
  .mod-head:hover{background:var(--panel)}
  .mod-num{font-family:var(--disp);font-weight:700;font-size:12px;width:34px;height:34px;flex-shrink:0;display:grid;place-items:center;border-radius:8px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);letter-spacing:-.5px}
  .mod.active .mod-num,.mod.done .mod-num{background:var(--cyan-deep);border-color:#0e6b7e;color:var(--cyan)}
  .mod-meta{flex:1;min-width:0}
  .mod-meta .t{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mod-meta .s{font-size:10.5px;color:var(--ink-faint);font-family:var(--mono);letter-spacing:.3px}
  .mod-chev{color:var(--ink-faint);font-size:11px;transition:transform .2s;flex-shrink:0}
  .mod.open .mod-chev{transform:rotate(90deg)}
  .mod-status{width:7px;height:7px;border-radius:50%;background:var(--line-bright);flex-shrink:0}
  .mod.done .mod-status{background:var(--green);box-shadow:0 0 8px var(--green)}
  .mod.locked{opacity:.45}
  .mod.locked .mod-head{cursor:not-allowed}

  .lessons{display:none;padding:2px 0 8px 12px;margin-left:28px;border-left:1px dashed var(--line-bright)}
  .mod.open .lessons{display:block}
  .lesson{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--ink-dim);transition:.12s}
  .lesson:hover{background:var(--panel);color:var(--ink)}
  .lesson.active{background:var(--cyan-deep);color:var(--cyan)}
  .lesson .ln{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);flex-shrink:0}
  .lesson.active .ln{color:var(--cyan)}
  .lesson .lt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lesson .tick{width:14px;height:14px;flex-shrink:0;opacity:0;color:var(--green)}
  .lesson.done .tick{opacity:1}
  .lesson.done .lt{color:var(--ink-faint)}

  /* ---------- main stage ---------- */
  .stage{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
  .stage-inner{max-width:940px;margin:0 auto;padding:30px 36px 120px}

  /* breadcrumb + lesson header */
  .crumb{font-family:var(--mono);font-size:11px;color:var(--ink-faint);letter-spacing:.4px;margin-bottom:14px;display:flex;gap:8px;align-items:center}
  .crumb b{color:var(--cyan)}
  .lesson-hd{margin-bottom:8px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:10px}
  h1.title{font-family:var(--disp);font-size:34px;line-height:1.1;letter-spacing:-1px;margin:0 0 10px;font-weight:700}
  .dek{font-size:16px;color:var(--ink-dim);max-width:680px;margin:0 0 20px}

  /* step progress strip — the signature lesson player */
  .steps{display:flex;gap:0;margin:0 0 28px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px;position:sticky;top:10px;z-index:20;backdrop-filter:blur(8px)}
  .step{flex:1;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:.15s;position:relative}
  .step:hover{background:var(--panel-2)}
  .step.active{background:var(--cyan-deep)}
  .step .sn{font-family:var(--disp);font-weight:700;font-size:13px;width:26px;height:26px;border-radius:7px;display:grid;place-items:center;background:var(--panel-3);color:var(--ink-dim);flex-shrink:0}
  .step.active .sn{background:var(--cyan);color:#05222a}
  .step.done .sn{background:var(--green-deep);color:var(--green)}
  .step .sl{font-size:12px;font-weight:600;color:var(--ink-dim)}
  .step.active .sl{color:var(--cyan)}
  .step .sl small{display:block;font-weight:400;font-size:10px;color:var(--ink-faint);font-family:var(--mono)}

  .panel-stage{display:none;animation:fade .3s ease}
  .panel-stage.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* content blocks */
  .prose{font-size:15px;line-height:1.72;color:#d6deea}
  .prose p{margin:0 0 16px}
  .prose h2{font-family:var(--disp);font-size:21px;letter-spacing:-.4px;margin:30px 0 12px;font-weight:600}
  .prose h3{font-family:var(--disp);font-size:16px;margin:24px 0 10px;font-weight:600;color:var(--ink)}
  .prose b,.prose strong{color:#fff;font-weight:600}
  .prose code{font-family:var(--mono);font-size:12.5px;background:var(--panel-2);border:1px solid var(--line);padding:2px 6px;border-radius:5px;color:var(--cyan)}
  .prose ul,.prose ol{margin:0 0 16px;padding-left:22px}
  .prose li{margin:6px 0}
  .prose a{text-decoration:none;border-bottom:1px solid var(--cyan-dim)}

  .keyterm{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:10px;padding:16px 18px;margin:20px 0}
  .keyterm .kt-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);margin-bottom:6px}
  .keyterm .kt-term{font-family:var(--disp);font-weight:600;font-size:16px;margin-bottom:5px}

  .callout{display:flex;gap:12px;border-radius:10px;padding:14px 16px;margin:18px 0;font-size:13.5px;line-height:1.6}
  .callout .ic{font-size:16px;flex-shrink:0;margin-top:1px}
  .callout.tip{background:var(--cyan-deep);border:1px solid #0e6b7e;color:#a5e9f5}
  .callout.warn{background:var(--amber-deep);border:1px solid #5c4a1a;color:#f5d98a}
  .callout.danger{background:var(--red-deep);border:1px solid #5c2424;color:#f5a8a8}
  .callout.real{background:var(--violet-dim);border:1px solid #4a3a6b;color:#cbb8f0}
  .callout b{color:#fff}

  .analogy{border:1px dashed var(--line-bright);border-radius:10px;padding:16px 18px;margin:18px 0;background:var(--bg-2)}
  .analogy .al{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--violet);margin-bottom:7px}

  /* worked example console frame */
  .console{border:1px solid var(--line-bright);border-radius:12px;overflow:hidden;margin:18px 0;background:var(--bg-2);box-shadow:0 10px 40px #0006}
  .console-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:linear-gradient(180deg,#161d2b,#111825);border-bottom:1px solid var(--line)}
  .console-bar .dots{display:flex;gap:6px}
  .console-bar .dots i{width:10px;height:10px;border-radius:50%;display:block}
  .console-bar .title{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);letter-spacing:.3px}
  .console-bar .chip{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--cyan);background:var(--cyan-deep);border:1px solid #0e6b7e;padding:2px 9px;border-radius:20px}
  .console-body{padding:16px 18px}

  .example-wrap{margin:18px 0}
  .example-label{font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .example-label::before{content:"";width:18px;height:1px;background:var(--cyan)}

  /* generic UI atoms reused by simulators */
  .fld-label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-faint);margin:14px 0 6px;font-weight:600}
  input[type=text],input[type=number],input[type=password],select,textarea{width:100%;background:var(--bg);border:1px solid var(--line-bright);color:var(--ink);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:13px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-deep)}
  textarea{resize:vertical;line-height:1.6;tab-size:2}
  .btn{background:var(--cyan);color:#05222a;border:none;padding:10px 18px;border-radius:8px;font-weight:650;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  .btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .btn:active{transform:none}
  .btn.ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line-bright)}
  .btn.green{background:var(--green);color:#04221a}
  .btn.amber{background:var(--amber);color:#2a1f06}
  .btn.danger{background:var(--red);color:#2a0a0a}
  .btn.sm{padding:6px 12px;font-size:12px}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  /* lab container */
  .lab-frame{border:1px solid var(--line-bright);border-radius:14px;overflow:hidden;margin:8px 0 20px;background:var(--panel)}
  .lab-top{display:flex;align-items:center;gap:12px;padding:14px 18px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border-bottom:1px solid var(--line)}
  .lab-top .badge-lab{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;background:var(--green-deep);color:var(--green);border:1px solid #14533f;padding:3px 10px;border-radius:6px}
  .lab-top h3{font-family:var(--disp);margin:0;font-size:16px;font-weight:600}
  .lab-objective{background:var(--cyan-deep);border:1px solid #0e6b7e;border-radius:9px;padding:12px 15px;margin:0 0 4px;font-size:13.5px;color:#bdeef7}
  .lab-objective b{color:#fff}
  .lab-body{padding:18px}
  .mission{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
  .mission .m{flex:1;min-width:180px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:12.5px}
  .mission .m .mt{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}

  .result{margin-top:14px;border-radius:10px;padding:14px 16px;display:none;animation:fade .3s}
  .result.show{display:block}
  .result.pass{background:var(--green-deep);border:1px solid #14533f}
  .result.fail{background:var(--red-deep);border:1px solid #5c2424}
  .result .rv{font-family:var(--disp);font-weight:700;font-size:15px;display:flex;align-items:center;gap:9px}
  .result.pass .rv{color:var(--green)}.result.fail .rv{color:var(--red)}
  .result ul{margin:10px 0 0;padding-left:6px;list-style:none}
  .result li{padding:4px 0;font-size:12.5px;font-family:var(--mono);display:flex;gap:8px;align-items:flex-start}
  .result li .mk{flex-shrink:0}

  /* decision/trace output */
  .decision{border-radius:10px;padding:14px 16px;margin:14px 0;border:1px solid}
  .decision.allow{background:var(--green-deep);border-color:#14533f}
  .decision.deny{background:var(--red-deep);border-color:#5c2424}
  .decision.warn{background:var(--amber-deep);border-color:#5c4a1a}
  .verdict{font-family:var(--disp);font-size:16px;font-weight:700;display:flex;align-items:center;gap:9px}
  .allow .verdict{color:var(--green)}.deny .verdict{color:var(--red)}.warn .verdict{color:var(--amber)}
  .why{color:var(--ink-dim);margin-top:6px;font-size:13px}
  .trace{list-style:none;margin:12px 0 0;padding:0;font-family:var(--mono);font-size:12px}
  .trace li{padding:8px 12px;border-left:3px solid var(--line-bright);margin-bottom:6px;background:var(--panel-2);border-radius:0 7px 7px 0}
  .trace li.good{border-left-color:var(--green)}.trace li.bad{border-left-color:var(--red)}.trace li.skip{opacity:.5}
  .tag{font-size:9.5px;padding:2px 7px;border-radius:5px;margin-right:8px;font-weight:700;letter-spacing:.5px}
  .tag.A{background:var(--green);color:#04221a}.tag.D{background:var(--red);color:#2a0a0a}.tag.N{background:var(--line-bright);color:var(--ink-dim)}

  /* quiz */
  .quiz-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin:16px 0}
  .quiz-q{font-family:var(--disp);font-size:16px;font-weight:600;margin:4px 0 16px;line-height:1.4}
  .quiz-opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--bg-2);border:1px solid var(--line-bright);color:var(--ink);padding:13px 15px;border-radius:9px;margin-bottom:9px;cursor:pointer;font-size:13.5px;transition:.13s}
  .quiz-opt:hover{border-color:var(--cyan);background:var(--panel-2)}
  .quiz-opt .ltr{font-family:var(--mono);font-weight:700;width:25px;height:25px;flex-shrink:0;display:grid;place-items:center;background:var(--panel-3);border-radius:6px;font-size:12px}
  .quiz-opt.correct{background:var(--green-deep);border-color:var(--green)}
  .quiz-opt.correct .ltr{background:var(--green);color:#04221a}
  .quiz-opt.wrong{background:var(--red-deep);border-color:var(--red)}
  .quiz-opt.wrong .ltr{background:var(--red);color:#2a0a0a}
  .quiz-explain{background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:9px;padding:13px 16px;margin-top:6px;font-size:13px;color:var(--ink-dim);display:none}
  .quiz-explain.show{display:block}
  .quiz-explain b{color:var(--ink)}
  .quiz-progress{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-bottom:6px}

  /* lesson nav footer */
  .lesson-nav{display:flex;justify-content:space-between;gap:14px;margin-top:36px;padding-top:24px;border-top:1px solid var(--line)}
  .lesson-nav button{background:var(--panel);border:1px solid var(--line-bright);color:var(--ink);padding:13px 18px;border-radius:10px;cursor:pointer;font-size:13px;display:flex;flex-direction:column;gap:2px;min-width:200px;transition:.15s}
  .lesson-nav button:hover:not(:disabled){border-color:var(--cyan);background:var(--panel-2)}
  .lesson-nav button:disabled{opacity:.3;cursor:not-allowed}
  .lesson-nav button.next{text-align:right;align-items:flex-end;background:var(--cyan-deep);border-color:#0e6b7e}
  .lesson-nav .nl{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint)}
  .lesson-nav .nt{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--ink)}

  /* badge toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--cyan);border-radius:14px;padding:14px 22px;display:flex;align-items:center;gap:14px;box-shadow:0 16px 50px #000a,0 0 0 1px #22d3ee22;z-index:100;transition:transform .5s cubic-bezier(.2,.9,.2,1)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast .tb{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:22px;background:radial-gradient(circle at 30% 25%,#22d3ee,#0e7490)}
  .toast .tt{font-family:var(--disp);font-weight:700;font-size:14px}
  .toast .ts{font-size:12px;color:var(--ink-dim)}

  /* welcome / dashboard */
  .hero{text-align:center;padding:40px 0 20px}
  .hero .eyebrow{justify-content:center}
  .hero h1{font-family:var(--disp);font-size:46px;letter-spacing:-1.5px;margin:6px 0 12px;font-weight:700;background:linear-gradient(180deg,#fff,#9fb3c8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero p{font-size:17px;color:var(--ink-dim);max-width:600px;margin:0 auto 26px}
  .track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:24px 0}
  .track-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .track-card:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 12px 30px #0006}
  .track-card .tn{font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:1px}
  .track-card h3{font-family:var(--disp);font-size:17px;margin:8px 0 6px;font-weight:600}
  .track-card p{font-size:12.5px;color:var(--ink-dim);margin:0 0 12px;line-height:1.5}
  .track-card .meta{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);display:flex;gap:12px}
  .track-card.soon{opacity:.6}

<script>
/* =====================================================================
   IAM ACADEMY — core runtime
   ===================================================================== */
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
function el(h){const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- progress state (persisted to localStorage, fully guarded) ----------
   The whole app must keep working even if storage is unavailable (private mode,
   file:// restrictions, blocked cookies). Every storage call is wrapped so a
   failure degrades to in-memory only and never throws. */
const STORE_KEY='iam-academy-progress-v1';
const STATE={done:new Set(),xp:0,badges:new Set(),last:null};
let STORAGE_OK=true;        // whether persistence is actually working
let STORAGE_CHECKED=false;
function storageAvailable(){
  if(STORAGE_CHECKED)return STORAGE_OK;
  STORAGE_CHECKED=true;
  try{const t='__iam_test__';window.localStorage.setItem(t,'1');window.localStorage.removeItem(t);STORAGE_OK=true;}
  catch(e){STORAGE_OK=false;}
  return STORAGE_OK;
}
function saveState(){
  if(!storageAvailable())return;
  try{
    window.localStorage.setItem(STORE_KEY,JSON.stringify({
      done:[...STATE.done], xp:STATE.xp, badges:[...STATE.badges], last:STATE.last, ts:Date.now()
    }));
  }catch(e){/* quota or other — ignore, keep running in memory */}
}
function loadState(){
  if(!storageAvailable())return false;
  try{
    const raw=window.localStorage.getItem(STORE_KEY);
    if(!raw)return false;
    const o=JSON.parse(raw);
    STATE.done=new Set(Array.isArray(o.done)?o.done:[]);
    STATE.xp=typeof o.xp==='number'?o.xp:0;
    STATE.badges=new Set(Array.isArray(o.badges)?o.badges:[]);
    STATE.last=o.last||null;
    return STATE.done.size>0||STATE.xp>0;
  }catch(e){return false;}
}
function resetState(){
  STATE.done=new Set();STATE.xp=0;STATE.badges=new Set();STATE.last=null;
  if(storageAvailable()){try{window.localStorage.removeItem(STORE_KEY);}catch(e){}}
}
const XP_PER={concept:10,example:10,lab:40,quiz:25,lesson:15};
function levelFromXp(xp){return Math.floor(xp/250)+1;}
function addXp(n){STATE.xp+=n;const lv=levelFromXp(STATE.xp);$('#xpNum').textContent=STATE.xp;$('#levelNum').textContent=lv;
  const into=STATE.xp%250;$('#xpFill').style.width=(into/250*100)+'%';}
function markDone(key,xp){if(STATE.done.has(key))return false;STATE.done.add(key);if(xp)addXp(xp);refreshProgressUI();saveState();return true;}
function refreshProgressUI(){
  const lessonsDone=new Set();
  STATE.done.forEach(k=>{if(k.startsWith('L:'))lessonsDone.add(k);});
  $('#doneCount').textContent=lessonsDone.size;
  // rail ticks
  $$('.lesson').forEach(li=>{const id=li.dataset.lesson;li.classList.toggle('done',STATE.done.has('L:'+id));});
  $$('.mod').forEach(m=>{const mid=m.dataset.mod;const lessons=CURRICULUM.find(x=>x.id===mid)?.lessons||[];
    const all=lessons.length&&lessons.every(l=>STATE.done.has('L:'+l.id));m.classList.toggle('done',all);});
}
let TOAST_T;
function toast(icon,title,sub){const t=$('#toast');$('#toastIcon').textContent=icon;$('#toastTitle').textContent=title;$('#toastSub').textContent=sub||'';
  t.classList.add('show');clearTimeout(TOAST_T);TOAST_T=setTimeout(()=>t.classList.remove('show'),3400);}
function earnBadge(id,icon,title,sub){if(STATE.badges.has(id))return;STATE.badges.add(id);saveState();toast(icon,title,sub);}

/* =====================================================================
   ENGINES used by worked examples & labs
   ===================================================================== */

/* RBAC resolver: roles grant permissions; users have roles; roles can inherit roles */
function rbacResolve(model,username){
  const u=model.users.find(x=>x.name===username);if(!u)return{perms:new Set(),trace:['user not found']};
  const perms=new Set(),trace=[];const seen=new Set();
  const stack=[...(u.roles||[]).map(r=>({r,via:'direct assignment'}))];
  while(stack.length){const{r,via}=stack.shift();if(seen.has(r))continue;seen.add(r);
    const role=model.roles.find(x=>x.name===r);
    if(!role){trace.push(`role ${r} (via ${via}) — not defined`);continue;}
    (role.perms||[]).forEach(p=>perms.add(p));
    trace.push(`role ${r} (via ${via}) → grants: ${(role.perms||[]).join(', ')||'—'}`);
    (role.inherits||[]).forEach(ri=>{if(!seen.has(ri))stack.push({r:ri,via:'inherited from '+r});});
  }
  return{perms,trace};
}
function rbacCan(model,username,permission){
  const{perms}=rbacResolve(model,username);
  // support wildcard perms like "billing:*"
  for(const p of perms){if(p===permission)return true;if(p.endsWith(':*')&&permission.startsWith(p.slice(0,-1)))return true;if(p==='*')return true;}
  return false;
}

/* Authorization model classifier — used in the AuthN/AuthZ lesson lab */
function classifyRequest(scenario){
  // returns whether the failing control is authentication or authorization
  if(scenario.identityProven===false)return{layer:'Authentication',reason:'The system could not establish WHO the caller is.'};
  return{layer:'Authorization',reason:'Identity was proven, but the caller lacks permission for this action.'};
}

/* Least-privilege scorer: compares granted vs needed permission sets */
function leastPrivScore(granted,needed){
  const g=new Set(granted),n=new Set(needed);
  const missing=[...n].filter(x=>!g.has(x));
  const excess=[...g].filter(x=>!n.has(x));
  return{ok:missing.length===0&&excess.length===0,missing,excess};
}

/* Token (JWT-ish) validator reused in protocols module */
function validateClaims(p,o){const now=o.now,issues=[];
  if(p.exp&&now>p.exp)issues.push('exp — token expired');
  if(p.nbf&&now<p.nbf)issues.push('nbf — token not yet valid');
  if(o.iss&&p.iss!==o.iss)issues.push('iss — wrong issuer (not your trusted IdP)');
  if(o.aud&&p.aud!==o.aud)issues.push('aud — token was issued for a different app');
  if(o.nonce&&p.nonce!==o.nonce)issues.push('nonce — does not match request (possible replay)');
  return{valid:issues.length===0,issues};}

/* =====================================================================
   ENGINES — Part 2 (Modules 03–08)
   ===================================================================== */

/* ---- ABAC policy evaluator (Module 03) ----
   policy: list of rules {effect:'allow'|'deny', when:{attr:value|[values]}}
   request: flat attribute map. Deny overrides allow; default deny. */
function abacEvaluate(rules, req){
  const trace=[]; let allow=false, deny=false;
  rules.forEach((r,i)=>{
    let matched=true; const checks=[];
    for(const k in (r.when||{})){
      const want=r.when[k]; const got=req[k];
      const arr=Array.isArray(want)?want:[want];
      const ok=arr.map(String).includes(String(got));
      checks.push(`${k}=${got??'∅'} ${ok?'✓':'✗'}(needs ${arr.join('/')})`);
      if(!ok)matched=false;
    }
    if(matched){ if(r.effect==='deny')deny=true; else allow=true; }
    trace.push({i:i+1, effect:r.effect, matched, checks});
  });
  let decision, why;
  if(deny){decision='DENY'; why='A deny rule matched. In ABAC, explicit deny overrides any allow.';}
  else if(allow){decision='ALLOW'; why='An allow rule matched and no deny rule applied.';}
  else {decision='DENY'; why='No rule allowed this request — default deny.';}
  return {decision, why, trace};
}

/* ---- JML lifecycle engine (Module 04) ----
   Computes the set of entitlements an identity SHOULD have given attributes,
   then diffs against current to produce provision/deprovision actions. */
const BIRTHRIGHT_RULES=[
  {when:{status:'active'}, grant:['okta:sso','email:mailbox','vpn:base']},
  {when:{dept:'Engineering'}, grant:['github:write','jira:user','aws:dev']},
  {when:{dept:'Finance'}, grant:['sap:fi-display','concur:user','workday:reader']},
  {when:{dept:'Sales'}, grant:['salesforce:rep','gong:user']},
  {when:{dept:'HR'}, grant:['workday:hr-admin','greenhouse:recruiter']},
  {when:{level:'manager'}, grant:['approvals:approve']}
];
function entitlementsFor(attrs){
  if(attrs.status==='terminated') return new Set();
  const out=new Set();
  BIRTHRIGHT_RULES.forEach(r=>{
    let ok=true;
    for(const k in r.when){ if(String(attrs[k])!==String(r.when[k])) ok=false; }
    if(ok) r.grant.forEach(g=>out.add(g));
  });
  return out;
}
function jmlPlan(current, attrs){
  const target=entitlementsFor(attrs);
  const cur=new Set(current);
  const provision=[...target].filter(x=>!cur.has(x));
  const deprovision=[...cur].filter(x=>!target.has(x));
  const keep=[...cur].filter(x=>target.has(x));
  return {target:[...target], provision, deprovision, keep,
          event: attrs.status==='terminated'?'LEAVER':(current.length===0?'JOINER':'MOVER')};
}

/* ---- Okta sign-on policy engine (Module 05) ----
   Rules evaluated top-down, first match wins (like real Okta). */
function oktaSignOn(rules, ctx){
  for(let i=0;i<rules.length;i++){
    const r=rules[i];
    let match=true; const reasons=[];
    if(r.ifGroup && r.ifGroup!=='any'){ if(ctx.group!==r.ifGroup)match=false; reasons.push(`group=${ctx.group} vs ${r.ifGroup}`);}
    if(r.ifZone && r.ifZone!=='any'){ const inZone=(r.ifZone==='trusted')===!!ctx.trusted; if(!inZone)match=false; reasons.push(`zone ${ctx.trusted?'trusted':'untrusted'} vs ${r.ifZone}`);}
    if(r.ifDevice && r.ifDevice!=='any'){ const ok=(r.ifDevice==='managed')===!!ctx.managed; if(!ok)match=false; reasons.push(`device ${ctx.managed?'managed':'unmanaged'} vs ${r.ifDevice}`);}
    if(match) return {ruleIndex:i, rule:r, action:r.action, why:`First matching rule (#${i+1}: "${r.name}") → ${r.action}.`};
  }
  return {ruleIndex:-1, action:'DENY', why:'No rule matched — implicit deny.'};
}

/* ---- Separation of Duties + certification (Module 06) ---- */
const SOD_POLICIES=[
  {id:'sod-pay', name:'Create + Approve Payments', a:'sap:fi-display', b:'approvals:approve', risk:'critical',
   msg:'One identity can both create and approve financial postings — classic fraud path.'},
  {id:'sod-dev', name:'Dev + Prod deploy', a:'github:write', b:'aws:prod-deploy', risk:'high',
   msg:'Same identity writes code and deploys to production with no second pair of eyes.'},
  {id:'sod-hr', name:'HR Admin + Recruiter', a:'workday:hr-admin', b:'greenhouse:recruiter', risk:'medium',
   msg:'Can both create employee records and manage hiring pipeline — data integrity risk.'}
];
function detectSoD(entitlements){
  const set=new Set(entitlements); const hits=[];
  SOD_POLICIES.forEach(p=>{ if(set.has(p.a)&&set.has(p.b)) hits.push(p); });
  return hits;
}
/* certification decision scorer: given items with {risk, lastUsedDays, decision}, judge quality */
function certScore(items){
  let correct=0; const fb=[];
  items.forEach(it=>{
    // "ideal": revoke if unused>90 OR sod-flagged; else approve
    const ideal=(it.unusedDays>90 || it.sodFlag)?'revoke':'approve';
    const ok=it.decision===ideal;
    if(ok)correct++;
    fb.push({name:it.name, ok, ideal, got:it.decision,
      reason: it.sodFlag?'SoD conflict — must revoke':(it.unusedDays>90?`unused ${it.unusedDays}d — revoke`:'active & clean — approve')});
  });
  return {correct, total:items.length, allRight:correct===items.length, fb};
}

/* ---- CyberArk PAM engine (Module 07) ---- */
/* password rotation / checkout state machine */
function vaultAction(state, action, actor){
  // state: {status:'vaulted'|'checked_out', heldBy, rotationDays, lastRotated}
  const s={...state}; const log=[];
  if(action==='checkout'){
    if(s.status==='checked_out'){ return {ok:false, state:s, msg:`Denied — already checked out by ${s.heldBy}. Exclusive access enforced.`}; }
    s.status='checked_out'; s.heldBy=actor;
    return {ok:true, state:s, msg:`${actor} checked out the credential. Session will be isolated & recorded.`};
  }
  if(action==='checkin'){
    if(s.status!=='checked_out'){ return {ok:false, state:s, msg:'Nothing to check in.'}; }
    s.status='vaulted'; const who=s.heldBy; s.heldBy=null; s.lastRotated=0; // rotate on checkin
    return {ok:true, state:s, msg:`${who} checked in. Credential auto-rotated — the value they saw is now dead.`, rotated:true};
  }
  if(action==='rotate'){
    s.lastRotated=0;
    return {ok:true, state:s, msg:'Credential rotated to a new random value.', rotated:true};
  }
  return {ok:false, state:s, msg:'Unknown action.'};
}
/* PAM maturity scorer for a given account config */
function pamAssess(cfg){
  const findings=[];
  if(!cfg.vaulted) findings.push({sev:'critical', t:'Credential not vaulted — stored in plaintext / shared.'});
  if(cfg.shared) findings.push({sev:'critical', t:'Shared account with no individual accountability.'});
  if(!cfg.rotated) findings.push({sev:'high', t:'No automatic rotation — a leaked secret stays valid forever.'});
  if(!cfg.sessionRecorded) findings.push({sev:'high', t:'Privileged session not recorded — no forensic trail.'});
  if(!cfg.mfaOnCheckout) findings.push({sev:'medium', t:'No MFA on checkout — vault access too easy.'});
  if(cfg.standingAdmin) findings.push({sev:'high', t:'Standing admin rights — should be just-in-time.'});
  const score=Math.max(0, 100 - findings.reduce((a,f)=>a+({critical:30,high:20,medium:10}[f.sev]||0),0));
  return {score, findings};
}

/* =====================================================================
   ENGINES — Part 3 (deep-dive consoles: Entra, Okta, CyberArk)
   ===================================================================== */

/* ---- Entra Conditional Access evaluator (Module 09) ----
   policies: [{name, users:'all'|[ids], apps:'all'|[ids], conditions:{location, risk, deviceManaged},
               grant:'block'|'allow', controls:['mfa','compliantDevice']}]
   signin: {user, app, location, risk:'none'|'low'|'high', deviceManaged, mfaDone}
   Result mirrors real CA: collect all applicable policies; block wins; otherwise
   union of required grant controls must all be satisfied. */
function evalConditionalAccess(policies, signin){
  const applicable=[]; const trace=[];
  policies.forEach(p=>{
    const uOk = p.users==='all' || (Array.isArray(p.users)&&p.users.includes(signin.user));
    const aOk = p.apps==='all' || (Array.isArray(p.apps)&&p.apps.includes(signin.app));
    let cOk=true; const cond=p.conditions||{};
    if(cond.location && cond.location!==signin.location) cOk=false;
    if(cond.locationIn && !cond.locationIn.includes(signin.location)) cOk=false;
    if(cond.locationNotIn && cond.locationNotIn.includes(signin.location)) cOk=false;
    if(cond.risk && cond.risk!==signin.risk) cOk=false;
    if(cond.riskIn && !cond.riskIn.includes(signin.risk)) cOk=false;
    const applies=uOk&&aOk&&cOk;
    trace.push({name:p.name, applies, grant:p.grant, controls:p.controls||[]});
    if(applies) applicable.push(p);
  });
  // block wins
  if(applicable.some(p=>p.grant==='block')){
    return {decision:'BLOCKED', why:'A Conditional Access policy blocked this sign-in. Block always overrides grant.', trace};
  }
  // gather required controls across applicable allow policies
  const required=new Set();
  applicable.forEach(p=>{ if(p.grant==='allow') (p.controls||[]).forEach(c=>required.add(c)); });
  const missing=[];
  if(required.has('mfa') && !signin.mfaDone) missing.push('multi-factor authentication');
  if(required.has('compliantDevice') && !signin.deviceManaged) missing.push('a compliant/managed device');
  if(applicable.length===0){
    return {decision:'ALLOWED', why:'No Conditional Access policy applied to this sign-in, so it proceeds.', trace, required:[...required]};
  }
  if(missing.length){
    return {decision:'BLOCKED', why:'An applicable policy requires controls the sign-in did not satisfy: '+missing.join(' and ')+'.', trace, required:[...required], missing};
  }
  return {decision:'ALLOWED', why:'All applicable grant controls were satisfied — access granted.', trace, required:[...required]};
}

/* ---- Entra PIM (Privileged Identity Management) activation (Module 09) ----
   Given a role's PIM config and an activation request, decide what happens. */
function pimActivate(roleCfg, req){
  // roleCfg: {role, eligible:bool, requireMfa, requireJustification, requireApproval, maxHours}
  // req: {mfaDone, justification, approved, hours}
  const blockers=[];
  if(!roleCfg.eligible) blockers.push('User is not eligible for this role (no eligible assignment).');
  if(roleCfg.requireMfa && !req.mfaDone) blockers.push('MFA is required to activate but was not completed.');
  if(roleCfg.requireJustification && !(req.justification&&req.justification.trim().length>0)) blockers.push('A business justification is required.');
  if(roleCfg.requireApproval && !req.approved) blockers.push('Approval from an approver is required and is still pending.');
  if(req.hours>roleCfg.maxHours) blockers.push('Requested duration exceeds the maximum activation window of '+roleCfg.maxHours+'h.');
  if(blockers.length) return {activated:false, blockers, role:roleCfg.role};
  return {activated:true, blockers:[], role:roleCfg.role, expiresInHours:req.hours,
    note:'Role activated just-in-time. It will auto-deactivate after '+req.hours+'h, returning the user to eligible-only.'};
}

/* ---- Entra Access Review decision aid (Module 09) ----
   Same engine shape as cert but tuned for guest/inactivity reviews. */
function accessReviewDecide(item){
  // item: {type:'guest'|'member', inactiveDays, hasBusinessSponsor, lastSignInDays}
  // ideal: remove guests inactive >60d or without sponsor; members inactive >90d
  if(item.type==='guest'){
    if(!item.hasBusinessSponsor) return 'remove';
    if(item.inactiveDays>60) return 'remove';
    return 'keep';
  }
  if(item.inactiveDays>90) return 'remove';
  return 'keep';
}

/* ---- Okta multi-scenario sign-on evaluator already exists as oktaSignOn ----
   Add a SCIM/SSO troubleshooting diagnoser for the Okta troubleshooting console. */
function diagnoseSSO(sym){
  // sym: flags describing the broken state
  if(sym.userNotAssigned) return {cause:'User (or their group) is not assigned to the app in Okta.',
    fix:'Assign the user or a group they belong to, to the app integration. Authentication works; this is an assignment/authorization gap.', layer:'Authorization'};
  if(sym.audienceMismatch) return {cause:'SAML Audience / SP Entity ID mismatch.',
    fix:'Align the assertion Audience with the Service Provider Entity ID exactly (watch trailing slashes, http vs https).', layer:'SAML config'};
  if(sym.redirectMismatch) return {cause:'OIDC redirect_uri is not registered on the app.',
    fix:'Add the exact callback URL to the app\u2019s allowed redirect URIs (scheme, host, path, trailing slash must match).', layer:'OIDC config'};
  if(sym.clockSkew) return {cause:'Clock skew between IdP and SP outside the assertion validity window.',
    fix:'Sync NTP on both sides; SAML assertions are time-boxed (NotBefore/NotOnOrAfter).', layer:'Time'};
  if(sym.scimDeprovFailed) return {cause:'SCIM deprovisioning never reached the app (broken/again connector).',
    fix:'Repair the SCIM connector and reconcile; the leaver\u2019s account is still active downstream.', layer:'Provisioning'};
  if(sym.mfaLoop) return {cause:'Sign-on policy re-prompts MFA every request (session/frequency too aggressive).',
    fix:'Relax the sign-on/session policy frequency or enable persistent sessions; don\u2019t remove MFA.', layer:'Policy'};
  return {cause:'No fault detected — SSO should succeed.', fix:'Nothing to change.', layer:'None'};
}

/* ---- CyberArk multi-account vault + JIT (Module 07 deep labs) ----
   Manage several privileged accounts; each has its own checkout state. */
function makeVaultFleet(accounts){
  // accounts: [{id, label, vaulted, rotationDays}]
  const state={};
  accounts.forEach(a=>{ state[a.id]={...a, status:a.vaulted?'vaulted':'unmanaged', heldBy:null}; });
  return state;
}
function fleetAction(state, id, action, actor){
  const s=state[id]; if(!s) return {ok:false, msg:'Unknown account.'};
  if(s.status==='unmanaged' && action!=='onboard') return {ok:false, msg:`${s.label} is not vaulted yet — onboard it first.`};
  if(action==='onboard'){ s.status='vaulted'; return {ok:true, msg:`${s.label} onboarded into the vault and brought under management.`, rotated:true}; }
  if(action==='checkout'){
    if(s.status==='checked_out') return {ok:false, msg:`${s.label} already checked out by ${s.heldBy} (exclusive access).`};
    s.status='checked_out'; s.heldBy=actor; return {ok:true, msg:`${actor} checked out ${s.label}. Session isolated & recorded.`};
  }
  if(action==='checkin'){
    if(s.status!=='checked_out') return {ok:false, msg:`${s.label} is not checked out.`};
    const who=s.heldBy; s.status='vaulted'; s.heldBy=null;
    return {ok:true, rotated:true, msg:`${who} checked in ${s.label}; credential auto-rotated — the value they saw is dead.`};
  }
  return {ok:false, msg:'Unknown action.'};
}

/* JIT privileged elevation request workflow */
function jitRequest(policy, req){
  // policy:{role, requireApproval, requireMfa, maxHours, requireTicket}
  // req:{mfaDone, approved, hours, ticket}
  const blockers=[];
  if(policy.requireMfa && !req.mfaDone) blockers.push('MFA required for elevation.');
  if(policy.requireTicket && !(req.ticket&&req.ticket.trim())) blockers.push('A change/incident ticket reference is required.');
  if(policy.requireApproval && !req.approved) blockers.push('Approver sign-off is required (still pending).');
  if(req.hours>policy.maxHours) blockers.push('Duration exceeds max elevation window of '+policy.maxHours+'h.');
  if(blockers.length) return {granted:false, blockers};
  return {granted:true, blockers:[], note:'Elevated to '+policy.role+' for '+req.hours+'h, recorded against ticket '+(req.ticket||'—')+'. Auto-revokes on expiry.'};
}

/* ---- HRIS attribute mapping + transformation evaluator (Module 10) ----
   Given a source HRIS worker record and a list of mapping rules, compute the
   target (IdP/AD) attributes. Rules support direct copy and simple transforms. */
function applyHrisMapping(worker, rules){
  const out={}; const trace=[];
  rules.forEach(r=>{
    let val;
    const src=worker[r.from];
    switch(r.transform){
      case 'copy': val=src; break;
      case 'lower': val=(src==null?'':String(src)).toLowerCase(); break;
      case 'upper': val=(src==null?'':String(src)).toUpperCase(); break;
      case 'firstInitialLastName':
        // e.g. {first:'Amy', last:'Chen'} -> 'achen'
        val=((worker.first||'')[0]||'').toLowerCase()+String(worker.last||'').toLowerCase(); break;
      case 'email':
        val=(((worker.first||'')[0]||'')+String(worker.last||'')).toLowerCase()+'@'+(r.domain||'example.com'); break;
      case 'static': val=r.value; break;
      default: val=src;
    }
    out[r.to]=val;
    trace.push({to:r.to, from:r.from||'(none)', transform:r.transform, value:val});
  });
  return {target:out, trace};
}

/* ---- HRIS worker lifecycle -> provisioning action mapper (Module 10 / 04) ----
   Maps a Workday/Bamboo-style worker event to the operations an IdP would run
   downstream (create/update/enable/disable in IdP and AD). Mirrors the
   "authoritative HR data flow" both Okta and Entra implement. */
function hrisEventPlan(event){
  // event: {type:'hire'|'rehire'|'transfer'|'leave'|'returnFromLeave'|'terminate',
  //         preHire:bool, effectiveInFuture:bool}
  const e=event.type;
  const plan={idp:[], ad:[], notes:[]};
  if(e==='hire'){
    plan.idp.push('create account (disabled until hire date)');
    plan.ad.push('create AD account in correct OU (disabled until start)');
    if(event.preHire) plan.notes.push('Pre-hire: account is staged early so it is ready on day one, but stays disabled until the effective hire date.');
    else plan.notes.push('Account provisioned and enabled for the start date.');
  } else if(e==='transfer'){
    plan.idp.push('update attributes (dept, title, manager)');
    plan.idp.push('recalculate group membership → grant new / revoke old access');
    plan.ad.push('move to new OU and update attributes');
    plan.notes.push('Mover: the authoritative attribute change drives a full re-evaluation; old access is removed, not just new access added.');
  } else if(e==='leave'){
    plan.idp.push('disable account (suspend access) for leave duration');
    plan.ad.push('disable AD account');
    plan.notes.push('Leave of absence: access suspended but identity retained for return.');
  } else if(e==='returnFromLeave'){
    plan.idp.push('re-enable account');
    plan.ad.push('re-enable AD account');
    plan.notes.push('Return: the same identity is reactivated — no new account.');
  } else if(e==='terminate'){
    plan.idp.push('disable account immediately (cut SSO/federation)');
    plan.idp.push('deprovision downstream apps');
    plan.ad.push('disable AD account');
    plan.notes.push('Leaver: HR termination is the authoritative trigger; disable at the IdP first, then fan out deprovisioning.');
  } else if(e==='rehire'){
    plan.idp.push('reactivate or recreate account per match rules');
    plan.ad.push('reactivate matched AD account if within retention');
    plan.notes.push('Rehire: matching rules decide whether to revive the prior identity or create new.');
  }
  return plan;
}

/* ---- SAML assertion anatomy validator (Module 02) ----
   Validates the STRUCTURE + key fields of a parsed assertion object, separate
   from the wrapping Response. Verified against SAML 2.0 core + vendor docs:
   Issuer, Subject/NameID, Conditions(NotBefore/NotOnOrAfter, AudienceRestriction),
   AuthnStatement, AttributeStatement, Signature. */
function inspectAssertion(a, ctx){
  // a: {issuer, nameId, notBefore, notOnOrAfter, audience, authnInstant, attributes:{}, signed}
  // ctx: {now, spEntityId, trustedIdP}
  const checks=[];
  const push=(label, ok, detail)=>checks.push({label, ok, detail});
  push('Issuer present & trusted', !!a.issuer && a.issuer===ctx.trustedIdP,
    a.issuer? (a.issuer===ctx.trustedIdP?'matches the configured IdP':'unknown issuer '+a.issuer):'missing <Issuer>');
  push('Subject / NameID present', !!a.nameId, a.nameId?('identifies '+a.nameId):'no <Subject><NameID> — SP cannot identify the user');
  const tOk = a.notBefore!=null && a.notOnOrAfter!=null && ctx.now>=a.notBefore && ctx.now<a.notOnOrAfter;
  push('Conditions: time window valid', tOk,
    (a.notBefore==null||a.notOnOrAfter==null)?'missing NotBefore/NotOnOrAfter':
    (ctx.now<a.notBefore?'not yet valid (clock skew?)':(ctx.now>=a.notOnOrAfter?'expired — past NotOnOrAfter':'within NotBefore…NotOnOrAfter')));
  push('Conditions: audience matches SP', a.audience===ctx.spEntityId,
    a.audience?(a.audience===ctx.spEntityId?'AudienceRestriction matches this SP':'audience '+a.audience+' ≠ SP '+ctx.spEntityId):'no <AudienceRestriction>');
  push('AuthnStatement present', a.authnInstant!=null, a.authnInstant!=null?'records when/how the user authenticated':'no <AuthnStatement> — SP cannot confirm authentication happened');
  push('AttributeStatement carries attributes', a.attributes && Object.keys(a.attributes).length>0,
    a.attributes&&Object.keys(a.attributes).length?('attributes: '+Object.keys(a.attributes).join(', ')):'no attributes — SP gets only the NameID');
  push('Assertion is signed', !!a.signed, a.signed?'XML signature present — integrity & authenticity':'unsigned — SP must reject (tampering risk)');
  const valid=checks.every(c=>c.ok);
  return {valid, checks,
    verdict: valid?'Assertion is well-formed and acceptable — the SP would establish a session.'
                  :'Assertion would be rejected by the SP — one or more required elements failed.'};
}

/* ---- REST request evaluator (Module 12) ----
   Given an intended IAM operation, check the learner picked the right HTTP
   method + path shape + expected status. Mirrors real Okta/Graph REST. */
function evalRestRequest(spec, pick){
  // spec: {goal, method, expectStatus} ; pick: {method, status}
  const methodOk = pick.method===spec.method;
  const statusOk = String(pick.status)===String(spec.expectStatus);
  return {ok: methodOk&&statusOk, methodOk, statusOk,
    why: methodOk?(statusOk?'Correct method and expected status.':'Right method, but that status code doesn\u2019t match the outcome.')
                 :'Wrong HTTP method for this operation.'};
}

/* ---- Script step-ordering checker (Module 12) ----
   Learner orders the steps of a PowerShell/Graph or Python automation; we
   check the sequence matches the correct pipeline. */
function checkScriptOrder(order, solution){
  const ok = order.length===solution.length && order.every((s,i)=>s===solution[i]);
  let firstWrong=-1;
  for(let i=0;i<Math.min(order.length,solution.length);i++){ if(order[i]!==solution[i]){firstWrong=i;break;} }
  return {ok, firstWrong};
}

/* ---- MFA factor strength (Module 13) ----
   Classify authenticators as phishing-resistant or not, and score an MFA combo. */
const FACTOR_INFO = {
  'password':        {label:'Password',                possession:false, phishResistant:false, strength:0},
  'sms':             {label:'SMS OTP',                 possession:true,  phishResistant:false, strength:1},
  'totp':            {label:'TOTP authenticator app',  possession:true,  phishResistant:false, strength:2},
  'push':            {label:'Push notification',       possession:true,  phishResistant:false, strength:2},
  'push_number':     {label:'Push w/ number matching', possession:true,  phishResistant:false, strength:3},
  'fido2':           {label:'FIDO2 / WebAuthn passkey',possession:true,  phishResistant:true,  strength:5},
  'piv':             {label:'PIV / smart card (cert)', possession:true,  phishResistant:true,  strength:5},
  'okta_verify_fastpass':{label:'Okta FastPass',       possession:true,  phishResistant:true,  strength:5}
};
function assessMfa(factors){
  // factors: array of keys; returns whether it's true MFA and phishing-resistant
  const known = factors.map(f=>FACTOR_INFO[f]).filter(Boolean);
  const hasKnowledge = factors.includes('password');
  const hasPossession = known.some(f=>f.possession);
  const isMfa = known.length>=2 && hasKnowledge && hasPossession || (known.filter(f=>f.possession).length>=1 && known.length>=2);
  const phishResistant = known.some(f=>f.phishResistant);
  const maxStrength = known.reduce((m,f)=>Math.max(m,f.strength),0);
  return {isMfa: known.length>=2, phishResistant, maxStrength,
    note: phishResistant?'Includes a phishing-resistant factor (FIDO2/PIV/FastPass) \u2014 strongest tier.'
                        :'No phishing-resistant factor; OTP/push can be phished or fatigued.'};
}

/* ---- Certificate-based auth chain validation (Module 13) ----
   Validate a client certificate presented for authentication. */
function validateCert(cert, ctx){
  // cert: {subject, issuer, notBefore, notOnOrAfter, revoked, keyUsageClientAuth, chainsToTrustedCA}
  // ctx: {now, trustedCAs:[...]}
  const checks=[];
  const push=(l,ok,d)=>checks.push({label:l,ok,detail:d});
  push('Chains to a trusted CA', !!cert.chainsToTrustedCA && ctx.trustedCAs.includes(cert.issuer),
    cert.chainsToTrustedCA?('issued by '+cert.issuer):'issuer not in trust store \u2014 untrusted chain');
  const timeOk = ctx.now>=cert.notBefore && ctx.now<cert.notOnOrAfter;
  push('Within validity period', timeOk, timeOk?'not expired / not pre-dated':'outside notBefore\u2026notOnOrAfter');
  push('Not revoked (CRL/OCSP)', !cert.revoked, cert.revoked?'certificate is revoked':'revocation check passed');
  push('Has client-auth key usage', !!cert.keyUsageClientAuth, cert.keyUsageClientAuth?'EKU permits client authentication':'cert not valid for client auth');
  push('Subject maps to an identity', !!cert.subject, cert.subject?('binds to '+cert.subject):'no subject to map to a user');
  const valid=checks.every(c=>c.ok);
  return {valid, checks, verdict: valid?'Certificate accepted \u2014 strong, phishing-resistant authentication.':'Certificate rejected \u2014 one or more validation checks failed.'};
}

/* ---- Okta Device Assurance evaluation (Module 13) ----
   Given a device's posture and a Device Assurance policy, allow/deny. */
function evalDeviceAssurance(policy, device){
  // policy: {requireManaged, requireScreenLock, minOsVersion, requireDiskEncryption, requireBiometric}
  // device: {managed, screenLock, osVersion, diskEncryption, biometric}
  const fails=[];
  if(policy.requireManaged && !device.managed) fails.push('device is not managed/registered (no MDM)');
  if(policy.requireScreenLock && !device.screenLock) fails.push('screen lock not enabled');
  if(policy.minOsVersion && device.osVersion < policy.minOsVersion) fails.push('OS version '+device.osVersion+' is below minimum '+policy.minOsVersion);
  if(policy.requireDiskEncryption && !device.diskEncryption) fails.push('disk encryption is off');
  if(policy.requireBiometric && !device.biometric) fails.push('biometric not configured');
  return {allow: fails.length===0, fails,
    verdict: fails.length===0?'Device meets assurance policy \u2014 access permitted.':'Device blocked by Device Assurance until posture is fixed.'};
}

/* ---- CyberArk component router (Module 07 strengthen) ----
   Map an admin action to the CyberArk component responsible. */
const CYBERARK_COMPONENTS = {
  'vault':{label:'Digital Vault', role:'Encrypted storage of secrets/credentials (the hardened core).'},
  'cpm':{label:'CPM (Central Policy Manager)', role:'Rotates & manages credentials per policy (change/verify/reconcile).'},
  'psm':{label:'PSM (Privileged Session Manager)', role:'Proxies, isolates & records privileged sessions.'},
  'pvwa':{label:'PVWA (Password Vault Web Access)', role:'The web UI where users request, check out & manage access.'}
};
function cyberArkComponentFor(actionKey){
  return CYBERARK_COMPONENTS[actionKey]||null;
}

/* ---- Access-risk review (Module 06 strengthen) ----
   Detect high-risk findings on an account during an access risk audit. */
function assessAccessRisk(acct){
  // acct: {lastLoginDays, status, terminatedInHR, isAdmin, mfaEnrolled, orphaned}
  const findings=[];
  if(acct.terminatedInHR && acct.status==='active') findings.push({sev:'critical', text:'Active account for an HR-terminated worker (missed termination).'});
  if(acct.orphaned) findings.push({sev:'high', text:'Orphaned account \u2014 no matching identity/owner.'});
  if(acct.lastLoginDays!=null && acct.lastLoginDays>90) findings.push({sev:'medium', text:'Dormant \u2014 no login in '+acct.lastLoginDays+' days.'});
  if(acct.isAdmin && !acct.mfaEnrolled) findings.push({sev:'high', text:'Privileged account without MFA enrolled.'});
  const worst = findings.reduce((w,f)=>{const rank={none:0,medium:1,high:2,critical:3};return rank[f.sev]>rank[w]?f.sev:w;},'none');
  return {findings, risk: findings.length?worst:'none',
    action: worst==='critical'?'Disable immediately and investigate.'
          : worst==='high'?'Remediate now (enroll MFA / reassign / disable).'
          : worst==='medium'?'Review for removal.'
          : 'No action \u2014 account looks healthy.'};
}

/* ---- OIG access request workflow (Module 06 strengthen) ----
   Okta Identity Governance access request -> approval decision. */
function oigAccessRequest(policy, req){
  // policy: {requiresApproval, approverRole, requiresJustification, autoExpiresDays, sodConflict}
  // req: {justification, approved, requesterHasConflict}
  const blockers=[];
  if(policy.sodConflict && req.requesterHasConflict) blockers.push('Grant would create a Separation-of-Duties conflict \u2014 blocked pending exception.');
  if(policy.requiresJustification && !(req.justification&&req.justification.trim())) blockers.push('Business justification required.');
  if(policy.requiresApproval && !req.approved) blockers.push('Pending approval from '+(policy.approverRole||'approver')+'.');
  if(blockers.length) return {granted:false, blockers};
  return {granted:true, blockers:[],
    note:'Access granted via OIG'+(policy.autoExpiresDays?(' \u2014 time-bound, auto-expires in '+policy.autoExpiresDays+' days and will surface in the next access certification.'):'.')};
}

    concept:`<p><b>Identity and Access Management (IAM)</b> is the discipline of controlling <i>who</i> can do <i>what</i> to <i>which</i> resource, <i>when</i>, and <i>under what conditions</i>. Every breach headline you've ever read is, at its core, a failure of one of those five words.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">IAM</div>The set of policies, processes, and technologies that ensure the right identities have the right access to the right resources at the right time — and that you can prove it later.</div>
    <h3>The five questions IAM answers</h3>

    concept:`<p>In casual speech "user," "account," and "login" are interchangeable. In IAM they are precisely different things, and conflating them causes real breaches.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Identity</div>The real-world entity — a person, a service, a device. Amy the human is one identity even if she has ten logins.</div>

  { id:'01.4', num:'01.4', title:'Least privilege & the access lifecycle', minutes:9,
    dek:'The golden rule of the entire field — plus the lifecycle every piece of access moves through, from grant to revoke.',
    concept:`<p>If you remember one principle from this track, make it this one. It governs every design decision in IAM.</p>
    <div class="keyterm"><div class="kt-label">The golden rule</div><div class="kt-term">Principle of Least Privilege (PoLP)</div>Every identity should have the <b>minimum</b> access required to do its job — no more — and only for as <b>long</b> as it's needed.</div>
    <p>Two dimensions hide in that definition: <b>scope</b> (how much) and <b>time</b> (how long). Most over-privilege comes from ignoring the time dimension — access is granted for a project and never removed.</p>
    <h3>Why "just give them admin" is a fireable mistake</h3>
    <p>Over-provisioning feels helpful and saves a follow-up ticket. But every excess permission is <b>blast radius</b>: if that account is phished, the attacker inherits everything it could do. Least privilege shrinks the blast radius of every compromise. An attacker who phishes a least-privileged analyst gets an analyst's access — not the keys to production.</p>
    <div class="analogy"><div class="al">Think of it like</div>House keys. You give the dog-walker a key to the <i>front door</i> for the <i>two weeks</i> you're away — not a master key to every door, safe, and car, forever. If their keyring is lost, you lose a front-door key, not your whole life. That's least privilege in both scope and time.</div>
    <h3>The access lifecycle</h3>
    <p>Every grant of access moves through a predictable lifecycle. IAM engineering is largely about automating and governing these transitions:</p>
    <ul>
      <li><b>Request</b> — someone needs access (a new hire, a project, a ticket).</li>
      <li><b>Approve</b> — the right owner authorizes it (ideally not the requester).</li>
      <li><b>Provision</b> — the access is actually created in the target system.</li>
      <li><b>Use</b> — the identity exercises the access; activity is logged.</li>
      <li><b>Review / Certify</b> — periodically, someone re-confirms it's still needed.</li>
      <li><b>Revoke / Deprovision</b> — access is removed when no longer needed.</li>
    </ul>
    <div class="callout tip"><span class="ic">💡</span><div>The step almost everyone skips is <b>Review</b>. Access gets granted and used, but no one ever asks "is this still needed?" Years later, people hold access to systems they haven't touched since onboarding. Access <b>certifications</b> (a whole module later) exist to force this step.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> "Privilege creep" is the slow accumulation of access as people change teams without losing old permissions. A 10-year employee who never switched jobs cleanly can end up able to touch nearly everything. Movers (the M in JML) are where this is won or lost.</div></div>`,
    example:`<p>Let's score a real access grant against least privilege. The analyst <i>needs</i> three permissions. Watch what happens when we hand them a broad role instead of a tailored one.</p>
    <div class="example-wrap"><div class="example-label">Worked example · scoring a grant against least privilege</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">least-privilege-check</div></div>
    <div class="console-body"><div class="mono-out">job needs    : reports:read, reports:export, dashboard:view

<span style="color:#f87171">OPTION A — granted role "data-admin"</span>
  grants     : reports:read, reports:export, dashboard:view,
               reports:delete, users:manage, billing:write
  verdict    : <span style="color:#f87171">OVER-PRIVILEGED</span>
  excess     : reports:delete, users:manage, billing:write
  blast radius if phished: can delete reports, manage users, move money

<span style="color:#34d399">OPTION B — granted tailored role "reporting-analyst"</span>
  grants     : reports:read, reports:export, dashboard:view
  verdict    : <span style="color:#34d399">LEAST PRIVILEGE ✓</span>
  excess     : none
  blast radius if phished: can read & export reports. That's it.</div></div></div>
    <p>Both options let the analyst do their job. Only one of them limits the damage when (not if) that account is eventually compromised. In the lab you'll build Option B yourself.</p></div>`,
    lab:{ kind:'leastpriv', id:'01.4',
      title:'Build a least-privilege role',
      objective:'A marketing analyst needs exactly: <code>campaigns:read</code>, <code>campaigns:edit</code>, and <code>analytics:view</code>. Select <b>precisely</b> those permissions — no more, no less — to satisfy least privilege.',
      intro:'Toggle permissions into the role. The checker rejects both missing AND excess permissions, just like a real access review.',
      needed:['campaigns:read','campaigns:edit','analytics:view'],
      pool:['campaigns:read','campaigns:edit','campaigns:delete','analytics:view','analytics:admin','users:manage','billing:write','settings:admin']},
    quiz:[
      {q:'The Principle of Least Privilege limits access along which two dimensions?',
       o:['Cost and speed','Scope (how much) and time (how long)','Color and size','Region and language'],a:1,
       e:'Least privilege is about granting the minimum scope of access and only for as long as it\'s needed. The time dimension is the one most often forgotten.'},
      {q:'"Privilege creep" most commonly happens during which lifecycle event?',
       o:['Initial request','Mover — changing teams/roles without losing old access','Password reset','Logging in'],a:1,
       e:'When people change roles, new access is added but old access is rarely removed, so permissions accumulate over a career. Clean "mover" handling prevents creep.'},
      {q:'Which access-lifecycle step is most often skipped, and exists to catch creep?',
       o:['Provision','Use','Review / Certify','Request'],a:2,
       e:'Periodic review/certification forces someone to re-confirm access is still needed. Without it, grants live forever. Access certifications are built to enforce this step.'},
      {q:'Why does least privilege reduce the damage of a phished account?',
       o:['It makes passwords longer','The attacker inherits only the limited access that account had','It encrypts the mailbox','It hides the account'],a:1,
       e:'A compromised identity can do exactly what it was permitted to do — no more. Minimizing that permission set minimizes the blast radius of any single compromise.'}
    ]}
  ]},

{ id:'M02', num:'02', title:'The Protocols That Run Identity', sub:'5 lessons · SAML · OIDC · OAuth · SCIM · assertions',
  blurb:'How identity actually moves between systems. SSO, federation, tokens, and the provisioning protocol that creates and deletes accounts. These four acronyms appear in every IAM job description.',
  lessons:[
  { id:'02.1', num:'02.1', title:'SSO & federation: the big idea', minutes:8,
    dek:'Why you can click "Sign in with Google" and land in a totally different app already logged in — and why enterprises live and die by this.',
    concept:`<p>Before protocols, the concept. <b>Single Sign-On (SSO)</b> means authenticating once and gaining access to many applications without logging in again to each.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Single Sign-On (SSO)</div>One authentication event grants access to many independent applications. Log in once to your identity provider; every connected app trusts that login.</div>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Federation</div>A trust relationship between an <b>Identity Provider (IdP)</b> and a <b>Service Provider (SP)</b>, so the SP accepts the IdP's word about who you are instead of maintaining its own password for you.</div>
    <h3>The two roles in every SSO conversation</h3>
    <ul><li><b>Identity Provider (IdP)</b> — the system that authenticates the user and vouches for them. Okta, Entra ID, Google, Ping.</li>
    <li><b>Service Provider (SP)</b> — the application the user wants to use, which trusts the IdP. Salesforce, Slack, AWS, Workday.</li></ul>
    <p>The magic word is <b>trust</b>. The SP doesn't check your password — it has no password for you. It receives a signed statement from the IdP saying "this is Amy, I vouch for her," verifies the signature, and lets you in.</p>
    <div class="analogy"><div class="al">Think of it like</div>A passport. Your government (the IdP) verifies your identity and issues a signed, tamper-evident passport. A foreign border agent (the SP) doesn't re-run your birth certificate — they trust the passport because they trust the issuing government and can verify it's authentic. Federation is governments agreeing to trust each other's passports.</div>
    <div class="callout tip"><span class="ic">💡</span><div>SSO is a <b>security</b> win, not just convenience. One strong login (with MFA) replaces dozens of weak, reused passwords. And when someone leaves, disabling their IdP account instantly cuts access to every federated app — instead of hunting down 30 separate logins.</div></div>`,
    example:`<p>Here's the SSO trust flow at the concept level — no protocol details yet, just who says what to whom.</p>
    <div class="example-wrap"><div class="example-label">Worked example · the trust handshake</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">sso-handshake</div></div>
    <div class="console-body"><div class="mono-out">1. Amy visits Salesforce (the <span style="color:#22d3ee">SP</span>)         "who are you?"
2. Salesforce redirects her to Okta (the <span style="color:#22d3ee">IdP</span>)  "go prove it over there"
3. Okta authenticates Amy (password + MFA)      <span style="color:#34d399">identity established</span>
4. Okta hands Amy a <span style="color:#fbbf24">signed assertion</span>:           "this is amy.chen, I vouch — signed, Okta"
5. Amy's browser delivers it to Salesforce
6. Salesforce <span style="color:#34d399">verifies Okta's signature</span> and logs Amy in
   → Amy never gave Salesforce a password. Ever.</div></div></div>
    <p>Step 6 is the whole game: Salesforce trusts the assertion because it can cryptographically verify it came from Okta and wasn't tampered with. The <i>how</i> of that signed assertion is what SAML and OIDC define — that's the next two lessons.</p></div>`,
    lab:{ kind:'classify', id:'02.1', mode:'idpsp',
      title:'IdP or SP?',
      objective:'In each scenario, identify whether the named system is acting as the <b>Identity Provider</b> (authenticates and vouches) or the <b>Service Provider</b> (trusts and grants access). Naming the roles correctly is essential for every SSO integration.',
      intro:'Tag each system with its role in the SSO relationship. All correct to pass.',
      threeway:['Identity Provider','Service Provider'],
      twoway:true,
      items:[
        {t:'Okta authenticates the user and issues a signed assertion.',layer:'Identity Provider'},
        {t:'Slack receives the assertion and logs the user in.',layer:'Service Provider'},
        {t:'"Sign in with Google" — Google verifies the user.',layer:'Identity Provider'},
        {t:'A travel-booking app the user reaches via their company login.',layer:'Service Provider'},
        {t:'Entra ID, where the company\'s master accounts live.',layer:'Identity Provider'}
      ]},
    quiz:[
      {q:'In SSO, which party authenticates the user and vouches for them?',
       o:['Service Provider','Identity Provider','The browser','The firewall'],a:1,
       e:'The Identity Provider (Okta, Entra, Google) runs the authentication and issues the signed assertion. The Service Provider trusts it.'},
      {q:'What does the Service Provider actually verify when it receives an assertion?',
       o:['The user\'s password','That the assertion is validly signed by the trusted IdP','The user\'s credit card','The browser version'],a:1,
       e:'The SP has no password for the user. It verifies the IdP\'s cryptographic signature to trust the assertion is authentic and untampered.'},
      {q:'A key security benefit of SSO when an employee leaves is:',
       o:['Faster internet','Disabling one IdP account cuts access to all federated apps at once','Cheaper licenses','Automatic raises'],a:1,
       e:'Because every app trusts the IdP, killing the IdP identity instantly revokes federated access everywhere — far safer than hunting down dozens of separate logins.'}
    ]},
  { id:'02.2', num:'02.2', title:'SAML: enterprise SSO\'s workhorse', minutes:9,
    dek:'The XML-based standard that still powers the majority of enterprise app logins. You will troubleshoot SAML on the job — guaranteed.',
    concept:`<p><b>SAML 2.0</b> (Security Assertion Markup Language) is the older but utterly dominant SSO standard in the enterprise. If a company uses Workday, Salesforce, or any legacy SaaS, SAML is almost certainly involved.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">SAML Assertion</div>A signed XML document from the IdP stating who the user is (the <b>Subject / NameID</b>), who it's for (the <b>Audience</b>), and how long it's valid (the <b>Conditions</b> window).</div>
    <h3>The pieces you must know</h3>
    <ul>
      <li><b>Issuer</b> — which IdP produced this (must be one the SP trusts).</li>
      <li><b>Subject / NameID</b> — who the user is (often their email).</li>
      <li><b>Audience</b> — the SP this assertion is <i>for</i>. Must match the SP's <b>Entity ID</b> exactly.</li>
      <li><b>Conditions (NotBefore / NotOnOrAfter)</b> — the validity time window.</li>
      <li><b>Signature</b> — the IdP's cryptographic signature over the assertion.</li>
      <li><b>ACS URL</b> (Assertion Consumer Service) — where the SP receives the assertion.</li>
    </ul>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>The #1 SAML failure in the real world:</b> the <b>Audience</b> in the assertion doesn't exactly match the SP's configured <b>Entity ID</b>. A trailing slash, http vs https, or a typo and the SP rejects the assertion — usually with an unhelpful error that bounces the user back to a login loop.</div></div>
    <h3>What goes wrong (your future tickets)</h3>
    <ul><li><b>Audience mismatch</b> → SP rejects, login loop.</li>
    <li><b>Clock skew</b> → the NotBefore/NotOnOrAfter window fails because a server's clock drifted. Assertions are time-sensitive.</li>
    <li><b>Expired or wrong signing certificate</b> → SP can't verify the signature; everyone in the org fails at once.</li>
    <li><b>Wrong NameID format</b> → user authenticates but the SP can't match them to an account.</li></ul>`,
    example:`<p>Below is a SAML assertion in plain terms, then the SP's verdict. Watch the audience check specifically.</p>
    <div class="example-wrap"><div class="example-label">Worked example · reading a SAML assertion</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">assertion (decoded)</div><div class="chip">SAML 2.0</div></div>
    <div class="console-body"><div class="mono-out">Issuer        : https://idp.northwind.com   <span style="color:#5c6b80"># SP trusts this ✓</span>
NameID        : amy.chen@northwind.com
Audience      : https://acme-hr.example.com  <span style="color:#5c6b80"># must equal SP Entity ID</span>
NotBefore     : 14:02:00Z
NotOnOrAfter  : 14:07:00Z                     <span style="color:#5c6b80"># 5-minute window</span>
Signature     : valid (signed by idp.northwind.com)

SP config     : Entity ID = https://acme-hr.example.com   <span style="color:#34d399">← matches Audience ✓</span>
SP clock      : 14:04:11Z   <span style="color:#34d399">← inside the window ✓</span>
-------------------------------------------------
VERDICT       : <span style="color:#34d399">ACCEPTED — session established for amy.chen</span></div></div></div>
    <p>Change that Audience to <code>https://acme-hr.example.com<b>/</b></code> (one trailing slash) and the verdict flips to <span style="color:#f87171">REJECTED</span>. In the lab you'll fix exactly that kind of break.</p></div>`,
    lab:{ kind:'saml', id:'02.2',
      title:'Fix the broken SAML login',
      objective:'Users can\'t log into the HR app — SSO bounces them back to login. The assertion config is below. Fix the fields so the SP <b>accepts</b> it: the Audience must exactly match the SP Entity ID <code>https://acme-hr.example.com</code>, the signature must be present, and the time window must be valid.',
      intro:'Edit the assertion JSON so it validates against the SP context. The checker runs the same checks a real Service Provider runs.',
      starter:`{
  "issuer": "https://idp.northwind.com",
  "audience": "https://acme-hr.example.com/",
  "notBefore": 1000,
  "notOnOrAfter": 1000,
  "nameId": "amy.chen@northwind.com",
  "signed": false
}`,
      ctx:{trustedIdP:'https://idp.northwind.com',spEntityId:'https://acme-hr.example.com',now:1700000000}},
    quiz:[
      {q:'The single most common cause of SAML SSO failures in production is:',
       o:['Slow networks','Audience / Entity ID mismatch','Too many users','Wrong font'],a:1,
       e:'A mismatch between the assertion\'s Audience and the SP\'s configured Entity ID (even a trailing slash) causes the SP to reject the assertion — the classic login loop.'},
      {q:'SAML assertions include NotBefore and NotOnOrAfter. A drifting server clock causes:',
       o:['Better security','The validity window to fail, breaking SSO for everyone','Faster logins','Nothing'],a:1,
       e:'Assertions are time-boxed. If a server\'s clock drifts outside the window, validation fails org-wide. NTP time-sync matters.'},
      {q:'What is SAML primarily used for?',
       o:['Encrypting disks','Browser-based enterprise Single Sign-On','Sending email','Compressing files'],a:1,
       e:'SAML 2.0 is the dominant XML-based protocol for web SSO into enterprise applications.'}
    ]},
  { id:'02.3', num:'02.3', title:'OAuth 2.0 & OIDC: the modern stack', minutes:10,
    dek:'OAuth authorizes apps to call APIs on your behalf. OIDC adds "who is this user?" on top. Together they power modern login and every mobile app.',
    concept:`<p>SAML rules legacy web SSO. <b>OAuth 2.0</b> and <b>OpenID Connect (OIDC)</b> rule everything modern — mobile apps, single-page apps, API access, and "Sign in with…" buttons.</p>
    <div class="keyterm"><div class="kt-label">Term · authorization</div><div class="kt-term">OAuth 2.0</div>A framework for <b>delegated authorization</b>. It lets an app get a scoped <b>access token</b> to call an API <i>on your behalf</i> — without ever seeing your password. OAuth answers "what may this app do?", not "who is the user?"</div>
    <div class="keyterm"><div class="kt-label">Term · authentication</div><div class="kt-term">OpenID Connect (OIDC)</div>A thin identity layer <b>on top of OAuth 2.0</b>. It adds an <b>ID token</b> (a JWT) that authenticates the user — answering "who is this?" OIDC is how modern SSO login works.</div>
    <div class="callout tip"><span class="ic">💡</span><div><b>The cleanest way to remember it:</b> OAuth = <i>authorization</i> (a valet key that lets the app do specific things). OIDC = <i>authentication</i> (an ID card proving who you are). OIDC literally is OAuth plus an identity token. People misuse "OAuth login" when they mean OIDC constantly — now you won't.</div></div>
    <h3>The tokens</h3>
    <ul><li><b>Access token</b> — lets the bearer call an API within granted <b>scopes</b> (e.g. <code>calendar.read</code>). Short-lived.</li>
    <li><b>ID token</b> — a JWT that proves <i>who the user is</i> (OIDC only). For the app, not for calling APIs.</li>
    <li><b>Refresh token</b> — used to get new access tokens without re-prompting the user.</li></ul>
    <h3>The Authorization Code flow (the one you must know)</h3>
    <p>The dominant, secure flow for web and mobile (with PKCE):</p>
    <ul><li><b>1.</b> App redirects user to the IdP's <code>/authorize</code> with a <code>state</code> and <code>nonce</code>.</li>
    <li><b>2.</b> User authenticates (and MFA) at the IdP — app never sees the password.</li>
    <li><b>3.</b> IdP redirects back with a one-time <code>code</code>.</li>
    <li><b>4.</b> App's backend exchanges the code at <code>/token</code> for tokens.</li>
    <li><b>5.</b> App validates the ID token: signature, <code>iss</code>, <code>aud</code>, <code>exp</code>, <code>nonce</code>.</li></ul>
    <div class="callout warn"><span class="ic">⚠️</span><div>Two parameters defend the flow: <b>state</b> stops CSRF (the response must match the request you sent). <b>nonce</b> stops ID-token replay (binds the token to your one login). Skipping ID-token validation — especially <code>aud</code> — is a classic, dangerous bug.</div></div>`,
    example:`<p>Here's a decoded OIDC <b>ID token</b> and the validation an app must perform before trusting it. This is the JWT you'll inspect in the lab.</p>
    <div class="example-wrap"><div class="example-label">Worked example · validating an OIDC ID token</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">id_token (decoded JWT)</div><div class="chip">OIDC</div></div>
    <div class="console-body"><div class="mono-out">{
  "iss":   "https://idp.northwind.com",   <span style="color:#5c6b80"># issuer — must be your IdP</span>
  "aud":   "northwind-travel-app",        <span style="color:#5c6b80"># audience — must be THIS app</span>
  "sub":   "amy.chen",                    <span style="color:#5c6b80"># subject — the user</span>
  "exp":   1700003600,                    <span style="color:#5c6b80"># expiry</span>
  "nonce": "x91f-aa02"                    <span style="color:#5c6b80"># must match what app sent</span>
}
validation @ now=1700001000, app="northwind-travel-app", sent nonce="x91f-aa02"
  iss   ✓   aud ✓   not expired ✓   nonce ✓
  → <span style="color:#34d399">ID TOKEN VALID — user authenticated as amy.chen</span></div></div></div>
