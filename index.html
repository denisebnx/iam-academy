    <p>If <code>aud</code> were a different app's name, this token was minted for someone else and must be rejected — even if everything else checks out. That single check stops a whole class of token-confusion attacks.</p></div>`,
    lab:{ kind:'jwt', id:'02.3',
      title:'Validate the ID token',
      objective:'An ID token arrived at your app <code>northwind-travel-app</code>. Set the validation context so a <b>legitimate</b> token passes and a <b>tampered</b> one fails. Your app expects issuer <code>https://idp.northwind.com</code> and audience <code>northwind-travel-app</code>.',
      intro:'Fill in what your app expects, then validate each token. Pass the good one and reject the bad one to complete the lab.'},
    quiz:[
      {q:'OAuth 2.0 is fundamentally about:',
       o:['Authentication (who you are)','Delegated authorization (what an app may do)','Encrypting email','Network routing'],a:1,
       e:'OAuth grants scoped access tokens so an app can act on your behalf. It does not, by itself, tell the app who you are — that\'s OIDC\'s job.'},
      {q:'OpenID Connect adds what to OAuth 2.0?',
       o:['Faster tokens','An ID token that authenticates the user','Disk encryption','A firewall'],a:1,
       e:'OIDC layers authentication on OAuth via the ID token (a JWT), making it the modern standard for SSO login.'},
      {q:'In the Authorization Code flow, the "nonce" parameter defends against:',
       o:['Slow networks','ID-token replay attacks','Disk failure','Expired passwords'],a:1,
       e:'The nonce binds the ID token to the specific authentication request. If a replayed token\'s nonce doesn\'t match, it\'s rejected.'},
      {q:'Failing to validate the "aud" claim on an ID token is dangerous because:',
       o:['It slows login','A token minted for a different app could be accepted','It uses more memory','Nothing happens'],a:1,
       e:'The aud claim ensures the token was intended for your app. Skipping it allows token-confusion attacks where a token for app B is replayed to app A.'}
    ]},
  { id:'02.4', num:'02.4', title:'SCIM: how accounts are born and killed', minutes:8,
    dek:'SAML/OIDC log you in. SCIM is the protocol that actually creates, updates, and deletes the accounts in the first place — the engine under joiners and leavers.',
    concept:`<p>Login protocols assume the account already exists. But who <i>created</i> it? When you assign a user to Salesforce in Okta and they appear in Salesforce minutes later — that's <b>SCIM</b>.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">SCIM</div>System for Cross-domain Identity Management — a standard REST/JSON protocol IdPs use to automatically <b>provision</b> (create), <b>update</b>, and <b>deprovision</b> (disable/delete) user accounts in downstream applications.</div>
    <h3>Why it matters more than it sounds</h3>
    <p>SCIM is the automation layer beneath the entire <b>Joiner-Mover-Leaver</b> lifecycle (a whole module later):</p>
    <ul><li><b>Joiner</b> — new hire added to a group in the IdP → SCIM creates their accounts in every connected app automatically.</li>
    <li><b>Mover</b> — changes department → SCIM updates attributes and group memberships downstream.</li>
    <li><b>Leaver</b> — offboarded → SCIM <b>disables/deletes</b> their accounts everywhere. This is the critical one.</li></ul>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The audit finding that ends careers:</b> a user is offboarded in the IdP, but an app isn't connected via SCIM (or the connector is broken). Their account in that app stays <b>active</b> long after they've left. Broken or missing SCIM deprovisioning is one of the most common — and serious — findings in any access audit.</div></div>
    <h3>The SCIM operations</h3>
    <p>SCIM is just a small set of REST calls against a <code>/Users</code> (and <code>/Groups</code>) endpoint: <code>POST</code> creates, <code>PATCH</code>/<code>PUT</code> updates, <code>GET</code> reads, and <code>DELETE</code> (or a PATCH setting <code>active:false</code>) deprovisions. Apps that support SCIM expose this endpoint; the IdP calls it whenever assignments change.</p>`,
    example:`<p>Watch a leaver event ripple through SCIM. The IdP detects the offboard and fires deprovision calls to every connected app.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a leaver event over SCIM</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">scim-events · offboard amy.chen</div></div>
    <div class="console-body"><div class="mono-out">trigger: amy.chen moved to "Deprovisioned" group in IdP

→ PATCH  salesforce/scim/Users/achen   {"active": false}   <span style="color:#34d399">200 OK</span>
→ PATCH  slack/scim/Users/U0AMY        {"active": false}   <span style="color:#34d399">200 OK</span>
→ DELETE github/scim/Users/amychen-nw                       <span style="color:#34d399">204</span>
→ PATCH  legacy-hr/scim/Users/4471     {"active": false}   <span style="color:#f87171">CONNECTOR OFFLINE ✗</span>

result: 3 of 4 apps deprovisioned.
        <span style="color:#f87171">legacy-hr account STILL ACTIVE</span> — flagged for manual review.</div></div></div>
    <p>That last line is exactly what an auditor hunts for. The value of SCIM is automation; the danger is silently assuming it worked. Good IAM engineers verify deprovisioning, they don't trust it blindly.</p></div>`,
    lab:{ kind:'quizonly', id:'02.4',
      title:'Reason about provisioning',
      objective:'No console for this one — these are the judgment calls SCIM forces. Answer all questions correctly to complete the lab.',
      intro:''},
    quiz:[
      {q:'When you assign a user to an app in Okta/Entra and their account appears in that app automatically, which protocol did that?',
       o:['SAML','SCIM','OAuth','TLS'],a:1,
       e:'SCIM is the provisioning protocol that creates/updates/deletes downstream accounts. SAML and OIDC only handle the login of already-existing accounts.'},
      {q:'A leaver is disabled in the IdP, but one app keeps their account active for months. The likely cause is:',
       o:['SAML clock skew','Broken or missing SCIM deprovisioning connector','Weak password','Wrong MFA'],a:1,
       e:'If an app isn\'t connected via SCIM (or the connector failed), the deprovision event never reaches it and the account lingers — a top audit finding.'},
      {q:'Which SCIM operation typically handles deprovisioning a leaver?',
       o:['GET','POST creating a new user','DELETE or PATCH active:false','TRACE'],a:2,
       e:'Deprovisioning is a DELETE, or a PATCH setting active:false. POST creates (joiner); PATCH/PUT update attributes (mover).'},
      {q:'SCIM is the automation layer beneath which lifecycle process?',
       o:['Joiner-Mover-Leaver','TCP handshake','DNS resolution','Disk formatting'],a:0,
       e:'SCIM mechanizes JML: create on joiner, update on mover, disable/delete on leaver. The lifecycle is the policy; SCIM is how it\'s enforced in each app.'}
    ]},
  { id:'02.5', num:'02.5', title:'Inside the SAML assertion', minutes:11,
    dek:'You\u2019ve seen SAML move a login between IdP and SP. Now open the envelope: the assertion itself \u2014 its parts, and the difference between the assertion and the response that carries it.',
    concept:`<p>Lesson 02.2 showed SAML as a flow. This lesson opens the actual document that flows. When people say "the SAML token," they almost always mean the <b>assertion</b> \u2014 the signed XML statement the IdP makes about a user. Reading it is a core skill: most SSO failures are an assertion that\u2019s subtly wrong.</p>
    <div class="keyterm"><div class="kt-label">Core distinction</div><div class="kt-term">Response vs. Assertion</div>The IdP sends a <b>&lt;samlp:Response&gt;</b> \u2014 the outer envelope \u2014 which is POSTed to the SP\u2019s <b>Assertion Consumer Service (ACS)</b> URL. <i>Inside</i> it sits one or more <b>&lt;saml:Assertion&gt;</b> elements \u2014 the actual claims about the user. People say "assertion" loosely, but knowing the assertion is wrapped in the response (and that either can be signed) is what lets you debug real SSO.</div>
    <h3>The anatomy of an assertion</h3>
    <p>A SAML 2.0 assertion is nested XML with a handful of required-in-practice parts:</p>
    <ul>
      <li><b>&lt;Issuer&gt;</b> \u2014 who made the assertion (the IdP\u2019s entity ID). The SP checks this against its configured, trusted IdP.</li>
      <li><b>&lt;ds:Signature&gt;</b> \u2014 the XML digital signature (typically RSA + SHA-256). Without a valid signature the SP must reject it \u2014 anyone could forge claims otherwise.</li>
      <li><b>&lt;Subject&gt; / &lt;NameID&gt;</b> \u2014 <i>who</i> the assertion is about: the user identifier the SP keys on. Includes <b>&lt;SubjectConfirmation&gt;</b> data.</li>
      <li><b>&lt;Conditions&gt;</b> \u2014 the validity constraints: a <b>NotBefore / NotOnOrAfter</b> time window (why clock skew breaks SSO), and an <b>&lt;AudienceRestriction&gt;</b> naming the intended SP (why an audience mismatch breaks SSO).</li>
      <li><b>&lt;AuthnStatement&gt;</b> \u2014 that the IdP authenticated the subject, when (<b>AuthnInstant</b>), and how (<b>AuthnContext</b> \u2014 password, MFA), with an optional <b>SessionIndex</b>.</li>
      <li><b>&lt;AttributeStatement&gt;</b> \u2014 the attributes about the user: email, department, groups. <b>These become the data the SP (and downstream provisioning) consume.</b></li>
    </ul>
    <div class="analogy"><div class="al">Think of it like</div>A notarized letter inside an addressed envelope. The <b>response</b> is the envelope addressed to one recipient (the ACS URL). The <b>assertion</b> is the letter: it names who it\u2019s about (Subject), who wrote it (Issuer), is stamped with a notary seal (Signature), is only valid between two dates (Conditions), states "I verified this person at 2:30pm by password+MFA" (AuthnStatement), and lists facts about them (AttributeStatement). The SP opens the envelope and trusts the letter only if the seal, the dates, and the addressee all check out.</div>
    <h3>Where this connects</h3>
    <p>The <b>AttributeStatement</b> is the bridge to the rest of the course: those attributes (department, title, groups) are exactly what the IdP sourced from HR (Module 10) and what drive access decisions. And the validity checks here \u2014 issuer, audience, time window, signature \u2014 are precisely the failures you triaged in the Okta SSO console (Module 05). This lesson is the document those flows move.</p>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>Signature placement is a real gotcha:</b> SAML lets the signature be on the response, the assertion, or both. Many serious SAML vulnerabilities have come from SPs validating the wrong element or mishandling unsigned assertions. The safe rule you\u2019ll hear: the <b>assertion</b> must be signed and its signature verified before any claim inside it is trusted.</div></div>`,
    example:`<p>A real assertion\u2019s skeleton, annotated \u2014 envelope on the outside, the signed claims within.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 a SAML assertion, annotated</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">saml-response.xml</div><div class="chip">SAML</div></div>
    <div class="console-body"><div class="mono-out">&lt;samlp:Response&gt;                          <span style="color:#5c6b80">// envelope \u2192 POST to SP ACS URL</span>
 &lt;saml:Assertion&gt;                         <span style="color:#5c6b80">// the actual claims</span>
  &lt;saml:Issuer&gt;<span style="color:#22d3ee">https://idp.northwind.com</span>     <span style="color:#5c6b80">// who issued it</span>
  &lt;ds:Signature&gt;...&lt;/ds:Signature&gt;        <span style="color:#5c6b80">// notary seal (RSA-SHA256)</span>
  &lt;saml:Subject&gt;
    &lt;saml:NameID&gt;<span style="color:#22d3ee">amy@northwind.com</span>          <span style="color:#5c6b80">// who it's about</span>
  &lt;saml:Conditions <span style="color:#fbbf24">NotBefore</span>=09:00 <span style="color:#fbbf24">NotOnOrAfter</span>=09:05&gt;
    &lt;saml:AudienceRestriction&gt;<span style="color:#22d3ee">sp:travel-app</span>  <span style="color:#5c6b80">// intended SP only</span>
  &lt;saml:AuthnStatement <span style="color:#fbbf24">AuthnInstant</span>=09:00&gt;       <span style="color:#5c6b80">// when/how authn'd</span>
  &lt;saml:AttributeStatement&gt;                 <span style="color:#5c6b80">// the useful payload</span>
    email = amy@northwind.com
    department = Finance
    groups = [Finance-App-Users]
 &lt;/saml:Assertion&gt;
&lt;/samlp:Response&gt;</div></div></div>
    <p>Every element has a job, and every one is something an SP validates. In the lab you\u2019ll be handed a <i>broken</i> assertion and repair each part \u2014 issuer, signature, subject, time window, audience, authn, attributes \u2014 until the SP would accept it.</p></div>`,
    lab:{ kind:'assertion', id:'02.5',
      title:'Repair a SAML assertion',
      objective:'The Service Provider is rejecting this assertion. Fix each element \u2014 set a trusted Issuer, sign it, add the Subject NameID, correct the Conditions time window, set the Audience to this SP, add the AuthnStatement, and include attributes \u2014 then validate until the SP would accept it.',
      intro:'',
      ctx:{ now:1000, spEntityId:'sp:northwind-travel', trustedIdP:'https://idp.northwind.com' },
      start:{ issuer:'https://evil-idp.example', nameId:null, notBefore:200, notOnOrAfter:300, audience:'sp:some-other-app', authnInstant:null, attributes:{}, signed:false }},
    quiz:[
      {q:'In SAML, the assertion is:',
       o:['The outer envelope POSTed to the SP','The signed XML statement of claims that sits INSIDE the Response','A password','A network packet header'],a:1,
       e:'The &lt;Response&gt; is the envelope sent to the SP\u2019s ACS URL; the &lt;Assertion&gt; inside it carries the actual claims about the user.'},
      {q:'The part of the assertion that carries email, department, and groups is the:',
       o:['Issuer','AttributeStatement','Signature','Conditions'],a:1,
       e:'The AttributeStatement holds the user attributes the SP and downstream provisioning consume.'},
      {q:'An assertion\u2019s AudienceRestriction and NotBefore/NotOnOrAfter both live in the:',
       o:['AuthnStatement','Conditions element','Signature','Subject'],a:1,
       e:'Conditions carries the validity constraints \u2014 the time window and the intended-audience restriction \u2014 which is why skew and audience mismatches cause rejections.'},
      {q:'Why must an SP verify the assertion\u2019s signature before trusting its claims?',
       o:['For speed','Because without a valid signature the claims could be forged or tampered','To save storage','To enable MFA'],a:1,
       e:'The XML signature provides integrity and authenticity. An unsigned or unverified assertion can\u2019t be trusted \u2014 anyone could assert anything.'}
    ]}
  ]},

/* ===================== MODULE 03 — RBAC & ACCESS CONTROL MODELS ===================== */
{ id:'M03', num:'03', title:'RBAC & Access Control Models', sub:'4 lessons · DAC · MAC · RBAC · ABAC',
  blurb:'How access is actually modeled. The four control models every system uses, why RBAC won the enterprise, how role hierarchies inherit permissions, and where attribute-based access (ABAC) takes over.',
  lessons:[
  { id:'03.1', num:'03.1', title:'The four access control models', minutes:8,
    dek:'Every access system ever built is some flavor of four models: DAC, MAC, RBAC, and ABAC. Knowing which one you\'re looking at tells you how to reason about it.',
    concept:`<p>"Access control" isn't one thing — it's a family of models that differ in <b>who decides</b> and <b>what the decision is based on</b>. Four dominate.</p>
    <div class="keyterm"><div class="kt-label">Model 1</div><div class="kt-term">DAC — Discretionary Access Control</div>The <b>owner</b> of a resource decides who gets access, at their discretion. Your personal Google Doc: you click "Share" and grant whomever you like. Flexible, but chaotic at scale and prone to over-sharing.</div>
    <div class="keyterm"><div class="kt-label">Model 2</div><div class="kt-term">MAC — Mandatory Access Control</div>A <b>central authority</b> sets rules nobody can override, usually via classification labels (Top Secret, Secret, Confidential). You can't share up or down regardless of your wishes. Think military and government systems.</div>
    <div class="keyterm"><div class="kt-label">Model 3</div><div class="kt-term">RBAC — Role-Based Access Control</div>Access is granted to <b>roles</b>, and roles are assigned to users. You don't give Amy permissions directly — you make her a "Finance Analyst" and that role carries the permissions. The enterprise default.</div>
    <div class="keyterm"><div class="kt-label">Model 4</div><div class="kt-term">ABAC — Attribute-Based Access Control</div>Decisions are computed from <b>attributes</b> of the user, resource, action, and context (department, location, time, device, data sensitivity). The most expressive and the basis of modern policy engines and Zero Trust.</div>
    <h3>How to tell them apart fast</h3>
    <ul><li><b>Owner decides?</b> → DAC.</li><li><b>Central labels nobody overrides?</b> → MAC.</li><li><b>Permissions bundled into job-like roles?</b> → RBAC.</li><li><b>Rules evaluated from attributes/conditions?</b> → ABAC.</li></ul>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> Real systems blend them. AWS IAM is mostly ABAC-flavored policy (conditions on attributes) but you organize humans with RBAC-style roles. Okta and Entra are RBAC at the group level with ABAC-style conditional access layered on top. Recognizing the blend is the skill.</div></div>`,
    example:`<p>Same request — "can Amy open this file?" — answered by each model. Watch what each one actually looks at.</p>
    <div class="example-wrap"><div class="example-label">Worked example · one request, four models</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">access-models.compare</div></div>
    <div class="console-body"><div class="mono-out">request: amy wants to OPEN /finance/q3-forecast.xlsx

<span style="color:#fbbf24">DAC </span> → who owns the file? Bob does. Did Bob share it with Amy?  → decision hinges on Bob's choice
<span style="color:#fbbf24">MAC </span> → file label = "Confidential"; Amy's clearance = "Confidential" → allowed by classification, no human discretion
<span style="color:#fbbf24">RBAC</span> → Amy holds role "finance-analyst"; that role grants finance:read → <span style="color:#34d399">ALLOW</span>
<span style="color:#fbbf24">ABAC</span> → IF user.dept==Finance AND device.managed AND time in business-hours → <span style="color:#34d399">ALLOW</span>; else deny</div></div></div>
    <p>Notice RBAC asks "what role do you have?" while ABAC asks "do your attributes satisfy the rule right now?" RBAC is about <i>identity structure</i>; ABAC is about <i>live conditions</i>. That distinction drives the rest of this module.</p></div>`,
    lab:{ kind:'classify', id:'03.1', mode:'models',
      title:'Name that model',
      objective:'Identify which access control model each system uses: <b>DAC</b>, <b>MAC</b>, <b>RBAC</b>, or <b>ABAC</b>. Recognizing the model is the first step to reasoning about any access system.',
      intro:'Five systems. Tag each with its primary model. All correct to pass.',
      threeway:['DAC','MAC','RBAC','ABAC'],
      items:[
        {t:'A shared drive where each file\'s owner picks who can see it.',layer:'DAC'},
        {t:'A classified network where documents carry clearance labels no user can override.',layer:'MAC'},
        {t:'An HR app where being a "Recruiter" automatically grants the recruiting permission set.',layer:'RBAC'},
        {t:'A policy: allow if user.department = resource.department AND request.time is 9–5.',layer:'ABAC'},
        {t:'Assigning users to "Engineer", "Manager", "Admin" groups that bundle permissions.',layer:'RBAC'}
      ]},
    quiz:[
      {q:'In which model does the resource owner decide access at their own discretion?',
       o:['MAC','DAC','RBAC','ABAC'],a:1,
       e:'Discretionary Access Control puts the decision in the owner\'s hands — like sharing your own document. Flexible but hard to govern at scale.'},
      {q:'A military system using Top Secret / Secret / Confidential labels that users cannot override is:',
       o:['DAC','RBAC','MAC','ABAC'],a:2,
       e:'Mandatory Access Control enforces central classification labels that no individual can change — the defining trait of MAC.'},
      {q:'RBAC grants permissions to ___, which are then assigned to users.',
       o:['files','roles','networks','sessions'],a:1,
       e:'In RBAC, permissions attach to roles, and users get roles. This indirection is what makes RBAC manageable at enterprise scale.'},
      {q:'Which model evaluates live attributes and conditions (department, time, device) to decide?',
       o:['DAC','MAC','RBAC','ABAC'],a:3,
       e:'Attribute-Based Access Control computes decisions from attributes of user/resource/action/context — the foundation of modern policy engines and Zero Trust.'}
    ]},
  { id:'03.2', num:'03.2', title:'Why RBAC won the enterprise', minutes:8,
    dek:'RBAC became the default for a reason: it maps to how organizations actually think — in jobs, not in individual permissions. Here\'s the anatomy.',
    concept:`<p>Before RBAC, admins granted permissions to individuals one by one. With 5,000 employees and 200 systems, that's millions of direct grants — impossible to audit, impossible to clean up. RBAC fixed this by adding a layer of indirection.</p>
    <div class="keyterm"><div class="kt-label">The RBAC chain</div><div class="kt-term">User → Role → Permission</div>Users are assigned roles. Roles contain permissions. A user's effective access is the union of all permissions from all their roles. Change the role, and everyone in it changes at once.</div>
    <h3>The three RBAC objects</h3>
    <ul><li><b>Permission</b> — a single allowed operation: <code>invoices:approve</code>, <code>reports:read</code>.</li>
    <li><b>Role</b> — a named bundle of permissions that maps to a job function: "AP Clerk", "Sales Manager".</li>
    <li><b>Assignment</b> — linking a user to a role.</li></ul>
    <h3>Why it scales</h3>
    <p>When a new analyst joins, you don't hand-pick 40 permissions — you assign the "Analyst" role. When the analyst team needs a new permission, you add it to the role <i>once</i> and all 50 analysts get it. When someone leaves the team, you remove the role and all its permissions vanish together. This is the difference between governable and ungovernable access.</p>
    <div class="callout tip"><span class="ic">💡</span><div><b>Design rule:</b> roles should map to <b>job functions</b>, not to individual people. "finance-analyst" is a good role; "amys-access" is an anti-pattern that recreates the per-user mess RBAC was meant to solve.</div></div>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>Role explosion</b> is RBAC's failure mode: when every tiny variation spawns a new role ("analyst-east-readonly-tempcontractor"), you can end up with more roles than users. Good role design keeps the catalog small and meaningful.</div></div>`,
    example:`<p>Here's a small role catalog and how one user's effective permissions resolve from the roles they hold.</p>
    <div class="example-wrap"><div class="example-label">Worked example · resolving effective permissions</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">rbac-resolve</div></div>
    <div class="console-body"><div class="mono-out">ROLE CATALOG
  reporting-analyst : reports:read, reports:export, dashboard:view
  invoice-clerk     : invoices:read, invoices:create

USER amy → roles: [reporting-analyst, invoice-clerk]

effective permissions (union):
  reports:read · reports:export · dashboard:view · invoices:read · invoices:create

check: amy can invoices:approve?  <span style="color:#f87171">NO</span> — no role grants it
check: amy can reports:export?    <span style="color:#34d399">YES</span> — via reporting-analyst</div></div></div>
    <p>The user's access is just the <b>union</b> of their roles' permissions — nothing more. To give Amy approval rights, you'd assign a role that contains <code>invoices:approve</code>; you would never attach the permission to Amy directly. In the lab you'll build exactly this kind of assignment.</p></div>`,
    lab:{ kind:'rbac', id:'03.2',
      title:'Assign the right roles',
      objective:'A new marketing analyst must be able to <code>campaigns:read</code>, <code>campaigns:edit</code>, and <code>analytics:view</code> — but must <b>not</b> be able to <code>campaigns:delete</code> or <code>billing:write</code>. Assign roles from the catalog so they have exactly the access they need and nothing dangerous.',
      intro:'Toggle roles onto the user. The checker confirms the required access works AND that forbidden actions are correctly denied — real least-privilege role assignment.',
      roles:[
        {name:'campaign-viewer', perms:['campaigns:read','analytics:view']},
        {name:'campaign-editor', perms:['campaigns:edit'], inherits:['campaign-viewer']},
        {name:'campaign-admin', perms:['campaigns:delete','billing:write'], inherits:['campaign-editor']}
      ],
      assignable:['campaign-viewer','campaign-editor','campaign-admin'],
      target:{ can:['campaigns:read','campaigns:edit','analytics:view'], cannot:['campaigns:delete','billing:write'] }},
    quiz:[
      {q:'The core RBAC chain is:',
       o:['User → File → Network','User → Role → Permission','Permission → User → File','Role → Network → User'],a:1,
       e:'Users get roles; roles carry permissions. This indirection lets you manage access by job function instead of by individual grant.'},
      {q:'A user\'s effective permissions are:',
       o:['The intersection of their roles','The union of all permissions from all their roles','Only their first role','Decided by the resource owner'],a:1,
       e:'Effective access is the union — every permission from every assigned role combines. This is why an extra role can silently over-privilege someone.'},
      {q:'Which is a well-designed role?',
       o:['"amys-special-access"','"finance-analyst"','"temp-fix-2023"','"role-7"'],a:1,
       e:'Roles should map to job functions, not individuals or one-offs. Per-person roles recreate the unmanageable mess RBAC exists to prevent.'},
      {q:'"Role explosion" refers to:',
       o:['Roles being deleted','So many narrow roles that the catalog becomes unmanageable','Users logging in too often','Permissions expiring'],a:1,
       e:'When every minor variation spawns a new role, you can end up with more roles than users — RBAC\'s classic failure mode. Keep roles broad and meaningful.'}
    ]},
  { id:'03.3', num:'03.3', title:'Role hierarchies & inheritance', minutes:9,
    dek:'Roles can contain other roles. Done well, inheritance keeps your catalog small and logical. Done badly, it hides dangerous access in plain sight.',
    concept:`<p>Real role catalogs use <b>hierarchy</b>: senior roles inherit everything from junior roles, then add a little more. This mirrors org structure and avoids repeating permissions.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Role Inheritance</div>A role can include (inherit) one or more other roles, automatically gaining all their permissions. A "Manager" role might inherit "Employee", adding approval rights on top.</div>
    <h3>How inheritance resolves</h3>
    <p>When you resolve a user's access, you walk the <b>entire inheritance chain</b>, collecting permissions from every role reachable from the ones they're assigned. This is <b>transitive</b>: if Senior inherits Mid, and Mid inherits Junior, then Senior gets Junior's permissions too — even though it never mentions Junior directly.</p>
    <div class="analogy"><div class="al">Think of it like</div>Russian nesting dolls. Open the "Director" doll and inside is the "Manager" doll; open that and inside is the "Employee" doll. A Director holds everything in every smaller doll — automatically. You don't re-list employee permissions on the Director role; they're inherited.</div>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The hidden-access trap:</b> inheritance makes effective access <i>non-obvious</i>. A role might look harmless ("team-lead") but inherit a chain that ends in "prod-deploy". You must <b>resolve the full chain</b> to know what a role really grants. Attackers and auditors both look for permissions buried deep in inheritance.</div></div>
    <h3>Why this matters for your career</h3>
    <p>"Why can this user do X?" is one of the most common questions you'll answer. The answer is almost always somewhere in the inheritance chain. Being able to trace it — manually or with a tool — is a core IAM skill.</p>`,
    example:`<p>Watch a deep inheritance chain resolve. The user holds only <i>one</i> role, but inherits three levels of permissions.</p>
    <div class="example-wrap"><div class="example-label">Worked example · walking the inheritance chain</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">inheritance-trace</div></div>
    <div class="console-body"><div class="mono-out">CATALOG
  employee   : login, directory:read
  team-lead  : reviews:write          inherits → employee
  eng-manager: prod:deploy             inherits → team-lead

USER jordan → roles: [eng-manager]   (just one!)

resolve chain:
  eng-manager → prod:deploy
    ↳ inherits team-lead → reviews:write
        ↳ inherits employee → login, directory:read

effective: prod:deploy · reviews:write · login · directory:read
<span style="color:#fbbf24">⚠ jordan can prod:deploy — granted 2 levels down from a role named "eng-manager"</span></div></div></div>
    <p>If someone asked "does Jordan have production deploy access?" the role name alone wouldn't tell you — you'd have to walk the chain. In the lab, you'll assign a role and confirm the inherited permissions resolve exactly as intended without leaking anything extra.</p></div>`,
    lab:{ kind:'rbac', id:'03.3',
      title:'Build a clean role hierarchy',
      objective:'A <b>team lead</b> needs everything an <b>employee</b> has, plus <code>reviews:write</code> — but must <b>not</b> get <code>prod:deploy</code> (that\'s manager-only). Assign the role that inherits correctly without leaking the deploy permission.',
      intro:'Use inheritance to your advantage: pick the role whose chain gives exactly employee + reviews, stopping short of manager.',
      roles:[
        {name:'employee', perms:['login','directory:read']},
        {name:'team-lead', perms:['reviews:write'], inherits:['employee']},
        {name:'eng-manager', perms:['prod:deploy'], inherits:['team-lead']}
      ],
      assignable:['employee','team-lead','eng-manager'],
      target:{ can:['login','directory:read','reviews:write'], cannot:['prod:deploy'] }},
    quiz:[
      {q:'Role inheritance means a role automatically gains:',
       o:['A new name','All permissions of the roles it inherits','Fewer permissions','A higher price'],a:1,
       e:'An inheriting role absorbs all permissions of the roles below it in the chain, so you define shared permissions once and build up.'},
      {q:'Inheritance is transitive. If Senior inherits Mid and Mid inherits Junior, Senior has:',
       o:['Only Mid\'s permissions','Junior\'s permissions too, even without naming Junior','No permissions','Only its own permissions'],a:1,
       e:'Transitivity means permissions flow all the way down the chain. Senior effectively holds Junior\'s permissions through Mid.'},
      {q:'Why is deep inheritance a security concern?',
       o:['It\'s slow','Effective access becomes non-obvious — dangerous permissions can hide several levels down','It uses more disk','It logs out users'],a:1,
       e:'A benign-looking role can inherit a chain ending in powerful permissions. You must resolve the full chain to know true access — a favorite hiding spot for risk.'},
      {q:'To answer "why can this user do X?", you most often need to:',
       o:['Reset their password','Trace their role inheritance chain','Check the weather','Reinstall the app'],a:1,
       e:'Effective access usually traces back through inherited roles. Walking that chain is a core, everyday IAM troubleshooting skill.'}
    ]},
  { id:'03.4', num:'03.4', title:'ABAC & policy-based access', minutes:9,
    dek:'When roles aren\'t enough, attributes take over. ABAC powers conditional access, Zero Trust, and the fine-grained policies you\'ll write on the job.',
    concept:`<p>RBAC answers "what role do you have?" But some decisions need more: <i>where</i> are you, on <i>what device</i>, at <i>what time</i>, accessing <i>how sensitive</i> a resource? That's where <b>ABAC</b> takes over.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">ABAC — Attribute-Based Access Control</div>Access is decided by evaluating <b>rules over attributes</b>: of the subject (department, clearance), the resource (sensitivity, owner), the action (read vs delete), and the environment (time, location, device, risk).</div>
    <h3>The shape of an ABAC policy</h3>
    <p>An ABAC policy is a set of rules, each with an <b>effect</b> (allow/deny) and <b>conditions</b> over attributes. A typical evaluation: collect all matching rules, and — exactly like AWS IAM and most engines — <b>explicit deny overrides allow</b>, with <b>default deny</b> if nothing matches.</p>
    <div class="callout tip"><span class="ic">💡</span><div><b>RBAC and ABAC aren't rivals</b> — modern systems layer them. RBAC handles the coarse "what job are you" grant; ABAC adds fine conditions on top ("...but only from a managed device during business hours"). Entra Conditional Access is literally ABAC sitting on top of RBAC groups.</div></div>
    <h3>Why ABAC is the future</h3>
    <p><b>Zero Trust</b> — the dominant security model — is fundamentally ABAC: never trust by network location alone; evaluate every request against live attributes (identity, device health, risk score) and decide dynamically. As you move up in IAM, you'll write more policy and assign fewer static roles.</p>
    <div class="callout warn"><span class="ic">⚠️</span><div>ABAC's power is also its danger: expressive rules can interact in surprising ways. A poorly-ordered or overly-broad rule can silently allow or block far more than intended. Always test policies against concrete request cases — which is exactly what the lab makes you do.</div></div>`,
    example:`<p>Here's an ABAC policy and how it decides three different requests. Watch deny-override and default-deny in action.</p>
    <div class="example-wrap"><div class="example-label">Worked example · evaluating an ABAC policy</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">abac-eval</div><div class="chip">ABAC</div></div>
    <div class="console-body"><div class="mono-out">POLICY
  [allow] when dept=Finance
  [deny]  when location=offshore        <span style="color:#5c6b80"># deny overrides</span>

req1: {dept:Finance, location:hq}        → allow matches, no deny → <span style="color:#34d399">ALLOW</span>
req2: {dept:Finance, location:offshore}  → allow AND deny match → <span style="color:#f87171">DENY</span> (deny wins)
req3: {dept:Sales,   location:hq}        → nothing matches → <span style="color:#f87171">DENY</span> (default)</div></div></div>
    <p>Request 2 is the key lesson: even though the user is in Finance (which is allowed), the offshore-location deny rule overrides it. This deny-override + default-deny pattern is nearly universal across policy engines — learn it once, apply it everywhere. You'll author a policy like this in the lab.</p></div>`,
    lab:{ kind:'abac', id:'03.4',
      title:'Author an ABAC policy',
      objective:'Write a policy for a sensitive HR app: <b>allow</b> access when <code>dept</code> is <code>HR</code>, but <b>deny</b> whenever the <code>device</code> is <code>unmanaged</code> (even for HR). Everyone else gets default-deny.',
      intro:'Edit the JSON policy so all four test requests resolve correctly. Remember: deny overrides allow.',
      starter:`[
  { "effect": "allow", "when": { "dept": "HR" } }
]`,
      tests:[
        {label:'HR on a managed laptop', req:{dept:'HR',device:'managed'}, want:'ALLOW'},
        {label:'HR on an unmanaged personal phone', req:{dept:'HR',device:'unmanaged'}, want:'DENY'},
        {label:'Sales on a managed laptop', req:{dept:'Sales',device:'managed'}, want:'DENY'},
        {label:'HR with no device info', req:{dept:'HR',device:'unmanaged'}, want:'DENY'}
      ]},
    quiz:[
      {q:'ABAC decides access based on:',
       o:['Only the user\'s role','Attributes of subject, resource, action, and environment','The resource owner\'s mood','Network cables'],a:1,
       e:'ABAC evaluates rules over many attributes — user, resource, action, and context like time/location/device — making it far more expressive than roles alone.'},
      {q:'In a typical policy engine, when an allow rule and a deny rule both match:',
       o:['Allow wins','Deny wins','It errors','The newer rule wins'],a:1,
       e:'Explicit deny overrides allow — a near-universal rule in AWS IAM, ABAC engines, and conditional access. Combined with default-deny, it makes policies fail safe.'},
      {q:'Entra Conditional Access is best described as:',
       o:['Pure MAC','ABAC layered on top of RBAC groups','DAC for files','A password manager'],a:1,
       e:'Conditional Access evaluates attributes (location, device, risk) on top of group/role membership — ABAC enhancing RBAC, the modern layered pattern.'},
      {q:'Zero Trust is fundamentally aligned with which model?',
       o:['DAC','MAC','ABAC','None'],a:2,
       e:'Zero Trust evaluates every request dynamically against live attributes (identity, device health, risk) rather than trusting network location — the essence of ABAC.'}
    ]}
  ]},

/* ===================== MODULE 04 — JOINER-MOVER-LEAVER ===================== */
{ id:'M04', num:'04', title:'Joiner-Mover-Leaver Lifecycle', sub:'5 lessons · the JML engine · HRIS',
  blurb:'The identity lifecycle that runs every enterprise: birthright access for joiners, entitlement recalculation for movers, and airtight deprovisioning for leavers. The bread-and-butter of IAM operations.',
  lessons:[
  { id:'04.1', num:'04.1', title:'The lifecycle & birthright access', minutes:8,
    dek:'Every identity is born, changes, and dies inside your systems. JML is the framework that automates each transition — starting with the joiner.',
    concept:`<p>People join, change roles, and leave constantly. Doing access by hand for each event doesn't scale and creates security gaps. <b>Joiner-Mover-Leaver (JML)</b> is the lifecycle framework that automates it.</p>
    <div class="keyterm"><div class="kt-label">The framework</div><div class="kt-term">Joiner · Mover · Leaver</div><b>Joiner:</b> a new identity needs initial access. <b>Mover:</b> an existing identity changes (team, role, location) and access must be recalculated. <b>Leaver:</b> an identity departs and all access must be removed.</div>
    <h3>Birthright access</h3>
    <p>When someone joins, they get <b>birthright access</b> — the baseline entitlements everyone in their situation automatically receives, with no ticket required.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Birthright Access</div>The default entitlements automatically granted based on who someone is — their department, role, location. A new engineer is "born" with email, SSO, the VPN, GitHub, and the dev environment.</div>
    <h3>How it's driven: attributes from the source of truth</h3>
    <p>Birthright rules key off <b>identity attributes</b> that flow from an authoritative <b>source of truth</b> — usually the HR system (Workday, SAP SuccessFactors). HR says "new hire, Engineering, San Francisco, full-time," and the IAM system computes the birthright entitlement set from rules like <i>"Engineering → GitHub + Jira + AWS-dev."</i></p>
    <div class="callout tip"><span class="ic">💡</span><div><b>HR is usually the source of truth for identity.</b> The golden flow is: HR record → identity provider (Okta/Entra) → downstream apps via SCIM. Get the attributes right at the source and the right access flows automatically. Get them wrong and the error propagates everywhere.</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> "Day-one readiness" is a real KPI. Can a new hire log in and be productive the moment they start? Good birthright automation makes day one seamless; bad automation means new hires file access tickets for a week.</div></div>`,
    example:`<p>A new engineer's joiner event fires. Watch birthright rules compute their starting access from HR attributes.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a joiner provisioning</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">joiner · onboard</div><div class="chip">JML</div></div>
    <div class="console-body"><div class="mono-out">HR source of truth → new identity:
  name=Sam Rivera  status=active  dept=Engineering  level=ic

birthright rules evaluated:
  status=active        → okta:sso, email:mailbox, vpn:base   <span style="color:#34d399">✓</span>
  dept=Engineering     → github:write, jira:user, aws:dev    <span style="color:#34d399">✓</span>
  level=manager?       → (no) approvals:approve              <span style="color:#5c6b80">skip</span>

PROVISION via SCIM → 6 entitlements created. Day-one ready.</div></div></div>
    <p>Sam never filed a ticket. The HR attributes drove a rule set that produced exactly the right starting access. In the lab you'll compute a joiner's birthright set yourself.</p></div>`,
    lab:{ kind:'jml', id:'04.1',
      title:'Onboard a new joiner',
      objective:'A new <b>Finance</b> hire (active, individual contributor) is starting. Determine the exact <b>birthright entitlements</b> to provision. Tag everything that should be provisioned — and nothing that shouldn\'t.',
      intro:'This is a joiner: current access is empty. Provision exactly the birthright set for an active Finance IC.',
      current:[],
      newAttrs:{status:'active',dept:'Finance',level:'ic'},
      distractors:['github:write','aws:dev','approvals:approve','salesforce:rep']},
    quiz:[
      {q:'"Birthright access" is:',
       o:['Access you pay extra for','Default entitlements automatically granted based on who someone is','Admin access for everyone','Temporary access'],a:1,
       e:'Birthright access is the baseline set granted automatically from attributes like department and role — no ticket needed. It powers day-one readiness.'},
      {q:'The authoritative source of truth for identity attributes is usually:',
       o:['The firewall','The HR system','The coffee machine','The user\'s laptop'],a:1,
       e:'HR systems (Workday, SuccessFactors) typically own the authoritative identity record. Attributes flow HR → IdP → apps, driving birthright access.'},
      {q:'Birthright rules compute access from:',
       o:['Random selection','Identity attributes (department, role, status, location)','The user\'s password','Network speed'],a:1,
       e:'Rules key off attributes — e.g., "Engineering → GitHub + Jira." Correct attributes at the source produce correct access downstream.'},
      {q:'The three stages of the identity lifecycle are:',
       o:['Create, Read, Delete','Joiner, Mover, Leaver','Login, Logout, Lockout','Start, Stop, Pause'],a:1,
       e:'Joiner (new), Mover (change), Leaver (departure) — the JML framework that structures all identity lifecycle automation.'}
    ]},
  { id:'04.2', num:'04.2', title:'Movers: recalculation & creep', minutes:9,
    dek:'The mover is where access goes wrong. Add the new, remove the old — miss the second half and you breed the privilege creep that haunts every audit.',
    concept:`<p>The <b>mover</b> event — someone changes department, role, or location — is the hardest and most error-prone part of JML, because it requires <i>two</i> actions and everyone remembers only the first.</p>
    <div class="keyterm"><div class="kt-label">The mover rule</div><div class="kt-term">Recalculate, don't just add</div>When an identity changes, recompute its <b>entire</b> entitlement set from the new attributes, then <b>both</b> grant what's newly needed <b>and revoke what's no longer appropriate</b>. The revoke half is the half that gets skipped.</div>
    <h3>Why the revoke gets missed</h3>
    <p>When Amy moves from Engineering to Finance, granting her Finance access is obvious — she needs it to do her new job, and she'll complain if it's missing. But <b>removing</b> her old Engineering access (GitHub, AWS-dev) is invisible: nothing breaks, no one complains, so it lingers. Multiply across a career of moves and you get an employee who can touch half the company.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Privilege Creep</div>The gradual accumulation of access as an identity moves through roles without shedding old entitlements. The single most common audit finding in identity governance.</div>
    <div class="analogy"><div class="al">Think of it like</div>Moving apartments but keeping every old key. Each move, you get the new key (you need it) but never return the old one (no one asks). After five moves you're carrying keys to five homes you no longer live in. A mover done right makes you hand back the old key.</div>
    <div class="callout danger"><span class="ic">🚨</span><div><b>Mover gaps create SoD violations.</b> Someone who moves from "creates invoices" to "approves invoices" — and keeps both — can now commit fraud single-handedly. Clean mover recalculation is a primary defense against Separation-of-Duties conflicts (Module 06).</div></div>`,
    example:`<p>Amy moves from Engineering to Finance. Watch the recalculation produce <i>both</i> a provision set and — critically — a deprovision set.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a mover recalculation</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">mover · dept change</div><div class="chip">JML</div></div>
    <div class="console-body"><div class="mono-out">amy: dept Engineering → Finance (still active, ic)

current access:
  okta:sso, email:mailbox, vpn:base, github:write, jira:user, aws:dev

recalculated target (active + Finance):
  okta:sso, email:mailbox, vpn:base, sap:fi-display, concur:user, workday:reader

diff:
  <span style="color:#34d399">PROVISION  </span> sap:fi-display, concur:user, workday:reader
  <span style="color:#f87171">DEPROVISION</span> github:write, jira:user, aws:dev     ← the half that's usually skipped
  KEEP        okta:sso, email:mailbox, vpn:base</div></div></div>
    <p>If you only ran the green provision lines, Amy would carry her old engineering access into Finance forever — textbook privilege creep, and a potential SoD landmine. In the lab you'll compute both halves of a real mover.</p></div>`,
    lab:{ kind:'jml', id:'04.2',
      title:'Process a mover correctly',
      objective:'An employee is moving from <b>Engineering</b> to <b>Sales</b> (still active, IC). Recalculate their access: provision the new Sales birthright AND deprovision the old Engineering entitlements. Get <b>both</b> sets right.',
      intro:'This is the mover that matters. Add the new, remove the old, keep the universal baseline. Both the provision and deprovision sets must be exactly correct.',
      current:['okta:sso','email:mailbox','vpn:base','github:write','jira:user','aws:dev'],
      newAttrs:{status:'active',dept:'Sales',level:'ic'},
      distractors:['sap:fi-display']},
    quiz:[
      {q:'A mover event requires you to:',
       o:['Only add new access','Recalculate: add new access AND remove access that\'s no longer appropriate','Only remove access','Reset the password'],a:1,
       e:'Movers require full recalculation — provisioning the new and deprovisioning the old. Skipping the revoke is the root of privilege creep.'},
      {q:'Why is the "revoke old access" half of a mover usually skipped?',
       o:['It\'s technically impossible','Nothing breaks and no one complains when old access lingers','It\'s illegal','It costs money'],a:1,
       e:'Missing new access generates complaints; lingering old access is invisible. That asymmetry is why creep accumulates silently.'},
      {q:'Privilege creep is:',
       o:['Access expiring too fast','Gradual accumulation of entitlements across role changes','A type of malware','A login delay'],a:1,
       e:'Creep is the buildup of stale entitlements as people move without shedding old access — the most common identity-governance audit finding.'},
      {q:'Clean mover processing is a primary defense against:',
       o:['Slow networks','Separation-of-Duties violations','Disk failure','Spam email'],a:1,
       e:'Keeping incompatible old + new entitlements (e.g., create + approve invoices) creates SoD conflicts. Proper recalculation removes the old, preventing toxic combinations.'}
    ]},
  { id:'04.3', num:'04.3', title:'Leavers: airtight deprovisioning', minutes:8,
    dek:'The leaver is the highest-stakes event in IAM. Miss one account and you\'ve left a door open for someone who no longer works here.',
    concept:`<p>When someone leaves, every scrap of their access must disappear — promptly and completely. The <b>leaver</b> is where security failures become headlines.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Deprovisioning</div>Removing or disabling an identity's access across all systems when it's no longer needed. For a leaver, the target entitlement set is <b>empty</b> — everything comes off.</div>
    <h3>Disable first, then delete</h3>
    <p>Best practice is <b>disable immediately</b> (instantly cuts access, preserves data and audit trail), then delete later per retention policy. Immediate disablement is what stops a disgruntled departing employee — or an attacker who phished them on the way out — from using the account.</p>
    <h3>The two killers: speed and completeness</h3>
    <ul><li><b>Speed:</b> access should be cut at the moment of termination — ideally automatically when HR flips the status. A manual, days-later process is a window of risk.</li>
    <li><b>Completeness:</b> every account, in every system, plus owned <b>non-human identities</b> (service accounts, API keys, tokens). The lingering account is almost always one that wasn't connected to the automated flow.</li></ul>
    <div class="callout danger"><span class="ic">🚨</span><div><b>The classic breach:</b> an employee is "offboarded," their email is disabled, everyone moves on — but their access to a cloud console, a SaaS app not wired to SCIM, or a personal service account survives. Months later that orphaned access is used (by them or an attacker). This is one of the most cited findings in breach reports.</div></div>
    <div class="callout tip"><span class="ic">💡</span><div><b>Verify, don't trust.</b> Good IAM engineers confirm deprovisioning actually completed in every system — they don't assume the automation worked. A deprovision event that silently failed against one app is exactly what audits and attackers find.</div></div>`,
    example:`<p>A termination fires. The target access set is empty, so everything is deprovisioned — and one failure is caught.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a leaver deprovisioning</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">leaver · offboard</div><div class="chip">JML</div></div>
    <div class="console-body"><div class="mono-out">HR status → terminated. target entitlements = <span style="color:#f87171">{ } (empty)</span>

current access:
  okta:sso, email:mailbox, vpn:base, salesforce:rep, gong:user

DEPROVISION ALL:
  okta:sso       <span style="color:#34d399">disabled ✓</span>
  email:mailbox  <span style="color:#34d399">disabled ✓</span>
  vpn:base       <span style="color:#34d399">disabled ✓</span>
  salesforce:rep <span style="color:#34d399">disabled ✓</span>
  gong:user      <span style="color:#f87171">CONNECTOR FAILED ✗ — flagged for manual removal</span>

<span style="color:#fbbf24">4 of 5 cut automatically. Verify the 5th by hand — do NOT assume it's done.</span></div></div></div>
    <p>The empty target set means a leaver is conceptually simple — remove everything — but operationally unforgiving: one missed system is one open door. In the lab you'll process a leaver and confirm the full deprovision set.</p></div>`,
    lab:{ kind:'jml', id:'04.3',
      title:'Offboard a leaver completely',
      objective:'An employee has been <b>terminated</b>. Their access must be fully removed. Determine the complete <b>deprovision set</b> — for a leaver, that\'s everything they currently hold.',
      intro:'This is a leaver: the target set is empty. Deprovision every current entitlement. Missing even one leaves a door open.',
      current:['okta:sso','email:mailbox','vpn:base','salesforce:rep','gong:user'],
      newAttrs:{status:'terminated'},
      distractors:[]},
    quiz:[
      {q:'For a leaver, the target entitlement set is:',
       o:['Larger than before','Empty — all access is removed','Unchanged','Just email'],a:1,
       e:'A departing identity should end with zero access. Everything they held gets deprovisioned.'},
      {q:'Best practice for a leaver is to:',
       o:['Delete everything instantly with no record','Disable immediately, then delete later per retention policy','Wait a month','Only change the password'],a:1,
       e:'Immediate disablement cuts access at once while preserving data and audit trails; deletion follows later under retention rules.'},
      {q:'The most common cause of a lingering leaver account is:',
       o:['Strong passwords','A system not connected to the automated deprovisioning flow (e.g., no SCIM)','Too much MFA','Fast networks'],a:1,
       e:'Apps outside the automated flow don\'t receive the deprovision event, so their accounts survive — the classic orphaned-access breach.'},
      {q:'Beyond human accounts, a complete leaver process must also address:',
       o:['Their parking spot','Owned non-human identities — service accounts, API keys, tokens','Their lunch order','The office wifi'],a:1,
       e:'Departing employees often own service accounts and keys. Those non-human identities must be reassigned or killed, or they become orphaned privileged access.'}
    ]},
  { id:'04.4', num:'04.4', title:'Building the JML automation', minutes:9,
    dek:'Tie it together: the event-driven pipeline from HR to every app, why it beats tickets, and how to design it so it fails safe.',
    concept:`<p>You've seen each event. Now the system that runs them: an <b>event-driven lifecycle pipeline</b> that turns HR changes into access changes automatically.</p>
    <div class="keyterm"><div class="kt-label">The pipeline</div><div class="kt-term">HR → IdP → Apps</div>The HR system emits lifecycle events (hire, transfer, terminate). The identity provider computes the target entitlements from rules and pushes changes to every connected app via SCIM. One source of truth, automated fan-out.</div>
    <h3>Event-driven beats ticket-driven</h3>
    <p>The old way: a manager files a ticket, an admin manually grants access days later. The modern way: HR flips a status and the right things happen in seconds, consistently, with a full audit log. Automation is faster, more consistent, and — crucially — <b>more secure</b>, because it removes the human delay and human forgetfulness that create gaps (especially on leavers).</p>
    <h3>Designing it to fail safe</h3>
    <ul><li><b>Source of truth discipline:</b> attributes must be correct and current in HR; everything downstream depends on it.</li>
    <li><b>Idempotent recalculation:</b> on any event, recompute the <i>full</i> target set and diff — don't try to track incremental deltas, which drift.</li>
    <li><b>Verify and alert:</b> when a downstream push fails (the offline connector), flag it loudly for manual follow-up. Silent failure is the enemy.</li>
    <li><b>Fail safe on leavers:</b> if anything is uncertain during a termination, err toward <i>removing</i> access, not keeping it.</li></ul>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> this exact pipeline is what tools like Okta Lifecycle Management, Okta Workflows, and SailPoint IdentityNow implement. You'll spend real time configuring birthright rules, mover recalculation, and connector health. The mental model you just built <i>is</i> the job.</div></div>
    <div class="callout tip"><span class="ic">💡</span><div>This lesson's practice is a knowledge check — you've already done the hands-on provisioning across the joiner, mover, and leaver labs. Here you prove you understand the system that ties them together.</div></div>`,
    example:`<p>The full pipeline, one diagram. Each lifecycle event flows from the HR source of truth out to every app.</p>
    <div class="example-wrap"><div class="example-label">Worked example · the lifecycle pipeline</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">jml-pipeline</div></div>
    <div class="console-body"><div class="mono-out"> [ HR system ]          source of truth (Workday)
      │ emits event: hire / transfer / terminate
      ▼
 [ Identity Provider ]   computes target entitlements from rules
      │ Okta / Entra / SailPoint              (recalculate full set + diff)
      ▼ SCIM push (create / update / disable)
 ┌────────────┬────────────┬────────────┐
 ▼            ▼            ▼            ▼
Salesforce  GitHub      AWS         Slack      ... every connected app
   ✓           ✓          ✓        <span style="color:#f87171">✗ failed → alert</span>

one source of truth → automated, audited fan-out → verify failures</div></div></div>
    <p>This is the architecture behind every well-run enterprise. The HR event is the trigger; the IdP is the brain; SCIM is the muscle; verification is the safety net.</p></div>`,
    lab:{ kind:'quizonly', id:'04.4',
      title:'Design-review the pipeline',
      objective:'No console here — you\'ve already built joiners, movers, and leavers hands-on. Answer every question correctly to prove you understand the automation that ties them together.',
      intro:''},
    quiz:[
      {q:'The modern identity lifecycle pipeline flows:',
       o:['App → HR → IdP','HR (source of truth) → IdP → Apps via SCIM','User → User → User','Firewall → HR → User'],a:1,
       e:'HR emits events, the IdP computes target access, and changes fan out to apps via SCIM. One authoritative source, automated downstream.'},
      {q:'Why is event-driven automation more secure than ticket-driven access?',
       o:['It\'s prettier','It removes human delay and forgetfulness, especially on leavers','It uses less electricity','It needs no source of truth'],a:1,
       e:'Manual processes introduce delay and missed steps — the gaps that create lingering access. Automation acts immediately and consistently with an audit trail.'},
      {q:'For reliability, lifecycle recalculation should be:',
       o:['Based on tracking incremental deltas by hand','Idempotent — recompute the full target set and diff each time','Skipped for movers','Run once a year'],a:1,
       e:'Recomputing the entire target set and diffing avoids the drift that accumulates when you try to track incremental changes. It\'s self-correcting.'},
      {q:'When a downstream SCIM push fails during deprovisioning, you should:',
       o:['Ignore it','Flag it loudly and verify manual removal — never assume success','Delete the HR record','Email the whole company'],a:1,
       e:'Silent failure leaves access in place. Good pipelines alert on failures and engineers verify completion — trust but verify, especially on leavers.'}
    ]},
  { id:'04.5', num:'04.5', title:'How the HRIS pushes lifecycle events', minutes:10,
    dek:'You modeled the JML plan abstractly. Now see the actual mechanism: how an HR system fires hire/transfer/leave/terminate events that drive the IdP and Active Directory.',
    concept:`<p>Lessons 04.1\u201304.4 taught the joiner-mover-leaver <i>logic</i> \u2014 what access should change on each event. This lesson connects that logic to its real trigger: the <b>HR system pushing events downstream</b>. (Module 10 goes deep on the vendor wiring; here we focus on the lifecycle mechanics.)</p>
    <div class="keyterm"><div class="kt-label">Core idea</div><div class="kt-term">The HRIS fires; the IdP and AD react</div>Every J-M-L event begins as an HR transaction (a hire, a transfer, a termination in Workday/BambooHR). The HRIS pushes that event to the identity provider, which translates it into concrete operations \u2014 <b>create, update, enable, disable</b> \u2014 in itself, in <b>Active Directory</b>, and in downstream apps. The HR event is the cause; the provisioning operations are the effect.</div>
    <h3>Event \u2192 operations, for each lifecycle stage</h3>
    <ul>
      <li><b>Hire</b> \u2192 create the identity and AD account (in the right OU), staged disabled until the start date. The joiner.</li>
      <li><b>Transfer</b> \u2192 update attributes (dept/title/manager), move OU, and <b>recalculate access \u2014 grant new, revoke old</b>. The mover, and the step most often half-done.</li>
      <li><b>Leave of absence</b> \u2192 disable the account for the duration, retaining the identity.</li>
      <li><b>Return from leave</b> \u2192 re-enable the same identity \u2014 no new account.</li>
      <li><b>Termination</b> \u2192 disable at the IdP immediately (cut SSO), then deprovision downstream and disable the AD account. The leaver.</li>
    </ul>
    <h3>Where Active Directory sits depends on the topology</h3>
    <p>One nuance worth flagging now (and covered in depth in Module 10): <b>whether AD comes before or after the cloud IdP depends on the organization.</b> In the older <b>AD-first / hybrid</b> model, HR data lands in Active Directory first and the cloud IdP syncs up from it \u2014 AD is the hub. In the modern <b>IdP-first / HR-driven</b> model, HR feeds the IdP directly and AD is a downstream target the IdP writes into. Either way the <b>HRIS is the ultimate source of truth</b>; what differs is which directory is the hub in the middle. The lifecycle logic in this module applies to both \u2014 Module 10 covers the wiring of each.</p>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>The mover is where it leaks:</b> a transfer that only <i>adds</i> the new department\u2019s access without <i>removing</i> the old is how privilege creep and Separation-of-Duties violations (Module 06) are born. A correct HRIS-driven mover recalculates to the new role\u2019s entitlements and revokes what no longer applies \u2014 the same point from 04.2, now enforced by the HR event itself.</div></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the field:</b> the highest-value thing this automation buys you is the <b>instant, authoritative termination</b>. When HR marks someone terminated, the event \u2014 ideally in real time \u2014 disables their access everywhere without anyone filing a ticket. That single flow closes the most dangerous gap in all of identity: the leaver who keeps access.</div></div>`,
    example:`<p>The same worker across their whole lifecycle, each HR event producing concrete IdP and AD operations. This is 04.1\u201304.4\u2019s logic, now event-driven.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 one worker, every event</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f59e0b"></i><i style="background:#22d3ee"></i><i style="background:#3b82f6"></i></div><div class="title">hris events \u2192 idp + ad</div></div>
    <div class="console-body"><div class="mono-out">HIRE       \u2192 IdP: create (disabled until start)  \u2502 AD: create in Sales OU (disabled)
TRANSFER   \u2192 IdP: update dept, <span style="color:#34d399">grant new</span> + <span style="color:#f87171">revoke old</span> \u2502 AD: move OU
LEAVE      \u2192 IdP: disable (suspend)              \u2502 AD: disable
RETURN     \u2192 IdP: re-enable same identity        \u2502 AD: re-enable
TERMINATE  \u2192 IdP: <span style="color:#f87171">disable now</span> + deprovision apps   \u2502 AD: disable

one human, one identity, five HR events \u2014 each fanning out automatically</div></div></div>
    <p>Notice the leaver disables at the IdP <i>first</i> (instant SSO cutoff) before the downstream fan-out, and the mover revokes as well as grants. In the lab you\u2019ll fire these events through a live HRIS pipeline and watch each one\u2019s operations land in the IdP and AD.</p></div>`,
    lab:{ kind:'hrispipeline', id:'04.5', hris:'Workday', idp:'Okta',
      title:'Fire the lifecycle from HR',
      objective:'Drive a worker through their full lifecycle from the HR system. Fire each event \u2014 hire, transfer, leave, return, terminate \u2014 and watch it propagate to the IdP and Active Directory. Process every event to complete the lifecycle.',
      intro:'',
      events:[
        {label:'Hire (pre-hire)', event:{type:'hire', preHire:true}},
        {label:'Transfer (mover)', event:{type:'transfer'}},
        {label:'Leave of absence', event:{type:'leave'}},
        {label:'Return from leave', event:{type:'returnFromLeave'}},
        {label:'Terminate (leaver)', event:{type:'terminate'}}
      ]},
    quiz:[
      {q:'In an HR-driven model, what triggers a joiner-mover-leaver operation?',
       o:['An IT ticket','An HR transaction (hire/transfer/termination) pushed from the HRIS','A user request','A nightly reboot'],a:1,
       e:'The HR event is the authoritative cause; the IdP translates it into create/update/enable/disable operations downstream.'},
      {q:'On a transfer, the operation most commonly left incomplete is:',
       o:['Granting new access','Revoking the old department\u2019s access','Sending email','Creating the account'],a:1,
       e:'Adding new access without removing old is the root of privilege creep and SoD violations \u2014 a correct mover recalculates and revokes.'},
      {q:'Across both HR-provisioning topologies, the ultimate source of truth for worker identity is:',
       o:['Active Directory','The HRIS \u2014 AD is either the hub (AD-first) or a downstream target (IdP-first), but never the original source','The MFA server','The end user'],a:1,
       e:'Whether AD is the hub (AD-first/hybrid) or a target the IdP writes into (IdP-first), the HRIS remains the authoritative origin of worker identity in both models.'},
      {q:'The single most valuable flow HR-driven automation provides is:',
       o:['Prettier dashboards','Instant, authoritative termination that cuts access everywhere with no ticket','Faster Wi-Fi','Cheaper licenses'],a:1,
       e:'An HR-fired termination \u2014 ideally real-time \u2014 closes the most dangerous gap in identity: the leaver who retains access.'}
    ]}
  ]},

/* ===================== MODULE 05 — OKTA IN DEPTH ===================== */
{ id:'M05', num:'05', title:'Okta in Depth', sub:'4 lessons · org · policies · SSO · Workflows',
  blurb:'Hands-on with the market-leading identity platform. How an Okta org is structured, how sign-on policies make real-time access decisions, how app integrations work, and how Workflows automates the lifecycle with no code.',
  lessons:[
  { id:'05.1', num:'05.1', title:'The Okta org & universal directory', minutes:8,
    dek:'Okta is the identity hub a huge share of companies run on. Start with how an org is structured: the directory, groups, and apps.',
    concept:`<p><b>Okta</b> is a cloud identity platform — for many companies, <i>the</i> identity provider that everything else trusts. Learning its structure makes you employable; the concepts transfer directly to Entra ID and Ping.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Okta Org</div>Your company's dedicated Okta tenant (e.g. <code>northwind.okta.com</code>). It holds your users, groups, applications, and policies — the central hub all your apps federate to.</div>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Universal Directory</div>Okta's central store of all users and their attributes (name, email, department, manager, custom fields). It's the profile source that drives group membership and access decisions.</div>
    <h3>The building blocks</h3>
    <ul><li><b>Users</b> — the people (and service accounts), each with a profile of attributes in Universal Directory.</li>
    <li><b>Groups</b> — collections of users. The primary way access is assigned: assign an <i>app</i> to a <i>group</i>, and everyone in the group gets it.</li>
    <li><b>Applications</b> — the SaaS and internal apps integrated for SSO (Salesforce, Slack, AWS…).</li>
    <li><b>Group rules</b> — dynamic membership: "if department = Sales, add to the Sales group automatically." This is RBAC + ABAC in practice.</li></ul>
    <div class="callout tip"><span class="ic">💡</span><div><b>Assign access to groups, not individuals.</b> This is the Okta expression of RBAC. A user joins the "Engineering" group (often automatically via a group rule on their department attribute) and instantly receives every app assigned to that group. Onboarding becomes "put them in the right groups."</div></div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> a healthy Okta org has clean group rules driven by HR attributes, apps assigned to groups (never individuals), and policies layered on top. A messy org has hundreds of one-off individual assignments — the same anti-pattern as per-user roles.</div></div>`,
    example:`<p>Here's how access flows in Okta: an attribute drives a group rule, the group has apps, the user gets SSO to all of them.</p>
    <div class="example-wrap"><div class="example-label">Worked example · attribute → group → apps</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">okta-org · access-flow</div><div class="chip">OKTA</div></div>
    <div class="console-body"><div class="mono-out">user sam.rivera  →  profile.department = "Engineering"

GROUP RULE:  IF user.department == "Engineering"  →  add to group "Engineering"
                                                         <span style="color:#34d399">sam added ✓</span>
GROUP "Engineering" has apps assigned:
   • GitHub        (SAML SSO)
   • Jira          (SAML SSO)
   • AWS           (SAML SSO)

result: sam opens the Okta dashboard and sees GitHub, Jira, AWS —
        one click each, no separate passwords. Assigned by GROUP, not by hand.</div></div></div>
    <p>Change Sam's department in the HR feed and the group rule re-evaluates: the old group (and its apps) drops, the new one applies. That's the Okta engine behind the JML lifecycle you just studied.</p></div>`,
    lab:{ kind:'classify', id:'05.1', mode:'oktaobj',
      title:'Okta object check',
      objective:'Match each thing to the correct Okta object type: <b>User</b>, <b>Group</b>, <b>Application</b>, or <b>Group Rule</b>. Knowing the building blocks is step one to administering an org.',
      intro:'Tag each item. All correct to pass.',
      threeway:['User','Group','Application','Group Rule'],
      items:[
        {t:'sam.rivera, with a profile holding department and manager attributes.',layer:'User'},
        {t:'"Engineering" — a collection that apps get assigned to.',layer:'Group'},
        {t:'Salesforce, integrated for SAML single sign-on.',layer:'Application'},
        {t:'"If department = Sales, add to the Sales group" — evaluated automatically.',layer:'Group Rule'},
        {t:'Slack, appearing as a one-click tile on the user dashboard.',layer:'Application'}
      ]},
    quiz:[
      {q:'An Okta "org" is:',
       o:['A single user','Your company\'s dedicated Okta tenant holding users, groups, apps, and policies','A type of password','A firewall rule'],a:1,
       e:'The org (e.g. northwind.okta.com) is your tenant — the central identity hub everything federates to.'},
      {q:'The recommended way to assign application access in Okta is:',
       o:['To each user individually','To groups, with users placed in groups','By email','Randomly'],a:1,
       e:'Assigning apps to groups (and users to groups, ideally via rules) is the RBAC pattern that keeps an org manageable. Individual assignments are the anti-pattern.'},
      {q:'A group rule like "if department = Sales → add to Sales group" is an example of:',
       o:['Manual provisioning','Dynamic, attribute-driven membership','A password policy','A firewall'],a:1,
       e:'Group rules evaluate user attributes to manage membership automatically — RBAC structure driven by ABAC-style attribute logic.'},
      {q:'Universal Directory is:',
       o:['A public phone book','Okta\'s central store of users and their attributes','A type of VPN','An email server'],a:1,
       e:'Universal Directory holds all user profiles and attributes, which drive group rules and access decisions across the org.'}
    ]},
  { id:'05.2', num:'05.2', title:'Sign-on policies & MFA', minutes:9,
    dek:'The real-time decision engine. Okta evaluates sign-on rules top-down, first match wins — and getting the order right is a genuine skill.',
    concept:`<p>Authenticating a user isn't always allow-or-deny. Okta <b>sign-on policies</b> decide, per sign-in, whether to allow, deny, or <b>step up</b> to MFA — based on who, where, and what device.</p>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Sign-On Policy</div>An ordered list of rules evaluated <b>top-down</b>; the <b>first rule that matches</b> decides the outcome and evaluation stops. Each rule has conditions (group, network zone, device) and an action (allow, deny, or require MFA).</div>
    <h3>First match wins — why order is everything</h3>
    <p>This is the trait that trips people up. Unlike additive permission systems, sign-on policies <b>stop at the first matching rule</b>. A broad "allow anyone" rule placed <i>above</i> a restrictive rule silently defeats it — the restrictive rule never gets evaluated. Rule <b>order</b> is as important as rule content.</p>
    <div class="analogy"><div class="al">Think of it like</div>A bouncer reading a list of door rules in order and acting on the first one that applies to you. If rule #1 says "let everyone in," the bouncer never reaches rule #5 that says "but not banned guests." Put the specific, restrictive rules first; the catch-all last.</div>
    <div class="keyterm"><div class="kt-label">Term</div><div class="kt-term">Network Zone</div>A named set of IP ranges (e.g., "Corporate" = office IPs). Policies use zones to treat trusted and untrusted locations differently — typically requiring MFA off-network.</div>
    <h3>Step-up MFA</h3>
    <p>The most common pattern: allow seamlessly from trusted conditions, but <b>require MFA</b> when risk is higher (off-network, unmanaged device, sensitive app). MFA is the single highest-impact control against account takeover — sign-on policies are where you apply it precisely instead of bluntly.</p>
    <div class="callout warn"><span class="ic">⚠️</span><div><b>The ordering bug in the wild:</b> an admin adds a permissive rule at the top to "fix" a complaint, unknowingly shadowing the security rules below it. Now the whole org skips MFA. Always check rule order, and test sign-ins against the policy — exactly what the lab has you do.</div></div>`,
    example:`<p>Same four rules, two different orders, opposite security outcomes. Watch how moving one rule changes everything.</p>
    <div class="example-wrap"><div class="example-label">Worked example · order changes the verdict</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">sign-on-order</div><div class="chip">OKTA</div></div>
    <div class="console-body"><div class="mono-out">sign-in: employee, OFF-network, managed device

<span style="color:#f87171">BAD ORDER</span>
  1. Allow employees (any)        ← MATCHES FIRST → <span style="color:#f87171">ALLOW, no MFA</span>  ✗ insecure!
  2. Require MFA off-network             (never reached)

<span style="color:#34d399">GOOD ORDER</span>
  1. Require MFA off-network      ← MATCHES FIRST → <span style="color:#34d399">step up to MFA</span>  ✓
  2. Allow employees (any)               (only reached on-network)</div></div></div>
    <p>Identical rules — only the order differs — and one version skips MFA for off-network sign-ins while the other enforces it. This is why "first match wins" must be muscle memory. In the lab you'll reorder a real policy to pass every sign-in test.</p></div>`,
    lab:{ kind:'okta', id:'05.2',
      title:'Order the sign-on policy',
      objective:'Reorder this sign-on policy so every test sign-in resolves correctly: contractors from untrusted networks are <b>denied</b>, anyone off-network must do <b>MFA</b>, employees are <b>allowed</b>, and there\'s a catch-all allow. Remember: first match wins.',
      intro:'Use the arrows to reorder. Put specific/restrictive rules above broad ones. Then test all sign-ins.',
      rules:[
        {name:'Allow employees', ifGroup:'Employees', action:'ALLOW'},
        {name:'Block untrusted contractors', ifGroup:'Contractors', ifZone:'untrusted', action:'DENY'},
        {name:'MFA when off-network', ifZone:'untrusted', action:'MFA'},
        {name:'Catch-all allow', action:'ALLOW'}
      ],
      tests:[
