  /* ---------------- 12.3 ---------------- */
  { id:'12.3', num:'12.3', title:'Python for IAM', minutes:10,
    dek:'The cross-platform glue for identity work, from Okta to CyberArk. Real Python that calls IAM REST APIs and processes the results.',
    concept:`<p><b>Python</b> is the other automation language IAM job descriptions ask for, prized because it talks to <i>everything</i> \u2014 Okta, CyberArk, AWS, custom apps \u2014 through their REST APIs, and excels at the data-wrangling governance work involves (parsing reports, reconciling accounts, generating evidence).</p>
    <div class="keyterm"><div class="kt-label">Core idea</div><div class="kt-term">Python + requests = any IAM API</div>Python\u2019s <code>requests</code> library makes the HTTP calls from 12.1 directly. Authenticate with a token in the header, call the endpoint, read the JSON response. The same three moves work against any IAM platform\u2019s API \u2014 which is why Python is the universal IAM glue, especially for <b>CyberArk automation</b> and cross-system reconciliation.</div>
    <h3>The pattern: headers, request, JSON</h3>
    <div class="codeblock"><div class="cb-label">Python \u00b7 list deactivated Okta users</div><pre>import requests

OKTA = "https://your-org.okta.com/api/v1"
headers = {"Authorization": f"SSWS {token}",   <span style="color:#5c6b80"># the API token from 12.1</span>
           "Accept": "application/json"}

<span style="color:#5c6b80"># GET users filtered by status (a read \u2192 expect 200)</span>
resp = requests.get(f"{OKTA}/users?filter=status eq \\"DEPROVISIONED\\"",
                    headers=headers)
resp.raise_for_status()           <span style="color:#5c6b80"># turns a 4xx/5xx into an error</span>
for user in resp.json():
    print(user["profile"]["login"])</pre></div>
    <h3>Where Python shines in IAM: reconciliation</h3>
    <p>A classic real task: compare HR\u2019s active workers against the IdP\u2019s active accounts to find <b>missed terminations</b> (the access-risk problem from governance). Python\u2019s sets make this trivial:</p>
    <div class="codeblock"><div class="cb-label">Python \u00b7 find accounts that should be gone</div><pre>hr_active   = {w["email"] for w in hr_workers}        <span style="color:#5c6b80"># source of truth</span>
idp_active  = {u["profile"]["login"] for u in idp_users}

<span style="color:#5c6b80"># accounts active in the IdP but NOT active in HR = missed leavers</span>
missed_terminations = idp_active - hr_active
for login in missed_terminations:
    print(f"RISK: {login} active in IdP but not in HR")</pre></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the JD:</b> "Python scripting for IAM workflows and CyberArk automation" is an explicit requirement on PAM-focused roles. You don\u2019t need to be a software engineer \u2014 the IAM use of Python is mostly: authenticate, call an API, compare/transform the JSON, act or report. That set-difference reconciliation above is the kind of script that finds the dangerous accounts no one noticed.</div></div>`,
    example:`<p>A realistic Python script that reconciles HR against the IdP and flags risky accounts. This is governance work (Module 06) as automation.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 reconcile HR vs. IdP in Python</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f59e0b"></i><i style="background:#22d3ee"></i><i style="background:#34d399"></i></div><div class="title">reconcile_access.py</div><div class="chip">PYTHON</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#5c6b80"># 1. import the HTTP library</span>
import requests

<span style="color:#5c6b80"># 2. set up auth headers with the API token</span>
headers = {"Authorization": f"SSWS {token}"}

<span style="color:#5c6b80"># 3. pull active accounts from the IdP (GET \u2192 200)</span>
idp = requests.get(f"{OKTA}/users?filter=status eq \\"ACTIVE\\"",
                   headers=headers).json()

<span style="color:#5c6b80"># 4. load HR's active workers (the source of truth)</span>
hr_active = load_hr_active()   <span style="color:#5c6b80"># from Workday export / API</span>

<span style="color:#5c6b80"># 5. set difference = accounts that should be deprovisioned</span>
risky = {u["profile"]["login"] for u in idp} - hr_active

<span style="color:#5c6b80"># 6. report the findings for remediation</span>
for login in risky:
    print(f"MISSED TERMINATION: {login}")</span></div></div></div>
    <p>Import, authenticate, pull, compare, report \u2014 six steps that surface every account active in the IdP but gone from HR. In the lab you\u2019ll order these steps so the reconciliation runs correctly.</p></div>`,
    lab:{ kind:'scriptorder', id:'12.3', lang:'Python', titleBar:'reconcile_access.py',
      title:'Order the reconciliation script',
      objective:'Arrange the Python steps so the HR-vs-IdP reconciliation runs: import the library, set auth headers, pull IdP accounts, load HR\u2019s active list, compute the set difference, then report. A step can\u2019t use data it hasn\u2019t fetched yet.',
      intro:'',
      steps:[
        {label:'import requests', code:'import requests'},
        {label:'set auth headers', code:'headers = {"Authorization": f"SSWS {token}"}'},
        {label:'GET active accounts from the IdP', code:'idp = requests.get(f"{OKTA}/users?filter=status eq ACTIVE", headers=headers).json()'},
        {label:'load HR active workers (source of truth)', code:'hr_active = load_hr_active()'},
        {label:'compute set difference (idp - hr)', code:'risky = {u["profile"]["login"] for u in idp} - hr_active'},
        {label:'report the risky accounts', code:'for login in risky: print(f"MISSED TERMINATION: {login}")'}
      ],
      start:[2,0,4,1,5,3],
      solution:[0,1,2,3,4,5]},
    quiz:[
      {q:'Why is Python popular for IAM automation specifically?',
       o:['It\u2019s the only language that exists','It talks to any platform\u2019s REST API and excels at processing/reconciling the JSON results','It runs only on Windows','It replaces the IdP'],a:1,
       e:'Python + requests calls any IAM API, and its data tools make reconciliation and reporting easy \u2014 hence its use across Okta, CyberArk, and more.'},
      {q:'In the reconciliation script, "idp_active - hr_active" (a set difference) finds:',
       o:['New hires','Accounts active in the IdP but not active in HR \u2014 i.e. missed terminations','Disabled accounts','Groups'],a:1,
       e:'Subtracting HR\u2019s active set from the IdP\u2019s active set leaves accounts that exist in the IdP but should be gone \u2014 the missed-leaver risk.'},
      {q:'resp.raise_for_status() is used to:',
       o:['Speed up the call','Turn a 4xx/5xx HTTP error into a Python exception so failures don\u2019t pass silently','Add a user','Encrypt the token'],a:1,
       e:'It makes the script fail loudly on a bad status code (e.g. 401/403/404) instead of continuing with empty/garbage data.'},
      {q:'The IAM use of Python is mostly:',
       o:['Building operating systems','Authenticate, call an API, transform/compare the JSON, then act or report','3D graphics','Writing firmware'],a:1,
       e:'IAM scripting is glue work: call APIs and wrangle the results \u2014 you don\u2019t need to be a full software engineer to be effective.'}
    ]},

  { id:'12.4', num:'12.4', title:'Okta Workflows: no-code orchestration', minutes:10,
    dek:'Not every automation needs code. Okta Workflows is a visual, low-code engine for lifecycle orchestration, and a named skill on Okta job postings.',
    concept:`<p>Code is powerful but not always the right tool. <b>Okta Workflows</b> is Okta\u2019s <b>low-code/no-code</b> automation platform: you build identity automations by connecting visual <b>cards</b> instead of writing scripts. It\u2019s explicitly listed on Okta IAM job descriptions, often as the thing you\u2019ll "grow into."</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Okta Workflows</div>A visual automation engine where a <b>flow</b> starts with an <b>event trigger</b> (e.g. "user added to group", "user deactivated") and runs a sequence of <b>action cards</b> (call an API, send a Slack message, update a record). It orchestrates lifecycle and governance tasks without code, and is how many shops handle JML edge cases the IdP can\u2019t natively.</div>
    <h3>Anatomy of a flow</h3>
    <ul>
      <li><b>Trigger</b> \u2014 the event that starts the flow. Every flow begins with exactly one. "When a user is deactivated in Okta\u2026"</li>
      <li><b>Action cards</b> \u2014 the steps that run in order: look something up, branch on a condition, call an external API, notify someone.</li>
      <li><b>Connectors</b> \u2014 pre-built integrations (Okta, Google, Slack, HTTP) so cards can act on real systems.</li>
    </ul>
    <p>The logic mirrors the scripts you just wrote \u2014 a trigger plus ordered steps \u2014 but it\u2019s visual, auditable by non-developers, and maintained without a code deployment. The trade-off: great for orchestration and glue, less suited to heavy data processing (where Python wins).</p>
    <div class="keyterm"><div class="kt-label">When to use which</div><div class="kt-term">Workflows vs. code</div>Reach for <b>Okta Workflows</b> for event-driven lifecycle orchestration inside the Okta ecosystem (a leaver triggers a Slack alert + a ticket + a downstream API call). Reach for <b>PowerShell/Graph or Python</b> for bulk operations, complex data reconciliation, cross-platform work, or anything outside Okta\u2019s connectors. Mature teams use both.</div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the JD:</b> "Help triage Okta Workflow errors" and "comfort using Okta Workflows" are real responsibilities for Associate IAM Engineers. Troubleshooting a broken flow is the same log-detective skill as SSO triage (Module 05): which card failed, what did it return, why. Knowing a flow is just a trigger + ordered actions is the foundation.</div></div>`,
    example:`<p>A real lifecycle flow: when a user is deactivated, clean up and notify. Notice it\u2019s the leaver logic again \u2014 now as visual cards.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 a leaver flow in Okta Workflows</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#00297a"></i><i style="background:#22d3ee"></i><i style="background:#34d399"></i></div><div class="title">Workflows \u00b7 leaver-cleanup</div><div class="chip">NO-CODE</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#22d3ee">TRIGGER</span>  User Deactivated in Okta
   \u2193
<span style="color:#94a3b8">ACTION</span>   Read User \u2014 get the leaver\u2019s profile &amp; manager
   \u2193
<span style="color:#94a3b8">ACTION</span>   Remove User from all Groups \u2014 strip downstream access
   \u2193
<span style="color:#94a3b8">ACTION</span>   Call HTTP \u2014 deprovision a downstream app via its API
   \u2193
<span style="color:#94a3b8">ACTION</span>   Send Slack message \u2014 notify IT + the manager
   \u2193
<span style="color:#34d399">DONE</span>     leaver cleaned up &amp; everyone notified, no code</div></div></div>
    <p>One trigger, four ordered actions \u2014 the same shape as the scripts, built by connecting cards. In the lab you\u2019ll arrange a flow\u2019s cards so it runs correctly, starting (as every flow must) with its trigger.</p></div>`,

    quiz:[

      {q:'Okta Workflows is best described as:',

      {q:'You\u2019d choose Python/PowerShell over Okta Workflows when:',

      {q:'Troubleshooting a failed Workflow is most like:',

{ id:'M13', num:'13', title:'Authentication Deep Dive', sub:'4 lessons \u00b7 MFA \u00b7 certs \u00b7 device assurance',
  blurb:'Beyond "turn on MFA." The factor types and which actually resist phishing, certificate-based authentication end to end, and Okta Device Assurance enforcing device posture, the controls that make modern authentication strong rather than just present.',
  lessons:[
  /* ---------------- 13.1 ---------------- */
  { id:'13.1', num:'13.1', title:'Authentication factors & MFA strength', minutes:9,
    dek:'Not all MFA is equal. The difference between MFA that stops an attacker and MFA that merely annoys them is the factor type.',
    concept:`<p>You\u2019ve enabled MFA in earlier modules. Now go deeper: <i>which</i> factors, and why some are dramatically stronger than others. "We have MFA" is not the same as "we have phishing-resistant MFA," and serious shops know the difference.</p>
    <div class="keyterm"><div class="kt-label">The three factor categories</div><div class="kt-term">Something you know / have / are</div><b>Knowledge</b> (password, PIN), <b>possession</b> (phone, security key, smart card), and <b>inherence</b> (fingerprint, face). True MFA combines factors from <b>different categories</b>; two passwords aren\u2019t MFA. Authentication strength comes from how hard each factor is to steal remotely.</div>
    <h3>The factor strength ladder</h3>
    <p>Roughly weakest to strongest, and why:</p>
    <ul>
      <li><b>Password alone</b> \u2014 phishable, guessable, reused. The thing MFA exists to backstop.</li>
      <li><b>SMS OTP</b> \u2014 better than nothing, but vulnerable to SIM-swap and real-time phishing. Discouraged for high-value access.</li>
      <li><b>TOTP / push</b> \u2014 authenticator-app codes or push approvals; resist SIM-swap but can be <b>phished</b> (relayed in real time) or defeated by <b>MFA fatigue</b> (spamming approvals until someone taps yes).</li>
      <li><b>Push with number matching</b> \u2014 you type a number shown on the login screen, defeating blind fatigue taps. A meaningful step up.</li>
      <li><b>Phishing-resistant: FIDO2/WebAuthn passkeys, PIV/smart cards, Okta FastPass</b> \u2014 cryptographically bound to the legitimate site/device, so a fake login page gets nothing. The gold standard.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Phishing-resistant MFA</div>Authentication that can\u2019t be relayed through a fake site because the credential is cryptographically tied to the real origin and device (FIDO2/WebAuthn, PIV smart cards, Okta FastPass). It\u2019s the control regulators and Zero Trust programs increasingly <i>require</i> for privileged and sensitive access.</div>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>MFA fatigue is a real attack:</b> several major breaches happened despite MFA, because attackers with a stolen password spammed push approvals until a tired user tapped "approve." Number matching helps; phishing-resistant factors eliminate the class entirely. "We have MFA" didn\u2019t save those orgs \u2014 the <i>type</i> of MFA is what matters.</div></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>For the role:</b> "implemented MFA policies" is on every IAM resume, but the senior signal is being able to say <i>which factors and why</i> \u2014 e.g., "we required phishing-resistant FIDO2 for admins, number-matching push for staff, and retired SMS." That nuance is exactly what 13.1 gives you.</div></div>`,
    example:`<p>The same stolen password, against two MFA setups. Watch where the attack dies.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 weak vs. phishing-resistant MFA</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">attacker has the password \u2014 now what?</div></div>
    <div class="console-body"><div class="mono-out">attacker phished the password and proxies a fake login page

<span style="color:#fbbf24">SETUP A: password + push approval</span>
  fake page relays the login \u2192 real push sent to user
  attacker spams approvals (MFA fatigue) \u2192 user eventually taps yes
  \u2192 <span style="color:#f87171">COMPROMISED</span>  (MFA present, but phishable)

<span style="color:#34d399">SETUP B: password + FIDO2 passkey</span>
  passkey is bound to the REAL origin; the fake site isn't it
  the cryptographic challenge simply won't satisfy \u2192 nothing to relay
  \u2192 <span style="color:#34d399">ATTACK FAILS</span>  (phishing-resistant by design)</div></div></div>
    <p>Both setups "have MFA." Only one survives a real phishing attack, because the factor is cryptographically tied to the legitimate site. In the lab you\u2019ll classify factors by strength and phishing-resistance.</p></div>`,
    lab:{ kind:'classify', id:'13.1', mode:'mfa',
      title:'Rank the factors',
      objective:'Tag each authentication factor as <b>Phishing-Resistant</b> (cryptographically bound \u2014 FIDO2, PIV, FastPass) or <b>Phishable</b> (can be relayed, SIM-swapped, or fatigued \u2014 SMS, TOTP, plain push). Knowing the line is the point.',
      intro:'Tag each factor. All correct to pass.',
      threeway:['Phishing-Resistant','Phishable'],
      twoway:true,
      items:[
        {t:'FIDO2 / WebAuthn passkey on a security key.',layer:'Phishing-Resistant'},
        {t:'SMS one-time code texted to a phone.',layer:'Phishable'},
        {t:'PIV smart card with a client certificate.',layer:'Phishing-Resistant'},
        {t:'TOTP six-digit code from an authenticator app.',layer:'Phishable'},
        {t:'Plain push approval (tap yes/no).',layer:'Phishable'},
        {t:'Okta FastPass (device-bound, origin-checked).',layer:'Phishing-Resistant'}
      ]},
    quiz:[
      {q:'True multi-factor authentication requires:',
       o:['Two passwords','Factors from different categories (know / have / are)','A longer password','Two phones'],a:1,
       e:'MFA combines categories \u2014 e.g. password (know) + security key (have). Two of the same category isn\u2019t MFA.'},
      {q:'"Phishing-resistant MFA" means the factor is:',
       o:['Longer','Cryptographically bound to the real site/device so a fake page can\u2019t relay it','Sent by SMS','Easier to type'],a:1,
       e:'FIDO2, PIV, and FastPass tie the credential to the legitimate origin/device, so phishing proxies get nothing usable.'},
      {q:'MFA fatigue attacks succeed against:',
       o:['FIDO2 passkeys','Plain push approvals (spam until the user taps yes)','Smart cards','Number-matching push'],a:1,
       e:'Blind push approvals can be spammed; number matching and phishing-resistant factors defeat this.'},
      {q:'For privileged/admin access, the strongest choice is:',
       o:['SMS OTP','Phishing-resistant MFA (FIDO2 / PIV / FastPass)','Password only','Security questions'],a:1,
       e:'High-value access warrants phishing-resistant factors, which regulators and Zero Trust programs increasingly require.'}
    ]},
  /* ---------------- 13.2 ---------------- */
  { id:'13.2', num:'13.2', title:'Certificate-based authentication', minutes:10,
    dek:'How smart cards and client certificates prove identity with cryptography instead of a shared secret. Named on IAM job descriptions, and a pillar of phishing-resistant auth.',
    concept:`<p><b>Certificate-based authentication (CBA)</b> replaces "prove you know a secret" with "prove you hold a private key." It\u2019s the cryptography behind PIV/CAC smart cards, client-certificate logins, and much of what makes authentication phishing-resistant.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Certificate-based authentication (CBA)</div>The user (or device) presents an <b>X.509 client certificate</b> instead of, or alongside, a password. The certificate contains a public key and an identity (the Subject); the holder proves possession of the matching <b>private key</b>, which never leaves the card/device. There\u2019s no shared secret to phish.</div>
    <h3>How it works, conceptually</h3>
    <ul>
      <li>A trusted <b>Certificate Authority (CA)</b> issues the user a certificate binding their identity to a key pair.</li>
      <li>At login, the user presents the certificate and signs a challenge with the <b>private key</b> (held on a smart card or TPM, never transmitted).</li>
      <li>The server validates the certificate and maps its <b>Subject</b> to a user identity.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">What the server must validate</div><div class="kt-term">Trust, time, revocation, usage, identity</div>A valid CBA login requires: the cert <b>chains to a trusted CA</b>; it\u2019s <b>within its validity period</b> (notBefore/notOnOrAfter, like a SAML assertion\u2019s window); it\u2019s <b>not revoked</b> (checked via CRL or OCSP); it has the right <b>key usage</b> (client authentication); and its <b>Subject maps</b> to a real account. Miss any one and authentication fails \u2014 which is exactly why CBA is strong.</div>
    <h3>Why it\u2019s phishing-resistant</h3>
    <p>There\u2019s no password or code to type into a fake page, and the private key never leaves the hardware. An attacker can\u2019t phish what is never transmitted and never leaves a smart card. This is why government (PIV/CAC) and high-security environments rely on it, and why it sits in the phishing-resistant tier alongside FIDO2.</p>
    <div class="callout warn"><span class="ic">\u26a0\ufe0f</span><div><b>Revocation is the operational catch:</b> certificates are issued for months or years, so when someone leaves or a card is lost, you must <b>revoke</b> the certificate (publish it to a CRL / OCSP) or the credential keeps working. Certificate lifecycle \u2014 issuance, renewal, and especially revocation \u2014 is real IAM work, and a missed revocation is the CBA equivalent of a missed termination.</div></div>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the JD:</b> "certificate-based authentication" is listed alongside SSO, MFA, SAML, OAuth, and OIDC. You don\u2019t need to run a PKI, but you should be able to explain the chain of validation \u2014 trust, time, revocation, usage, identity \u2014 and why CBA resists phishing. The lab walks you through fixing a rejected certificate, check by check.</div></div>`,
    example:`<p>A client certificate presented at login, validated check by check \u2014 the same disciplined validation you saw with SAML assertions, now for X.509.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 validating a client certificate</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">client-cert \u00b7 validate</div><div class="chip">X.509</div></div>
    <div class="console-body"><div class="mono-out">presented certificate:
  Subject  : amy@corp            <span style="color:#34d399">\u2713 maps to a user</span>
  Issuer   : Corp Issuing CA      <span style="color:#34d399">\u2713 chains to trusted CA</span>
  Validity : now within window     <span style="color:#34d399">\u2713 not expired</span>
  Revoked  : no (OCSP good)         <span style="color:#34d399">\u2713 not revoked</span>
  Key Usage: clientAuth             <span style="color:#34d399">\u2713 valid for client authentication</span>
\u2192 <span style="color:#34d399">authenticated</span> \u2014 user proved possession of the private key, no secret sent

if ANY check failed (untrusted issuer, expired, revoked,
   wrong usage, no subject) \u2192 <span style="color:#f87171">rejected</span></div></div></div>
    <p>Five checks, all strict, no shared secret in sight. That strictness is the strength. In the lab you\u2019ll be handed a certificate failing several of these and repair each until it authenticates.</p></div>`,
    lab:{ kind:'certauth', id:'13.2',
      title:'Fix the rejected certificate',
      objective:'A client certificate is being rejected at login. Repair each problem \u2014 re-issue from a trusted CA, fix the validity period, clear the revocation, add the clientAuth usage, and bind the Subject to a user \u2014 then validate until it authenticates.',
      intro:'',
      ctx:{ now:1000, trustedCAs:['Corp Issuing CA'] },
      start:{ subject:'', issuer:'Sketchy CA', notBefore:200, notOnOrAfter:300, revoked:true, keyUsageClientAuth:false, chainsToTrustedCA:false }},
    quiz:[
      {q:'In certificate-based authentication, the user proves identity by:',
       o:['Typing a password','Proving possession of a private key that never leaves their card/device','Sending an SMS','Answering questions'],a:1,
       e:'CBA relies on holding a private key (on a smart card/TPM) and signing a challenge \u2014 no shared secret is transmitted.'},
      {q:'Which is NOT part of validating a client certificate?',
       o:['It chains to a trusted CA','It is within its validity period and not revoked','It has client-auth key usage','The user\u2019s favorite color'],a:3,
       e:'Validation checks trust chain, validity window, revocation, key usage, and subject mapping \u2014 cryptographic and identity facts, not preferences.'},
      {q:'Certificate-based auth is phishing-resistant because:',
       o:['Certificates are long','There is no password/code to enter into a fake site, and the private key never leaves the device','It uses SMS','It\u2019s encrypted email'],a:1,
       e:'Nothing phishable is transmitted; the private key stays on the hardware, so a fake login page captures nothing usable.'},
      {q:'When an employee with a smart card leaves, you must:',
       o:['Nothing \u2014 it expires eventually','Revoke the certificate (CRL/OCSP) so it can\u2019t be used','Email them','Change the CA'],a:1,
       e:'Certificates are long-lived, so revocation is essential on departure or loss \u2014 a missed revocation is like a missed termination.'}
    ]},
  /* ---------------- 13.3 ---------------- */
  { id:'13.3', num:'13.3', title:'Okta Device Assurance & device posture', minutes:10,
    dek:'Authenticating the user isn\u2019t enough; Zero Trust also verifies the device. Okta Device Assurance enforces that only healthy, compliant devices get in.',
    concept:`<p>Zero Trust says verify the <i>user</i> and the <i>device</i>. <b>Okta Device Assurance</b> is how Okta enforces the device half: policies that check a device\u2019s <b>security posture</b> before granting access, regardless of who the user is.</p>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Okta Device Assurance</div>Policies that require a device to meet security criteria \u2014 e.g. <b>managed/registered</b>, <b>screen lock</b> enabled, <b>disk encryption</b> on, a <b>minimum OS version</b>, or <b>biometric</b> set \u2014 before it can access resources. Even a correctly authenticated user is blocked from a non-compliant device.</div>
    <h3>Posture signals it checks</h3>
    <ul>
      <li><b>Managed / registered</b> \u2014 is the device enrolled and known (often via an MDM)?</li>
      <li><b>Screen lock</b> and <b>biometric</b> \u2014 basic device-level protection.</li>
      <li><b>Disk encryption</b> \u2014 data at rest is protected if the device is lost.</li>
      <li><b>Minimum OS version</b> \u2014 patched against known vulnerabilities.</li>
    </ul>
    <div class="keyterm"><div class="kt-label">How it connects to MDM</div><div class="kt-term">Device Assurance + MDM (Jamf, Intune)</div>Device Assurance checks posture; an <b>MDM</b> (Mobile Device Management) like <b>Jamf</b> (Apple) or <b>Microsoft Intune</b> is what <i>manages</i> the device and supplies/enforces that posture (encryption, OS, enrollment). Okta reads the device\u2019s managed/compliant state as a signal in its policy. Together they ensure only secure, managed endpoints reach corporate resources.</div>
    <h3>Where it fits the bigger picture</h3>
    <p>Device Assurance plugs straight into the authentication and Conditional Access flow you already know: it\u2019s another <b>signal</b> evaluated at sign-in, and it supports <b>least privilege</b> by ensuring access only flows to trustworthy devices. A phishing-resistant credential on a compromised, unmanaged laptop is still a risk; checking the device closes that gap.</p>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>From the JD:</b> "configuring and monitoring Okta Device Assurance policies" and understanding "how they interface with MDM tools (Jamf, Intune) to check device posture" are listed responsibilities and bonus points. The mental model \u2014 Device Assurance checks posture, MDM manages it, Okta uses it as a sign-in signal \u2014 is exactly what those roles want you to articulate.</div></div>`,
    example:`<p>One Device Assurance policy, four devices trying to get in. Watch posture, not identity, decide each one.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 Device Assurance in action</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#00297a"></i><i style="background:#22d3ee"></i><i style="background:#34d399"></i></div><div class="title">Device Assurance \u00b7 evaluate</div><div class="chip">DEVICE</div></div>
    <div class="console-body"><div class="mono-out">policy: managed \u00b7 screen lock \u00b7 OS \u2265 14 \u00b7 disk encryption

corp laptop   managed, locked, OS 15, encrypted   \u2192 <span style="color:#34d399">ALLOW</span>
personal phone unmanaged, locked, OS 16, encrypted \u2192 <span style="color:#f87171">BLOCK</span> (not managed)
old laptop    managed, locked, OS 12, encrypted    \u2192 <span style="color:#f87171">BLOCK</span> (OS below minimum)
kiosk         managed, no lock, OS 15, not encrypted\u2192 <span style="color:#f87171">BLOCK</span> (no lock, no encryption)

same user on all four \u2014 only the compliant device gets through</div></div></div>
    <p>Identity passed every time; the <b>device</b> decided. That\u2019s the Zero Trust device pillar made concrete. In the lab you\u2019ll predict allow/block for a set of devices against a posture policy.</p></div>`,
    lab:{ kind:'deviceassurance', id:'13.3',
      title:'Enforce device posture',
      objective:'A Device Assurance policy requires a managed device with screen lock, OS \u2265 14, and disk encryption. For each device, predict whether Okta <b>allows</b> or <b>blocks</b> it. All correct to pass.',
      intro:'',
      policy:{ requireManaged:true, requireScreenLock:true, minOsVersion:14, requireDiskEncryption:true },

    quiz:[
      {q:'Okta Device Assurance enforces:',
       o:['Password length','Device security posture (managed, encrypted, OS version, lock) before granting access','Network speed','Email rules'],a:1,
       e:'Device Assurance checks the device\u2019s posture as a sign-in signal; a non-compliant device is blocked even for a valid user.'},
      {q:'The relationship between Device Assurance and an MDM (Jamf/Intune) is:',
       o:['They\u2019re the same thing','MDM manages/enforces device posture; Device Assurance reads that state as a sign-in signal','MDM replaces Okta','Device Assurance manages phones directly'],a:1,
       e:'The MDM manages the device and supplies its compliance state; Okta\u2019s Device Assurance uses it to allow or block access.'},
      {q:'Why check the device, not just the user?',
       o:['Users are untrustworthy','A valid credential on a compromised/unmanaged device is still a risk \u2014 Zero Trust verifies both','To slow logins','Devices pay for licenses'],a:1,
       e:'Authenticating the user doesn\u2019t guarantee a safe endpoint; verifying device posture closes that gap, per Zero Trust.'},
      {q:'A correctly authenticated user on an unmanaged personal phone, under a "require managed" policy, is:',
       o:['Allowed','Blocked \u2014 the device fails the assurance policy','Made an admin','Ignored'],a:1,

    ]},
  /* ---------------- 13.4 ---------------- */
  { id:'13.4', num:'13.4', title:'Designing an authentication strategy', minutes:9,
    dek:'Putting the pieces together: matching factor strength and device requirements to risk, the way a real IAM engineer designs sign-in policy.',
    concept:`<p>You now have the building blocks: factor types, phishing resistance, certificates, and device posture. The engineering skill is <b>combining them by risk</b> \u2014 stronger requirements for higher-value access, lighter touch for low-risk, all expressed in policy.</p>
    <div class="keyterm"><div class="kt-label">The design principle</div><div class="kt-term">Match assurance to risk</div>Authentication strength should scale with what\u2019s being protected. Low-risk app from a managed device? Password + push may suffice. Admin console or financial system? Require <b>phishing-resistant</b> MFA <i>and</i> a <b>compliant device</b>. This is risk-based authentication \u2014 the same risk-tiering idea from governance (Module 06) and Conditional Access (Module 09), applied to sign-in.</div>
    <h3>The levers you now control</h3>
    <ul>
      <li><b>Factor strength</b> \u2014 require phishing-resistant factors for privileged access; retire SMS for anything sensitive.</li>
      <li><b>Device posture</b> \u2014 require managed/compliant devices (Device Assurance) for corporate resources.</li>
      <li><b>Context</b> \u2014 step up when risk is elevated (new location, impossible travel) via Conditional Access / sign-on policy.</li>
      <li><b>Step-up authentication</b> \u2014 don\u2019t force the strongest factor on every action; demand it at the moment of higher risk (accessing the vault, changing payroll).</li>
    </ul>
    <div class="keyterm"><div class="kt-label">Core term</div><div class="kt-term">Step-up authentication</div>Requiring <b>additional or stronger</b> verification only when the risk rises \u2014 e.g. normal sign-in with push, but a fresh phishing-resistant challenge before approving a wire transfer or activating an admin role. It balances security with user experience by reserving friction for the moments that warrant it.</div>
    <h3>The balance: security vs. experience</h3>
    <p>The art is protecting access <i>without</i> making people miserable, because painful auth drives risky workarounds. The answer is proportionality: invisible or light verification for routine low-risk access, strong phishing-resistant + device checks where it counts. A good authentication strategy is one users barely notice on the easy paths and that stands firm on the dangerous ones.</p>
    <div class="callout real"><span class="ic">\ud83d\udef0\ufe0f</span><div><b>The bio line, earned:</b> "I design secure authentication systems that make it easier for users to access what they need without compromising security." That sentence <i>is</i> this lesson: matching assurance to risk, using step-up so friction lands only where needed, and combining factor strength with device posture. You can now speak to the design, not just the toggles.</div></div>`,
    example:`<p>One organization, three access tiers, matched to the right authentication requirements. This is the design conversation in practice.</p>
    <div class="example-wrap"><div class="example-label">Worked example \u00b7 risk-tiered authentication design</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">auth-strategy \u00b7 by risk tier</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#34d399">TIER 1 \u2014 low risk</span>  (internal wiki, time-off tool)
  password + push, any managed device   <span style="color:#5c6b80"># light touch</span>

<span style="color:#fbbf24">TIER 2 \u2014 business apps</span>  (CRM, email)
  password + number-matching push + managed device (Device Assurance)

<span style="color:#f87171">TIER 3 \u2014 privileged / financial</span>  (admin console, payroll, the vault)
  <span style="color:#34d399">phishing-resistant MFA (FIDO2/PIV)</span> + compliant device
  + <span style="color:#34d399">step-up</span> re-auth at the sensitive action, + JIT/PIM elevation

friction scales with risk \u2014 invisible at Tier 1, firm at Tier 3</div></div></div>
    <p>Same building blocks, dialed up by tier. Routine work stays smooth; the crown jewels demand phishing-resistant auth on a healthy device with a step-up at the moment of action. In the lab you\u2019ll make the case for a sound authentication strategy.</p></div>`,
    lab:{ kind:'capstone', id:'13.4',

    quiz:[
      {q:'Risk-based authentication means:',
       o:['Everyone uses the same factor','Authentication strength scales with the risk of what\u2019s being accessed','No authentication for anyone','Only passwords'],a:1,

      {q:'Step-up authentication is:',

      {q:'For the most sensitive access, the strongest design combines:',
       o:['SMS + any device','Phishing-resistant MFA + a compliant device + step-up at the sensitive action','Password only','A longer username'],a:1,

/* total lessons for progress */
const TOTAL_LESSONS=CURRICULUM.reduce((a,m)=>a+m.lessons.length,0);

/* =====================================================================
   LAB RENDERERS — Part 2 (Modules 03–08)
   Each follows the signature (mount, lab, done)
   ===================================================================== */

/* ---- RBAC role hierarchy builder & resolver (Module 03) ----
   User assigns roles to a user; roles may inherit; we resolve effective perms
   and check the user can do the required actions but NOT the forbidden ones. */
function labRbac(mount, lab, done){
  // lab.roles: catalog [{name, perms[], inherits[]}], lab.assignable: role names user can toggle
  // lab.target: {can:[perms], cannot:[perms]}
  const assigned=new Set(lab.preassigned||[]);
  mount.innerHTML=`
    <div class="mono-out" style="margin:6px 0 12px;font-size:11.5px">Role catalog (each role grants permissions; some inherit other roles):</div>
    <table class="dt" id="roleCat"><tr><th>Role</th><th>Grants</th><th>Inherits</th><th>Assign to user</th></tr></table>
    <div style="margin-top:14px"><span class="fld-label" style="margin:0">Effective permissions for the user:</span>
      <div id="effOut" class="mono-out" style="margin-top:6px">(assign a role)</div></div>
    <button class="btn" id="rbCheck" style="margin-top:14px">Resolve &amp; check access</button>
    <div class="result" id="rbRes"></div>`;
  const cat=$('#roleCat',mount);
  lab.roles.forEach(r=>{
    const row=el(`<tr><td><code>${r.name}</code></td><td>${(r.perms||[]).map(p=>`<code>${p}</code>`).join(' ')||'—'}</td><td>${(r.inherits||[]).map(p=>`<code>${p}</code>`).join(' ')||'—'}</td>
      <td>${lab.assignable.includes(r.name)?`<button class="btn ghost sm rbtog" data-r="${r.name}">${assigned.has(r.name)?'✓ assigned':'assign'}</button>`:'<span class="empty-hint">fixed</span>'}</td></tr>`);
    cat.appendChild(row);
  });
  function model(){return {users:[{name:'u',roles:[...assigned]}], roles:lab.roles};}
  function refresh(){
    const {perms,trace}=rbacResolve(model(),'u');
    $('#effOut',mount).innerHTML = perms.size?[...perms].map(p=>`<span style="color:#22d3ee">${p}</span>`).join('  ·  '):'(none)';
  }
  $$('.rbtog',mount).forEach(b=>b.onclick=()=>{const r=b.dataset.r;
    if(assigned.has(r)){assigned.delete(r);b.textContent='assign';b.classList.add('ghost');}
    else{assigned.add(r);b.textContent='✓ assigned';b.classList.remove('ghost');b.style.background='var(--cyan-deep)';b.style.borderColor='var(--cyan)';}
    refresh();});
  refresh();
  $('#rbCheck',mount).onclick=()=>{
    const m=model(); const rows=[]; let allRight=true;
    (lab.target.can||[]).forEach(p=>{const ok=rbacCan(m,'u',p);if(!ok)allRight=false;rows.push(`<li><span class="mk">${ok?'✓':'✗'}</span><span>can <code>${p}</code> ${ok?'<span style="color:#34d399">yes</span>':'<span style="color:#f87171">NO — missing</span>'}</span></li>`);});
    (lab.target.cannot||[]).forEach(p=>{const ok=!rbacCan(m,'u',p);if(!ok)allRight=false;rows.push(`<li><span class="mk">${ok?'✓':'✗'}</span><span>must NOT <code>${p}</code> ${ok?'<span style="color:#34d399">correctly denied</span>':'<span style="color:#f87171">LEAKED — over-privileged</span>'}</span></li>`);});
    const res=$('#rbRes',mount);res.className='result show '+(allRight?'pass':'fail');
    res.innerHTML=`<div class="rv">${allRight?'✓ Correct role assignment — least privilege satisfied':'✗ Not yet — adjust the roles'}</div><ul>${rows.join('')}</ul>`;
    if(allRight)done();
  };
}

/* ---- ABAC policy author (Module 03) ----
   User edits a JSON policy; we run test requests; all must match expected. */
function labAbac(mount, lab, done){
  mount.innerHTML=`
    <div class="console" style="margin:8px 0"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">abac-policy.json</div><div class="chip">ABAC</div></div>
      <textarea id="abEdit" style="width:100%;border:none;background:var(--bg);min-height:150px;border-radius:0">${esc(lab.starter)}</textarea></div>
    <div class="mono-out" style="font-size:11.5px;margin-bottom:10px">Each rule has <b style="color:#22d3ee">effect</b> (allow/deny) and <b style="color:#22d3ee">when</b> (attributes that must match). Deny overrides allow; default deny.</div>
    <button class="btn" id="abCheck">Run policy against test requests</button><div class="result" id="abRes"></div>`;
  $('#abCheck',mount).onclick=()=>{
    const res=$('#abRes',mount);let rules;
    try{rules=JSON.parse($('#abEdit',mount).value);}catch(e){res.className='result show fail';res.innerHTML='<div class="rv">✗ JSON error</div><ul><li>'+esc(e.message)+'</li></ul>';return;}
    let allRight=true;const rows=[];
    lab.tests.forEach(t=>{const r=abacEvaluate(rules,t.req);const ok=r.decision===t.want;if(!ok)allRight=false;
      rows.push(`<li><span class="mk">${ok?'✓':'✗'}</span><span>${t.label} → got <b>${r.decision}</b>${ok?'':` (want ${t.want})`}</span></li>`);});
    res.className='result show '+(allRight?'pass':'fail');
    res.innerHTML=`<div class="rv">${allRight?'✓ Policy behaves correctly on all cases':'✗ Some cases wrong — refine the rules'}</div><ul>${rows.join('')}</ul>`;
    if(allRight)done();
  };
}

/* ---- JML lifecycle planner (Module 04) ----
   User sees current access + new attributes, must select the correct
   provision and deprovision actions the engine expects. */
function labJml(mount, lab, done){
  const provSel=new Set(), deprovSel=new Set();
  const plan=jmlPlan(lab.current, lab.newAttrs);
  const universe=[...new Set([...lab.current, ...plan.target, ...(lab.distractors||[])])].sort();
  mount.innerHTML=`
    <div class="mission">
      <div class="m"><div class="mt">Event</div><b style="color:#22d3ee">${plan.event}</b></div>
      <div class="m"><div class="mt">New attributes</div>${Object.entries(lab.newAttrs).map(([k,v])=>`${k}=<b>${v}</b>`).join(', ')}</div>
      <div class="m"><div class="mt">Current access</div>${lab.current.length?lab.current.map(x=>`<code>${x}</code>`).join(' '):'(none — new hire)'}</div>
    </div>
    <p style="font-size:13px;color:var(--ink-dim);margin:6px 0">For this lifecycle event, tag each entitlement: <b style="color:#34d399">Provision</b> (add), <b style="color:#f87171">Deprovision</b> (remove), or leave untagged to keep/skip.</p>
    <table class="dt" id="jmlTbl"><tr><th>Entitlement</th><th>Currently held?</th><th>Action</th></tr></table>
    <button class="btn" id="jmlCheck" style="margin-top:12px">Submit lifecycle plan</button><div class="result" id="jmlRes"></div>`;
  const tbl=$('#jmlTbl',mount);
  universe.forEach(ent=>{
    const held=lab.current.includes(ent);
    const row=el(`<tr><td><code>${ent}</code></td><td>${held?'<span class="st-badge b">held</span>':'<span class="empty-hint">no</span>'}</td>
      <td><button class="btn ghost sm jp" data-e="${ent}" data-a="prov">+ provision</button>
          <button class="btn ghost sm jd" data-e="${ent}" data-a="deprov" style="margin-left:5px">− deprovision</button>
          <span class="jtag" data-e="${ent}" style="margin-left:6px;font-family:var(--mono);font-size:11px"></span></td></tr>`);
    tbl.appendChild(row);
  });
  function tag(ent){const t=tbl.querySelector(`.jtag[data-e="${ent}"]`);t.innerHTML=provSel.has(ent)?'<span style="color:#34d399">provision</span>':deprovSel.has(ent)?'<span style="color:#f87171">deprovision</span>':'';}
  $$('.jp',mount).forEach(b=>b.onclick=()=>{const e=b.dataset.e;provSel.add(e);deprovSel.delete(e);tag(e);});
  $$('.jd',mount).forEach(b=>b.onclick=()=>{const e=b.dataset.e;deprovSel.add(e);provSel.delete(e);tag(e);});
  $('#jmlCheck',mount).onclick=()=>{
    const wantP=new Set(plan.provision), wantD=new Set(plan.deprovision);
    const okP=wantP.size===provSel.size&&[...wantP].every(x=>provSel.has(x));

          ${a.status!=='unmanaged'?`<button class="btn green sm fa" data-id="${a.id}" data-act="checkout" data-actor="alice">checkout (alice)</button>`:''}
          ${a.status!=='unmanaged'?`<button class="btn amber sm fa" data-id="${a.id}" data-act="checkout" data-actor="bob">checkout (bob)</button>`:''}
          ${a.status==='checked_out'?`<button class="btn sm fa" data-id="${a.id}" data-act="checkin" data-actor="${a.heldBy}">check in</button>`:''}
        </span></div>`);
      L.appendChild(row);
    });

      done();

  paint();
}

    b.style.background='var(--cyan-deep)';b.style.borderColor='var(--cyan)';
    const plan=hrisEventPlan(ev.event);
    const flow=$('#hrisFlow',mount);
    flow.innerHTML=`<div class="decision allow" style="margin:0 0 10px"><div class="verdict" style="font-size:13px">▶ ${ev.label} — flowing downstream</div>

        <div><div class="fld-label" style="margin:0 0 4px">Active Directory operations</div><ul class="trace">${plan.ad.map(x=>`<li>${x}</li>`).join('')||'<li>—</li>'}</ul></div>

`Subject : <span style="color:${cert.subject?'#34d399':'#f87171'}">${cert.subject||'(empty)'}</span>
Issuer  : <span style="color:${ctx.trustedCAs.includes(cert.issuer)?'#34d399':'#f87171'}">${cert.issuer}</span>
Validity: <span style="color:${(ctx.now>=cert.notBefore&&ctx.now<cert.notOnOrAfter)?'#34d399':'#f87171'}">${cert.notBefore}\u2026${cert.notOnOrAfter} (now=${ctx.now})</span>
Revoked : <span style="color:${cert.revoked?'#f87171':'#34d399'}">${cert.revoked?'YES (on CRL)':'no'}</span>
EKU     : <span style="color:${cert.keyUsageClientAuth?'#34d399':'#f87171'}">${cert.keyUsageClientAuth?'clientAuth':'(missing clientAuth)'}</span>
Chain   : <span style="color:${cert.chainsToTrustedCA?'#34d399':'#f87171'}">${cert.chainsToTrustedCA?'chains to trusted CA':'broken chain'}</span>`;
  }

    ['issuer','Re-issue from trusted CA',()=>{cert.issuer='Corp Issuing CA';cert.chainsToTrustedCA=true;}],
    ['time','Renew (fix validity)',()=>{cert.notBefore=ctx.now-100;cert.notOnOrAfter=ctx.now+100;}],
    ['revoke','Issue fresh (clear revocation)',()=>{cert.revoked=false;}],
    ['eku','Add clientAuth EKU',()=>{cert.keyUsageClientAuth=true;}],
    ['subject','Bind subject to user',()=>{cert.subject='amy@corp';}]
  ];
  const C=$('#caCtrls',mount);
  ctrls.forEach(([k,label,fn])=>{const b=el(`<button class="btn ghost sm" data-k="${k}">${label}</button>`);

function openLesson(modId,lessonId){
  const mod=CURRICULUM.find(m=>m.id===modId);

  if(!lesson)return;
  CURRENT={modId,lessonId};
  STATE.last={modId,lessonId};saveState();
  // rail active state
  $$('.mod').forEach(m=>m.classList.remove('active-mod'));
  $$('.lesson').forEach(l=>l.classList.toggle('active',l.dataset.lesson===lessonId&&l.dataset.mod===modId));
  const mEl=$(`.mod[data-mod="${modId}"]`);if(mEl&&!mEl.classList.contains('open'))mEl.classList.add('open');
  $('#stage').scrollTop=0;

  const stepData=[
    {k:'concept',label:'Concept',sub:'learn'},
    {k:'example',label:'Example',sub:'see it'},
    {k:'lab',label:'Lab',sub:'do it'},
    {k:'quiz',label:'Checkpoint',sub:'prove it'}
  ];

    <div class="panel-stage active" data-panel="concept"><div class="prose">${lesson.concept}</div></div>
    <div class="panel-stage" data-panel="example"><div class="prose">${typeof lesson.example==='function'?lesson.example():lesson.example}</div></div>

    <div class="panel-stage" data-panel="quiz" id="quizPanel"></div>

  $$('#steps .step').forEach(st=>st.onclick=()=>switchStep(st.dataset.step));

function switchStep(k){
  $$('#steps .step').forEach(s=>s.classList.toggle('active',s.dataset.step===k));

  if(k==='example'&&CURRENT)markDone('S:'+CURRENT.lessonId+':example',XP_PER.example);
}
function setStepDone(k){const s=$(`#steps .step[data-step="${k}"]`);if(s)s.classList.add('done');}

function buildLessonNav(mod,lesson){
  const flat=flatLessons();

/* -- SAML fix lab -- */
function labSaml(mount,lab,done){
  mount.innerHTML=`<div class="console" style="margin:8px 0"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">assertion.json — edit to fix</div><div class="chip">SAML</div></div>
    <textarea id="samlEdit" style="width:100%;border:none;background:var(--bg);min-height:175px;border-radius:0">${esc(lab.starter)}</textarea></div>
    <div class="mono-out" style="font-size:11.5px;margin-bottom:10px">SP context · trusted IdP: <b style="color:#22d3ee">${lab.ctx.trustedIdP}</b> · Entity ID (audience): <b style="color:#22d3ee">${lab.ctx.spEntityId}</b> · now: ${lab.ctx.now}</div>
    <button class="btn" id="samlCheck">Validate assertion</button><div class="result" id="samlRes"></div>`;
  $('#samlCheck',mount).onclick=()=>{
    const res=$('#samlRes',mount);let a;
    try{a=JSON.parse($('#samlEdit',mount).value);}catch(e){res.className='result show fail';res.innerHTML='<div class="rv">✗ JSON error</div><ul><li>'+esc(e.message)+'</li></ul>';return;}
    const issues=[];const c=lab.ctx;
    if(a.issuer!==c.trustedIdP)issues.push('issuer is not the trusted IdP');
    if(a.audience!==c.spEntityId)issues.push('audience ≠ SP Entity ID (exact match required — check trailing slash)');
    if(!(a.notBefore<=c.now))issues.push('notBefore is in the future');
    if(!(a.notOnOrAfter>c.now))issues.push('notOnOrAfter has passed (assertion expired)');
    if(a.signed!==true)issues.push('assertion is not signed');
    if(!a.nameId)issues.push('missing nameId');
    const ok=issues.length===0;res.className='result show '+(ok?'pass':'fail');
    res.innerHTML=`<div class="rv">${ok?'✓ ACCEPTED — SSO would succeed':'✗ REJECTED by Service Provider'}</div>`+(issues.length?`<ul>${issues.map(i=>`<li><span class="mk">✗</span><span>${i}</span></li>`).join('')}</ul>`:'<ul><li><span class="mk">✓</span><span>all checks passed</span></li></ul>');
    if(ok)done();
  };
}

/* -- JWT validation lab -- */
function labJwt(mount,lab,done){
  const goodTok={iss:'https://idp.northwind.com',aud:'northwind-travel-app',sub:'amy.chen',exp:1700003600,nonce:'x91f-aa02'};
  const badTok={iss:'https://idp.northwind.com',aud:'some-other-app',sub:'attacker',exp:1700003600,nonce:'x91f-aa02'};
  let passedGood=false,rejectedBad=false;
  mount.innerHTML=`<div class="grid3"><div><span class="fld-label">Expected issuer</span><input id="jIss" value=""></div>
    <div><span class="fld-label">Expected audience</span><input id="jAud" value=""></div>
    <div><span class="fld-label">Now (unix)</span><input id="jNow" type="number" value="1700001000"></div></div>
    <div class="row" style="margin-top:14px"><button class="btn green sm" id="jGood">▶ Validate legit token</button><button class="btn danger sm" id="jBad">▶ Validate tampered token</button></div>
    <div id="jOut" style="margin-top:12px"></div><div class="result" id="jRes"></div>`;
  function run(tok,which){
    const o={now:+$('#jNow',mount).value,iss:$('#jIss',mount).value||undefined,aud:$('#jAud',mount).value||undefined,nonce:'x91f-aa02'};
    const v=validateClaims(tok,o);
    $('#jOut',mount).innerHTML=`<div class="decision ${v.valid?'allow':'deny'}"><div class="verdict">${v.valid?'✓ TOKEN VALID':'✗ TOKEN REJECTED'} <span style="font-size:12px;color:var(--ink-dim)">(${which})</span></div>${v.issues.length?`<ul class="trace">${v.issues.map(i=>`<li class="bad">${i}</li>`).join('')}</ul>`:'<div class="why">All claims checked out: iss, aud, exp, nonce.</div>'}</div>`;
    if(which==='legitimate'&&v.valid)passedGood=true;
    if(which==='tampered'&&!v.valid)rejectedBad=true;
    const res=$('#jRes',mount);
    if(passedGood&&rejectedBad){res.className='result show pass';res.innerHTML='<div class="rv">✓ Lab cleared — you accept good tokens and reject tampered ones</div><ul><li><span class="mk">✓</span><span>set issuer + audience to your app\'s expected values</span></li></ul>';done();}
    else{res.className='result show fail';res.innerHTML=`<div class="rv">Keep going…</div><ul><li><span class="mk">${passedGood?'✓':'○'}</span><span>legit token passes validation</span></li><li><span class="mk">${rejectedBad?'✓':'○'}</span><span>tampered token (wrong audience) is rejected</span></li></ul>`;}
  }
  $('#jGood',mount).onclick=()=>run(goodTok,'legitimate');
  $('#jBad',mount).onclick=()=>run(badTok,'tampered');
}

/* -- quiz-only lab (no console) -- */
function labQuizOnly(mount,lab,done){
  mount.innerHTML=`<div class="callout tip"><span class="ic">🧠</span><div>This lesson's practice lives in the checkpoint. Answer every checkpoint question correctly and this lab marks complete automatically.</div></div>`;
  mount.dataset.autocomplete='1';
}

/* ===================================================================
   QUIZ RENDERER
   =================================================================== */
function renderQuiz(lesson){
  const p=$('#quizPanel');const bank=lesson.quiz||[];
  if(!bank.length){p.innerHTML='<p class="empty-hint">No checkpoint in this lesson.</p>';return;}
  p.innerHTML=`<h2 style="font-family:var(--disp);font-size:20px;margin:0 0 4px">Checkpoint</h2><p style="color:var(--ink-dim);margin:0 0 14px">Answer all ${bank.length} to complete the lesson. You can retry until each is right.</p><div id="quizMount"></div>`;
  const mount=$('#quizMount');const correct=new Set();
  bank.forEach((item,qi)=>{
    const card=el(`<div class="quiz-card"><div class="quiz-progress">Question ${qi+1} of ${bank.length}</div><div class="quiz-q">${item.q}</div><div class="opts"></div><div class="quiz-explain"></div></div>`);
    const opts=card.querySelector('.opts'),exp=card.querySelector('.quiz-explain');
    item.o.forEach((o,oi)=>{
      const b=el(`<button class="quiz-opt"><span class="ltr">${String.fromCharCode(65+oi)}</span><span>${o}</span></button>`);
      b.onclick=()=>{
        if(card.dataset.locked&&oi===item.a){}
        opts.querySelectorAll('.quiz-opt').forEach(x=>{x.classList.remove('correct','wrong');});
        if(oi===item.a){b.classList.add('correct');card.dataset.locked='1';correct.add(qi);}
        else{b.classList.add('wrong');opts.children[item.a].classList.add('correct');}
        exp.classList.add('show');exp.innerHTML=(oi===item.a?'<b style="color:var(--green)">✓ Correct. </b>':'<b style="color:var(--red)">Not quite. </b>')+item.e;
        if(correct.size===bank.length){setStepDone('quiz');if(markDone('S:'+lesson.id+':quiz',XP_PER.quiz))earnBadge('quiz:'+lesson.id,'✅','Checkpoint passed!','+'+XP_PER.quiz+' XP');
          // auto-complete quizonly labs FIRST so lesson-completion sees the lab as done
          const lp=$('#labPanel #labMount');if(lp&&lp.dataset.autocomplete&&CURRENT){setStepDone('lab');if(markDone('S:'+lesson.id+':lab',XP_PER.lab))earnBadge('lab:'+lesson.id,'🧪','Lab cleared!','reasoning complete');}
          maybeCompleteLesson(lesson);
        }
      };
      opts.appendChild(b);
    });
    mount.appendChild(card);
  });
}

/* ---------- lesson completion ---------- */
function maybeCompleteLesson(lesson){
  const need=['concept','lab','quiz'].map(s=>'S:'+lesson.id+':'+s);
  if(need.every(k=>STATE.done.has(k))){
    if(markDone('L:'+lesson.id,XP_PER.lesson)){
      earnBadge('lesson:'+lesson.id,'🎖️','Lesson '+lesson.num+' complete!','You finished "'+lesson.title+'"');
      // module completion check
      const mod=CURRICULUM.find(m=>m.lessons.some(l=>l.id===lesson.id));
      if(mod.lessons.every(l=>STATE.done.has('L:'+l.id)))
        setTimeout(()=>earnBadge('mod:'+mod.id,'🏆','Module '+mod.num+' mastered!','"'+mod.title+'" — outstanding work'),1200);
    }
  }
  refreshProgressUI();
}

/* ---------- boot ---------- */
loadState();          // restore saved progress (no-op if none / storage blocked)
buildRail();
addXp(0);             // paint XP bar + level from restored state
refreshProgressUI();  // paint rail ticks + module-done states from restored state
renderAbout();        // land on the About page first (recruiter-facing intro)

</script>
